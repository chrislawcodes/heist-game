<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Heist — Campaign War Room</title>
<style>
:root {
  --bg: #0b0b0e;
  --panel: #121214;
  --panel2: #17171c;
  --panel3: #1d1d24;
  --border: #26262d;
  --text: #e1dfe8;
  --muted: #72717a;
  --accent: #e8a030;
  --green: #52c47a;
  --red: #e05050;
  --blue: #5898e0;
  --purple: #9070e0;
  --sk-hack:  #5898e0;
  --sk-safe:  #e8a030;
  --sk-musc:  #e05050;
  --sk-soc:   #9070e0;
  --sk-drive: #52c47a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background:
    radial-gradient(1100px 460px at 50% -120px, rgba(232,160,48,0.08), transparent 60%),
    radial-gradient(800px 360px at 18% 18%, rgba(88,152,224,0.08), transparent 55%),
    radial-gradient(900px 360px at 82% 24%, rgba(144,112,224,0.08), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}
.shell {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.mast {
  height: 54px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(18,18,20,0.92);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.brand {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
.brand-home {
  color: var(--accent);
  text-decoration: none;
}
.brand-home:hover { text-decoration: underline; opacity: 0.8; }
.brand-sep { color: var(--muted); font-weight: 400; }
.brand-sub { color: var(--muted); font-weight: 600; letter-spacing: 2px; }
.meta {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.3px;
}
.meta strong { color: var(--text); font-weight: 700; }
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(82,196,122,0.12);
}
.status-pill {
  margin-left: auto;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  background: var(--panel2);
  border-radius: 999px;
  padding: 6px 10px;
}
.status-pill.is-live { color: var(--green); border-color: rgba(82,196,122,0.25); }
.status-pill.is-error { color: var(--red); border-color: rgba(224,80,80,0.25); }

.pacing-bar {
  height: 36px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.pacing-stage {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid currentColor;
  opacity: 0.9;
  color: var(--muted);
  background: transparent;
}
.pacing-btn {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--panel3);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.pacing-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.pacing-btn:not(:disabled):hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.18);
}
.pacing-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 auto;
}
.pacing-pos {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  min-width: 90px;
  text-align: center;
}
.pacing-auto.is-active {
  color: var(--green);
  border-color: rgba(82,196,122,0.35);
  background: rgba(82,196,122,0.08);
}

.layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr) 240px;
}
.panel {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel + .panel { border-left: 1px solid var(--border); }
.panel-head {
  flex-shrink: 0;
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(18,18,20,0.88);
}
.panel-kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.panel-title {
  font-size: 18px;
  font-weight: 750;
  letter-spacing: -0.02em;
  color: var(--text);
}
.panel-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}
.scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px;
}

/* Wire */
.wire-round {
  margin: 14px 0 8px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
}
.wire-round::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.wire-item {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr);
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.wire-portrait {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--panel3);
  position: relative;
  flex-shrink: 0;
}
.wire-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
.wire-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: rgba(255,255,255,0.24);
  font-family: monospace;
}
.wire-body {
  min-width: 0;
}
.wire-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.wire-name {
  font-size: 12px;
  font-weight: 750;
  color: var(--text);
}
.wire-target {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
}
.wire-text {
  font-size: 13px;
  line-height: 1.55;
  color: #c8c4d7;
  white-space: pre-wrap;
}

/* Standings */
.standings-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ai-card {
  position: relative;
  background: linear-gradient(180deg, rgba(23,23,28,0.98) 0%, rgba(18,18,20,0.98) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(0,0,0,0.18);
}
.ai-card.is-flip {
  will-change: transform, opacity;
}
.card-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background:
    radial-gradient(900px 120px at 50% 0, rgba(255,255,255,0.03), transparent 60%),
    rgba(255,255,255,0.01);
}
.rank-block {
  min-width: 0;
}
.rank-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.rank-num {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.ai-name {
  font-size: 19px;
  font-weight: 780;
  letter-spacing: -0.02em;
  min-width: 0;
}
.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
}
.status-chip.is-done { color: var(--green); background: rgba(82,196,122,0.08); border-color: rgba(82,196,122,0.15); }
.status-chip.is-running { color: var(--blue); background: rgba(88,152,224,0.08); border-color: rgba(88,152,224,0.15); }
.status-chip.is-waiting { color: var(--muted); }
.rank-pill.animate { animation: pillPop 0.3s ease 0.6s both; }
@keyframes pillPop {
  0% { opacity: 0; transform: scale(1.3); }
  100% { opacity: 1; transform: scale(1); }
}

.loot-meta {
  padding: 0 14px 14px;
}
.loot-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.loot-bar {
  position: relative;
  height: 10px;
  flex: 1;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.07);
}
.loot-fill {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, rgba(232,160,48,0.95), rgba(232,160,48,0.55));
  transition: width 800ms ease-out;
}
.take-badge {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  flex-shrink: 0;
  opacity: 1;
}
.take-badge.animate { animation: takeFade 0.4s ease 0.7s both; }
@keyframes takeFade {
  from { opacity: 0; transform: translateY(-2px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-body {
  padding: 0 14px 14px;
  display: grid;
  gap: 14px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 10px 10px 9px;
}
.stat-key {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-val {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}
.stat-val.accent { color: var(--accent); }
.coverage {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 6px;
  margin-bottom: 10px;
}
.coverage-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: center;
  gap: 8px;
}
.coverage-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: right;
}
.coverage-label.zero { color: var(--red); }
.coverage-stack {
  display: flex;
  flex-direction: row;
  gap: 3px;
}
.coverage-seg {
  flex: 1;
  height: 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.08);
}
.coverage-seg.on.hack { background: var(--sk-hack); }
.coverage-seg.on.safe { background: var(--sk-safe); }
.coverage-seg.on.musc { background: var(--sk-musc); }
.coverage-seg.on.soc  { background: var(--sk-soc);  }
.coverage-seg.on.drive { background: var(--sk-drive); }
.round-history { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.round-row {
  display: grid;
  grid-template-columns: 26px 1fr auto 18px auto;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  padding: 4px 6px;
  border-radius: 5px;
  border: 1px solid transparent;
  background: rgba(255,255,255,0.03);
}
.round-row.rh-nav {
  cursor: pointer;
}
.round-row.rh-nav:hover {
  background: rgba(232,160,48,0.07);
  border: 1px solid rgba(232,160,48,0.2);
}
.rh-links {
  display: flex;
  gap: 4px;
}
.rh-num { color: var(--muted); font-weight: 800; font-size: 10px; }
.rh-job { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rh-take { color: var(--accent); font-weight: 700; }
.rh-icon { text-align: center; font-size: 12px; }
.round-row.rh-clean .rh-icon { color: var(--green); }
.round-row.rh-caught .rh-icon { color: var(--red); }
.round-row.rh-fail .rh-icon { color: var(--muted); }
.round-row.rh-abort .rh-icon { color: var(--accent); }
.round-row.rh-abort .rh-job { color: var(--accent); }
.rh-abort-tag { font-size: 9px; font-weight: 700; letter-spacing: 1px; opacity: 0.8; }
.round-row.rh-sat { opacity: 0.35; }
.rh-sat-label { font-style: italic; }
.rh-hire-link {
  font-size: 9px; font-weight: 800; color: var(--accent);
  text-decoration: none; opacity: 0.7; margin-left: 4px;
}
.rh-hire-link:hover { opacity: 1; }

.crew-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
  gap: 10px;
}
.crew-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--panel2);
}
.crew-card[data-primary="hack"] { border-color: rgba(88,152,224,0.55); }
.crew-card[data-primary="safe"] { border-color: rgba(232,160,48,0.55); }
.crew-card[data-primary="musc"] { border-color: rgba(224,80,80,0.55); }
.crew-card[data-primary="soc"] { border-color: rgba(144,112,224,0.55); }
.crew-card[data-primary="drive"] { border-color: rgba(82,196,122,0.55); }
.crew-card .portrait {
  aspect-ratio: 1;
  width: 100%;
  background: rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}
.crew-card .portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
.crew-card .portrait .fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  font-weight: 800;
  color: rgba(255,255,255,0.22);
  font-family: monospace;
}
.crew-card .name-strip {
  min-height: 34px;
  padding: 5px 8px 6px;
  display: flex;
  align-items: flex-end;
  font-size: 11px;
  font-weight: 800;
  line-height: 1.25;
  color: #fff;
}
.crew-card[data-primary="hack"] .name-strip { background: var(--sk-hack); color: #0a1428; }
.crew-card[data-primary="safe"] .name-strip { background: var(--sk-safe); color: #2a1c08; }
.crew-card[data-primary="musc"] .name-strip { background: var(--sk-musc); color: #2a0808; }
.crew-card[data-primary="soc"] .name-strip { background: var(--sk-soc); color: #1c1030; }
.crew-card[data-primary="drive"] .name-strip { background: var(--sk-drive); color: #0a2018; }
.crew-card[data-captured="true"] {
  opacity: 0.25;
  filter: grayscale(1);
  border-style: dashed;
  border-color: rgba(224,80,80,0.7);
}
.crew-card.newly-captured {
  opacity: 1;
  filter: none;
}
.crew-pill {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 2;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 3px 6px;
  color: #fff;
  background: rgba(0,0,0,0.66);
}

/* Reflection rail */
.tabs {
  display: flex;
  gap: 6px;
  padding: 12px 12px 10px;
  flex-shrink: 0;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: rgba(18,18,20,0.96);
}
.tab-btn {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--muted);
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.3px;
  white-space: nowrap;
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.tab-btn:hover { color: var(--text); border-color: rgba(232,160,48,0.35); }
.tab-btn.active { color: var(--text); border-color: rgba(232,160,48,0.5); background: rgba(232,160,48,0.08); }
.rail-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}
.rail-label {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.rail-copy {
  font-size: 13px;
  line-height: 1.65;
  color: #d3cee2;
  white-space: pre-wrap;
}
.rail-copy.emph { color: var(--text); }
.rail-empty {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.rail-live {
  font-size: 13px;
  line-height: 1.65;
  color: #d0cbe0;
}
.watch-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid rgba(232,160,48,0.22);
  background: rgba(232,160,48,0.10);
  color: var(--accent);
  text-decoration: none;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.watch-link:hover { border-color: rgba(232,160,48,0.4); background: rgba(232,160,48,0.16); }

/* Mind of AI — thought stream */
.mind-sep { border-top: 1px solid var(--border); margin: 14px 0 12px; }
.mind-round-label {
  font-size: 9px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.mind-round-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.mind-round-pill {
  appearance: none; border: 1px solid var(--border); background: var(--panel2);
  color: var(--muted); border-radius: 999px; padding: 4px 8px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
  cursor: pointer; transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.mind-round-pill.active { color: var(--text); border-color: rgba(232,160,48,0.5); background: rgba(232,160,48,0.08); }
.mind-round-pill:hover { color: var(--text); border-color: rgba(232,160,48,0.3); }
.thought-line {
  font-size: 12px; line-height: 1.55; padding: 8px 10px;
  border-radius: 6px; background: var(--panel2);
  border-left: 3px solid var(--border); margin-bottom: 6px;
}
.thought-kind { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.thought-body { color: #d0cee0; white-space: pre-wrap; }
.thought-line.tk-job     { border-left-color: var(--purple); }
.thought-line.tk-job     .thought-kind { color: var(--purple); }
.thought-line.tk-scene   { border-left-color: var(--muted); }
.thought-line.tk-narrate { border-left-color: var(--border); background: var(--panel3); }
.thought-line.tk-narrate .thought-kind { color: var(--blue); }
.thought-line.tk-epilogue { border-left-color: var(--accent); }
.thought-line.tk-epilogue .thought-kind { color: var(--accent); }
.mind-empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 6px 0; }

.state-error {
  padding: 22px 18px;
  color: var(--red);
  font-size: 13px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a34; border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: #40404c; }

@media (max-width: 1200px) {
  body { overflow: auto; }
  .layout { grid-template-columns: 1fr; overflow: visible; }
  .panel + .panel { border-left: 0; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>
  <div class="shell">
    <header class="mast">
      <div class="brand"><a href="/" class="brand-home">Heist</a><span class="brand-sep"> / </span><span class="brand-sub">Campaign War Room</span></div>
      <div class="live-dot"></div>
      <div class="meta" id="meta">Waiting for campaign state…</div>
      <div class="status-pill" id="status-pill">LOADING</div>
    </header>

    <div class="pacing-bar">
      <span class="pacing-stage" id="pacing-stage"></span>
      <div class="pacing-nav">
        <button class="pacing-btn" id="btn-prev">← Prev</button>
        <span class="pacing-pos" id="pacing-pos">Round — / —</span>
        <button class="pacing-btn" id="btn-next">Next →</button>
      </div>
      <button class="pacing-btn pacing-auto" id="btn-auto">Auto</button>
    </div>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-kicker">The Wire</div>
          <div class="panel-title">Trash Talk Feed</div>
          <div class="panel-sub" id="center-sub">Round — wire</div>
        </div>
        <div class="scroll" id="wire"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-kicker">Standings</div>
          <div class="panel-title">Leaderboard</div>
          <div class="panel-sub">Sorted by banked loot.</div>
        </div>
        <div class="scroll">
          <div class="standings-list" id="standings"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <div class="panel-kicker">Reflection Rail</div>
          <div class="panel-title">Mind of AI</div>
          <div class="panel-sub">Round-by-round AI reasoning and narration.</div>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="scroll" id="rail"></div>
      </aside>
    </main>
  </div>

<script>
(function() {
  const SKILL_KEYS = ['hack', 'safe', 'musc', 'soc', 'drive'];
  const SKILL_API = {
    hack: 'hacker',
    safe: 'safecracker',
    musc: 'muscle',
    soc: 'inside_man',
    drive: 'driver',
  };
  const SKILL_ORDER = ['hacker', 'safecracker', 'muscle', 'inside_man', 'driver'];
  const SKILL_VALUE = { HIGH: 3, MEDIUM: 2, LOW: 1, NONE: 0 };

  const params = new URLSearchParams(location.search);
  const gameId = params.get('game') || window.__campaignGameId || location.pathname.match(/\/campaign\/(\d+)/)?.[1] || '';
  const stateUrl = `/api/campaign/${encodeURIComponent(gameId)}/state`;

  const wireEl = document.getElementById('wire');
  const standingsEl = document.getElementById('standings');
  const tabsEl = document.getElementById('tabs');
  const railEl = document.getElementById('rail');
  const metaEl = document.getElementById('meta');
  const statusPill = document.getElementById('status-pill');
  const centerSub = document.getElementById('center-sub');

  let previousState = null;
  let selectedAiIdx = 0;
  let viewedRound = 0;
  let autoMode = true;
  let pollTimer = null;

  // ── Mind of AI ──────────────────────────────────────────────────────────────
  // _thoughtCache: key `${aiIdx}:${gameId}` → { thoughts: [...], done: bool }
  // _selectedRoundByAi: aiIdx → game_id of the round currently shown in rail
  const _thoughtCache = {};
  const _selectedRoundByAi = {};

  function eventsToThoughts(events) {
    const thoughts = [];
    for (const e of events) {
      if (e.type !== 'turn_end') continue;
      const label  = e.label  || '';
      const parsed = e.parsed || {};
      const resp   = e.response || '';
      if (label === 'job_pick') {
        if (parsed.why_this) thoughts.push({ kind: 'job',    title: 'Why this job',       body: parsed.why_this });
        if (parsed.why_not)  thoughts.push({ kind: 'job',    title: 'Why not the others', body: parsed.why_not });
        if (!parsed.why_this && !parsed.why_not && (parsed.reasoning || parsed.job_name))
          thoughts.push({ kind: 'job', title: 'Job pick', body: parsed.reasoning || parsed.job_name || '—' });
      } else if (/^scene_\d+_(?:escape_)?assign$/.test(label)) {
        const num   = (label.match(/^scene_(\d+)/) || [])[1] || '?';
        const title = parsed.abort ? `Scene ${num} — abort` : `Scene ${num} — assignment`;
        thoughts.push({ kind: 'scene', title, body: parsed.reasoning || '—' });
      } else if (/^scene_\d+_(?:escape_)?narrate$/.test(label) && resp) {
        const num = (label.match(/^scene_(\d+)/) || [])[1] || '?';
        thoughts.push({ kind: 'narrate', title: `Scene ${num}`, body: resp });
      } else if (label === 'epilogue' && resp) {
        thoughts.push({ kind: 'epilogue', title: 'Epilogue', body: resp });
      }
    }
    return thoughts;
  }

  async function fetchThoughtsForRound(aiIdx, gameId) {
    const key = `${aiIdx}:${gameId}`;
    const cached = _thoughtCache[key];
    if (cached && cached.done) return;  // completed round, skip re-fetch
    try {
      const data = await fetch(`/api/games/${gameId}/events`, { cache: 'no-store' }).then(r => r.json());
      const events = data.events || [];
      const thoughts = eventsToThoughts(events);
      const done = events.some(e => e.type === 'turn_end' && e.label === 'epilogue');
      _thoughtCache[key] = { thoughts, done };
    } catch (err) {
      console.warn('thought fetch failed', key, err);
    }
  }

  async function loadThoughtsForAi(aiIdx, standings) {
    const row = (standings || []).find(s => s.ai_idx === aiIdx);
    if (!row) return;
    const rounds = (row.round_results || []).filter(r => r.game_id);
    if (!rounds.length) return;
    // default to latest round
    if (_selectedRoundByAi[aiIdx] == null)
      _selectedRoundByAi[aiIdx] = rounds[rounds.length - 1].game_id;
    await fetchThoughtsForRound(aiIdx, _selectedRoundByAi[aiIdx]);
    if (aiIdx === selectedAiIdx && previousState) renderRail(previousState);
  }

  // Round-pill click delegation
  railEl.addEventListener('click', e => {
    const pill = e.target.closest('.mind-round-pill');
    if (!pill) return;
    const aiIdx = Number(pill.dataset.ai);
    const gid   = Number(pill.dataset.gid);
    _selectedRoundByAi[aiIdx] = gid;
    fetchThoughtsForRound(aiIdx, gid).then(() => {
      if (previousState) renderRail(previousState);
    });
  });

  // Round-row click: jump to that round from the clicked AI's perspective
  standingsEl.addEventListener('click', e => {
    const row = e.target.closest('.rh-nav');
    if (!row) return;
    const roundIdx = Number(row.dataset.roundIdx);
    const aiIdx    = Number(row.dataset.aiIdx);
    autoMode = false;
    viewedRound = roundIdx;
    selectedAiIdx = aiIdx;
    const state = previousState;
    if (!state) return;
    updatePacingBar(state);
    renderRail(state);
    wireEl.innerHTML = wireHtml(state, viewedRound);
    document.getElementById('btn-auto').classList.remove('is-active');
    // Update tab highlight
    tabsEl.querySelectorAll('[data-ai-idx]').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.aiIdx) === aiIdx);
    });
  });

  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function money(n) {
    return '$' + Number(n || 0).toLocaleString();
  }

  function skillValue(level) {
    if (!level) return 0;
    if (typeof level === 'number') return level;
    if (SKILL_VALUE[level] != null) return SKILL_VALUE[level];
    return 0;
  }

  function primarySkill(member) {
    const skills = member.skills || {};
    let best = SKILL_ORDER[0];
    let bestRank = -1;
    SKILL_ORDER.forEach((apiKey, idx) => {
      const score = skillValue(skills[apiKey]);
      if (score > bestRank || (score === bestRank && idx < SKILL_ORDER.indexOf(best))) {
        best = apiKey;
        bestRank = score;
      }
    });
    return ({
      hacker: 'hack',
      safecracker: 'safe',
      muscle: 'musc',
      inside_man: 'soc',
      driver: 'drive',
    })[best] || 'hack';
  }

  function primaryColor(skill) {
    return ({
      hack: 'var(--sk-hack)',
      safe: 'var(--sk-safe)',
      musc: 'var(--sk-musc)',
      soc: 'var(--sk-soc)',
      drive: 'var(--sk-drive)',
    })[skill] || 'var(--border)';
  }

  function initials(name) {
    return String(name || '?').split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase();
  }

  function portraitHtml(member) {
    const fallback = `<div class="fallback">${esc(initials(member.name))}</div>`;
    return `
      <div class="portrait">
        ${fallback}
        <img src="/portraits/${encodeURIComponent(member.char_id || member.id)}" alt="${esc(member.name)}" loading="lazy"
             onerror="this.style.display='none'; this.previousElementSibling.style.display='flex';">
      </div>
    `;
  }

  function coverageForCrew(crew) {
    const out = { hack: 0, safe: 0, musc: 0, soc: 0, drive: 0 };
    crew.filter(m => !m.captured).forEach(member => {
      const skills = member.skills || {};
      out.hack = Math.max(out.hack, skillValue(skills.hacker));
      out.safe = Math.max(out.safe, skillValue(skills.safecracker));
      out.musc = Math.max(out.musc, skillValue(skills.muscle));
      out.soc = Math.max(out.soc, skillValue(skills.inside_man));
      out.drive = Math.max(out.drive, skillValue(skills.driver));
    });
    return out;
  }

  function latestWireForAi(state, aiIdx) {
    const aiName = state.standings.find(s => s.ai_idx === aiIdx)?.ai_name;
    const matches = state.wire.filter(w => w.ai_name === aiName);
    return matches.length ? matches[matches.length - 1] : null;
  }

  function updatePacingBar(state) {
    const STAGE_NAMES = {
      starting: 'Starting',
      opening_wire: 'Wire',
      hiring: 'Hiring',
      heist: 'Heist',
      reflection: 'Reflection',
      done: 'Done',
    };
    const STAGE_COLORS = {
      opening_wire: 'var(--accent)',
      hiring: 'var(--blue)',
      heist: 'var(--red)',
      reflection: 'var(--purple)',
      done: 'var(--green)',
    };

    const stage = state.current_stage || 'done';
    const maxRound = state.current_round_idx ?? 0;
    const total = state.total_rounds || 0;

    if (autoMode) {
      viewedRound = maxRound;
    }

    viewedRound = Math.max(0, Math.min(viewedRound, maxRound));

    const stageEl = document.getElementById('pacing-stage');
    stageEl.textContent = STAGE_NAMES[stage] || stage;
    stageEl.style.color = STAGE_COLORS[stage] || 'var(--muted)';

    document.getElementById('pacing-pos').textContent =
      total ? `Round ${viewedRound + 1} / ${total}` : 'Round — / —';

    document.getElementById('btn-prev').disabled = viewedRound <= 0;
    document.getElementById('btn-next').disabled = viewedRound >= maxRound;
    document.getElementById('btn-auto').classList.toggle('is-active', autoMode);
  }

  function statusClass(status) {
    return status === 'done' ? 'is-done' : status === 'running' ? 'is-running' : 'is-waiting';
  }

  function roundEscape(result) {
    if (!result) return 'waiting';
    if (result.escape) return result.escape;
    return 'waiting';
  }

  function cardTake(result) {
    if (!result) return 'No round yet';
    return `${result.escape === 'clean' ? 'Clean' : result.escape === 'caught' ? 'Caught' : 'Failed'} · ${money(result.take)}`;
  }

  function wireHtml(state, vRound) {
    const entries = (state.wire || []).filter(w => w.round === vRound);
    if (!entries.length) {
      return `<div class="rail-empty">The wire is quiet this round.</div>`;
    }
    return entries.map(item => `
      <div class="wire-item">
        <div class="wire-portrait">
          <div class="wire-fallback">${esc(initials(item.speaker_name))}</div>
          <img src="/portraits/${encodeURIComponent(item.speaker_char_id || '')}"
               alt="${esc(item.speaker_name)}" loading="lazy"
               onerror="this.style.display='none';this.previousElementSibling.style.display='flex';">
        </div>
        <div class="wire-body">
          <div class="wire-head">
            <div class="wire-name">${esc(item.speaker_name || 'Unknown')}</div>
            <div class="wire-target">vs ${esc(item.target_ai_name || 'unknown')}</div>
          </div>
          <div class="wire-text">${esc(item.text || '')}</div>
        </div>
      </div>
    `).join('');
  }

  function coverageHtml(crew) {
    const coverage = coverageForCrew(crew);
    const labels = { hack: 'HCK', safe: 'SFE', musc: 'MSC', soc: 'SOC', drive: 'DRV' };
    return `
      <div class="coverage">
        ${SKILL_KEYS.map(key => {
          const value = coverage[key];
          return `
            <div class="coverage-row">
              <div class="coverage-label ${value === 0 ? 'zero' : ''}">${labels[key]}</div>
              <div class="coverage-stack">
                ${[1, 2, 3].map(level =>
                  `<div class="coverage-seg ${level <= value ? 'on ' + key : ''}"></div>`
                ).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function memberCardHtml(member, newlyCaptured) {
    return `
      <div class="crew-card${member.captured ? ' captured' : ''}${newlyCaptured ? ' newly-captured' : ''}" data-primary="${member.primary || primarySkill(member)}" data-captured="${member.captured ? 'true' : 'false'}" data-char-id="${member.char_id || member.id}">
        ${member.captured ? '<div class="crew-pill">Captured</div>' : ''}
        ${portraitHtml(member)}
        <div class="name-strip">${esc(member.name)}</div>
      </div>
    `;
  }

  function lootPct(bank, maxBank) {
    if (!maxBank) return 0;
    return Math.max(0, Math.min(100, (bank / maxBank) * 100));
  }

  function standingsHtml(state, animate) {
    const prevByAi = new Map((previousState?.standings || []).map((row, idx) => [row.ai_idx, { row, idx }]));
    const maxBank = Math.max(...state.standings.map(s => s.banked || 0), 0);
    return state.standings.map((row, idx) => {
      const prev = prevByAi.get(row.ai_idx)?.row || null;
      const prevRank = prev ? prev.rank : null;
      const rankDelta = prevRank == null ? 0 : prevRank - row.rank;
      const lastRound = row.last_round;
      const reflection = row.reflection || {};
      const crew = row.crew || [];
      const latestWire = latestWireForAi(state, row.ai_idx);
      const prevCrewById = new Map((prev?.crew || []).map(m => [m.char_id || m.id, m]));
      const previousWidth = prev ? lootPct(prev.banked || 0, Math.max(...(previousState?.standings || []).map(s => s.banked || 0), 0)) : lootPct(row.banked || 0, maxBank);
      const currentWidth = lootPct(row.banked || 0, maxBank);
      const crewCards = crew.map(member => memberCardHtml(member, animate && prevCrewById.get(member.char_id || member.id)?.captured === false && member.captured)).join('');
      const watchLink = (row.status === 'done' || row.status === 'running') && row.ai_game_id
        ? `<a class="watch-link" href="/heist?game=${encodeURIComponent(row.ai_game_id)}">Watch →</a>`
        : '';
      const lootBadge = lastRound ? `Round take ${money(lastRound.take)}` : 'No rounds yet';
      // Build a full-length round history padded to total_rounds.
      // AIs that were wiped early show "sat out" entries for rounds they missed.
      const playedByRound = new Map((row.round_results || []).map(r => [r.round_idx, r]));
      const totalRounds = state.total_rounds || 0;
      const allRoundRows = Array.from({ length: totalRounds }, (_, i) => {
        const r = playedByRound.get(i);
        if (!r) {
          return `<div class="round-row rh-sat">
        <span class="rh-num">R${i + 1}</span>
        <span class="rh-job rh-sat-label">sat out</span>
        <span class="rh-take">—</span>
        <span class="rh-icon">·</span>
      </div>`;
        }
        const isAbort = r.aborted;
        const cls = isAbort ? 'rh-abort' : r.escape === 'clean' ? 'rh-clean' : r.escape === 'caught' ? 'rh-caught' : 'rh-fail';
        const icon = isAbort ? '↩' : r.escape === 'clean' ? '✓' : r.escape === 'caught' ? '✗' : '~';
        const hgid = r.hiring_game_id;
        const hireLink = hgid
          ? `<a class="rh-hire-link" href="/hiring?game=${encodeURIComponent(hgid)}" title="Watch hiring" onclick="event.stopPropagation()">H</a>`
          : '';
        const watchLink = r.game_id
          ? `<a class="rh-hire-link" href="/heist?game=${encodeURIComponent(r.game_id)}" title="Watch heist" onclick="event.stopPropagation()">→</a>`
          : '';
        return `<div class="round-row ${cls} rh-nav" data-round-idx="${r.round_idx}" data-ai-idx="${row.ai_idx}">
        <span class="rh-num">R${(r.round_idx + 1)}</span>
        <span class="rh-job">${esc(r.job_name || '—')}${isAbort ? ' <span class="rh-abort-tag">ABORT</span>' : ''}</span>
        <span class="rh-take">${money(r.take || 0)}</span>
        <span class="rh-icon">${icon}</span>
        <span class="rh-links">${hireLink}${watchLink}</span>
      </div>`;
      });
      const roundHistoryHtml = totalRounds
        ? `<div class="round-history">${allRoundRows.join('')}</div>`
        : '';
      return `
        <article class="ai-card${animate ? ' is-flip' : ''}" data-ai-idx="${row.ai_idx}" data-rank="${row.rank}">
          <div class="card-top">
            <div class="rank-block">
              <div class="rank-row">
                <div class="rank-num">Rank ${row.rank}</div>
                <div class="ai-name">${esc(row.ai_name)}</div>
                <div class="status-chip ${statusClass(row.status)}">${esc(row.status)}</div>
                ${rankDelta !== 0 ? `<div class="status-chip ${rankDelta > 0 ? 'is-done' : 'is-waiting'} rank-pill${animate ? ' animate' : ''}">${rankDelta > 0 ? '↑' : '↓'}${Math.abs(rankDelta)}</div>` : ''}
              </div>
              <div class="panel-sub" style="margin-top:8px;">Banked ${money(row.banked)} · Notoriety ${row.notoriety}</div>
            </div>
            <div style="text-align:right;">
              <div class="status-chip ${statusClass(row.status)}">${row.status}</div>
              ${watchLink}
            </div>
          </div>
          <div class="loot-meta">
            <div class="loot-row">
              <div class="loot-bar"><div class="loot-fill" style="width:${animate ? previousWidth : currentWidth}%"></div></div>
              <div class="take-badge${animate ? ' animate' : ''}">${esc(lootBadge)}</div>
            </div>
          </div>
          <div class="card-body">
            <div class="stats-row">
              <div class="stat">
                <div class="stat-key">Last round</div>
                <div class="stat-val accent">${esc(lastRound ? `R${latestWire ? latestWire.round : state.round} · ${lastRound.job}` : 'Waiting')}</div>
              </div>
              <div class="stat">
                <div class="stat-key">Escape</div>
                <div class="stat-val">${esc(lastRound ? roundEscape(lastRound) : row.status)}</div>
              </div>
              <div class="stat">
                <div class="stat-key">Reflection</div>
                <div class="stat-val">${esc(reflection.learned ? 'Ready' : '—')}</div>
              </div>
            </div>

            ${coverageHtml(crew)}

            <div>
              <div class="panel-kicker" style="margin-bottom:10px;">Crew</div>
              <div class="crew-grid">
                ${crewCards}
              </div>
            </div>

            ${roundHistoryHtml}
          </div>
        </article>
      `;
    }).join('');
  }

  function railHtml(state, vRound) {
    const selected = state.standings.find(s => s.ai_idx === selectedAiIdx) || state.standings[0];
    if (!selected) return `<div class="rail-empty">No crew available yet.</div>`;

    const roundReflection = (selected.reflections_by_round || []).find(r => r.round === vRound) || {};
    const learnedText = roundReflection.learned || 'No reflection yet.';
    const planText = roundReflection.plan || 'No plan yet.';
    const roundLabel = `Round ${vRound + 1}`;

    const liveText = selected.status === 'running'
      ? 'The round is in motion.'
      : selected.status === 'done'
        ? 'Waiting for the next round to begin.'
        : 'Waiting for round to start...';

    const rounds   = (selected.round_results || []).filter(r => r.game_id);
    const selGid   = _selectedRoundByAi[selected.ai_idx] || (rounds.length ? rounds[rounds.length - 1].game_id : null);
    const cacheKey = selGid ? `${selected.ai_idx}:${selGid}` : null;
    const cached   = cacheKey ? _thoughtCache[cacheKey] : null;
    const thoughts = cached ? cached.thoughts : [];

    let mindHtml = '';
    if (rounds.length) {
      const pillsHtml = rounds.map(r => {
        const active = r.game_id === selGid ? ' active' : '';
        return `<button class="mind-round-pill${active}" data-ai="${selected.ai_idx}" data-gid="${r.game_id}">R${r.round_idx + 1}</button>`;
      }).join('');
      const thoughtsHtml = thoughts.length
        ? thoughts.map(t => `
          <div class="thought-line tk-${t.kind}">
            <div class="thought-kind">${esc(t.title)}</div>
            <div class="thought-body">${esc(t.body)}</div>
          </div>`).join('')
        : `<div class="mind-empty">Loading round thinking…</div>`;
      mindHtml = `
        <div class="mind-sep"></div>
        <div class="mind-round-label">Round Playback</div>
        <div class="mind-round-pills">${pillsHtml}</div>
        ${thoughtsHtml}`;
    }

    return `
      <div class="rail-card">
        <div class="rail-label">${esc(roundLabel)} · What I learned</div>
        <div class="rail-copy emph">${esc(learnedText)}</div>
      </div>
      <div class="rail-card">
        <div class="rail-label">${esc(roundLabel)} · Plan</div>
        <div class="rail-copy">${esc(planText)}</div>
      </div>
      <div class="rail-card">
        <div class="rail-label">Live</div>
        <div class="rail-live">${esc(liveText)}</div>
      </div>
      ${mindHtml}
    `;
  }

  function renderTabs(state) {
    tabsEl.innerHTML = state.standings.map(row => `
      <button class="tab-btn${row.ai_idx === selectedAiIdx ? ' active' : ''}" data-ai-idx="${row.ai_idx}">${esc(row.ai_name)}</button>
    `).join('');
    tabsEl.querySelectorAll('[data-ai-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedAiIdx = Number(btn.dataset.aiIdx);
        renderRail(previousState || state);
        renderTabs(previousState || state);
        loadThoughtsForAi(selectedAiIdx, (previousState || state).standings);
      });
    });
  }

  function renderRail(state) {
    railEl.innerHTML = railHtml(state, viewedRound);
  }

  function renderState(state, animate) {
    updatePacingBar(state);
    metaEl.innerHTML = `Round <strong>${state.round}</strong> / ${state.total_rounds} · <strong>${state.standings.length}</strong> AIs`;
    const hasRunning = state.standings.some(s => s.status === 'running');
    statusPill.textContent = hasRunning ? 'LIVE' : 'SYNCED';
    statusPill.className = hasRunning ? 'status-pill is-live' : 'status-pill';
    centerSub.textContent = `Round ${viewedRound + 1} wire`;

    const prevRects = new Map();
    if (animate) {
      standingsEl.querySelectorAll('.ai-card').forEach(card => {
        prevRects.set(card.dataset.aiIdx, card.getBoundingClientRect());
      });
    }

    standingsEl.innerHTML = standingsHtml(state, animate);
    renderTabs(state);
    renderRail(state);
    wireEl.innerHTML = wireHtml(state, viewedRound);

    if (animate) {
      const maxPrevBank = Math.max(...(previousState?.standings || []).map(s => s.banked || 0), 0);
      standingsEl.querySelectorAll('.ai-card').forEach((card, idx) => {
        const oldRect = prevRects.get(card.dataset.aiIdx);
        const newRect = card.getBoundingClientRect();
        const delay = idx * 35;
        if (oldRect) {
          const dy = oldRect.top - newRect.top;
          card.style.transform = `translateY(${dy}px)`;
          card.style.transition = 'transform 500ms ease, opacity 500ms ease';
          card.style.transitionDelay = `${delay}ms`;
          requestAnimationFrame(() => {
            card.style.transform = 'translateY(0)';
            card.style.opacity = '1';
          });
        } else {
          card.style.opacity = '0';
          card.style.transform = 'translateY(14px)';
          card.style.transition = 'transform 500ms ease, opacity 500ms ease';
          card.style.transitionDelay = `${delay}ms`;
          requestAnimationFrame(() => {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          });
        }

      const prev = (previousState?.standings || []).find(s => s.ai_idx === Number(card.dataset.aiIdx));
      const lootFill = card.querySelector('.loot-fill');
        if (lootFill) {
          const prevWidth = prev ? lootPct(prev.banked || 0, maxPrevBank) : lootPct(0, maxPrevBank);
          const nextWidth = lootPct((state.standings.find(s => s.ai_idx === Number(card.dataset.aiIdx)) || {}).banked || 0, Math.max(...state.standings.map(s => s.banked || 0), 0));
          lootFill.style.width = animate ? `${prevWidth}%` : `${nextWidth}%`;
          requestAnimationFrame(() => { lootFill.style.width = `${nextWidth}%`; });
        }

        (state.standings.find(s => s.ai_idx === Number(card.dataset.aiIdx))?.crew || []).forEach(member => {
          const prevMember = prev?.crew?.find(m => String(m.char_id || m.id) === String(member.char_id || member.id));
          if (!member.captured || !prevMember || prevMember.captured) return;
          const crewCard = card.querySelector(`.crew-card[data-char-id="${CSS.escape(String(member.char_id || member.id))}"]`);
          if (crewCard) {
            crewCard.classList.add('newly-captured');
            setTimeout(() => crewCard.classList.remove('newly-captured'), 20);
          }
        });
      });
    } else {
      statusPill.className = hasRunning ? 'status-pill is-live' : 'status-pill';
      standingsEl.querySelectorAll('.loot-fill').forEach((fill, idx) => {
        const row = state.standings[idx];
        fill.style.width = `${lootPct(row.banked || 0, Math.max(...state.standings.map(s => s.banked || 0), 0))}%`;
      });
    }
  }

  function needsAnimation(next) {
    if (!previousState) return false;
    if (next.round !== previousState.round) return true;
    const prevStatuses = previousState.standings.map(s => `${s.ai_idx}:${s.status}`);
    const nextStatuses = next.standings.map(s => `${s.ai_idx}:${s.status}`);
    return prevStatuses.join('|') !== nextStatuses.join('|');
  }

  async function loadState() {
    if (!gameId) {
      statusPill.className = 'status-pill is-error';
      statusPill.textContent = 'NO GAME';
      metaEl.textContent = 'Missing game id.';
      return;
    }
    try {
      const next = await fetch(stateUrl, { cache: 'no-store' }).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      });
      if (!next || !next.standings) throw new Error('bad campaign payload');
      if (!previousState) selectedAiIdx = next.standings[0]?.ai_idx ?? 0;
      if (!next.standings.some(s => s.ai_idx === selectedAiIdx)) {
        selectedAiIdx = next.standings[0]?.ai_idx ?? 0;
      }
      renderState(next, needsAnimation(next));
      previousState = next;
      loadThoughtsForAi(selectedAiIdx, next.standings);
    } catch (err) {
      statusPill.className = 'status-pill is-error';
      statusPill.textContent = 'ERROR';
      metaEl.textContent = `Failed to load campaign state: ${err.message || err}`;
      wireEl.innerHTML = `<div class="state-error">${esc(err.message || err)}</div>`;
      standingsEl.innerHTML = '';
      tabsEl.innerHTML = '';
      railEl.innerHTML = '';
    }
  }

  loadState();
  document.getElementById('btn-prev').addEventListener('click', () => {
    autoMode = false;
    document.getElementById('btn-auto').classList.remove('is-active');
    viewedRound = Math.max(0, viewedRound - 1);
    if (previousState) renderState(previousState, false);
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    const maxRound = previousState ? (previousState.current_round_idx ?? 0) : 0;
    viewedRound = Math.min(viewedRound + 1, maxRound);
    if (previousState) renderState(previousState, false);
  });

  document.getElementById('btn-auto').addEventListener('click', () => {
    autoMode = !autoMode;
    if (autoMode && previousState) {
      viewedRound = previousState.current_round_idx ?? 0;
      renderState(previousState, false);
    }
    document.getElementById('btn-auto').classList.toggle('is-active', autoMode);
  });
  pollTimer = setInterval(loadState, 5000);
  window.addEventListener('beforeunload', () => pollTimer && clearInterval(pollTimer));
})();
</script>
</body>
</html>
