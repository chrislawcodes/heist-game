<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Heist — Campaign War Room</title>
<style>
:root {
  --bg: #0b0b0e;
  --panel: #121214;
  --panel2: #17171c;
  --panel3: #1d1d24;
  --border: #26262d;
  --text: #e1dfe8;
  --muted: #72717a;
  --accent: #e8a030;
  --green: #52c47a;
  --red: #e05050;
  --blue: #5898e0;
  --purple: #9070e0;
  --sk-hack:  #5898e0;
  --sk-safe:  #e8a030;
  --sk-musc:  #e05050;
  --sk-soc:   #9070e0;
  --sk-drive: #52c47a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background:
    radial-gradient(1100px 460px at 50% -120px, rgba(232,160,48,0.08), transparent 60%),
    radial-gradient(800px 360px at 18% 18%, rgba(88,152,224,0.08), transparent 55%),
    radial-gradient(900px 360px at 82% 24%, rgba(144,112,224,0.08), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}
.shell {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.mast {
  height: 54px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(18,18,20,0.92);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.brand {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
.brand-home {
  color: var(--accent);
  text-decoration: none;
}
.brand-home:hover { text-decoration: underline; opacity: 0.8; }
.brand-sep { color: var(--muted); font-weight: 400; }
.brand-sub { color: var(--muted); font-weight: 600; letter-spacing: 2px; }
.meta {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.3px;
}
.meta strong { color: var(--text); font-weight: 700; }
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(82,196,122,0.12);
}
.status-pill {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  background: var(--panel2);
  border-radius: 999px;
  padding: 6px 10px;
}
.status-pill.is-live { color: var(--green); border-color: rgba(82,196,122,0.25); }
.status-pill.is-retrying { color: var(--accent); border-color: rgba(232,160,48,0.28); }
.status-pill.is-stalled { color: var(--red); border-color: rgba(224,80,80,0.28); }
.status-pill.is-done { color: var(--green); border-color: rgba(82,196,122,0.25); }
.status-pill.is-error { color: var(--red); border-color: rgba(224,80,80,0.25); }
.status-pill .live-dot,
.status-pill .heartbeat-dot,
.status-pill .retry-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex: none;
}
.status-pill.is-live .live-dot {
  color: var(--green);
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(82,196,122,0.10);
  animation: pulse-dot 1.35s ease-in-out infinite;
}
.status-pill.is-retrying .retry-dot {
  color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(232,160,48,0.08);
  animation: pulse-retry 1.85s ease-in-out infinite;
}
.status-pill.is-stalled .heartbeat-dot {
  color: var(--red);
  background: var(--red);
}

.pacing-bar {
  min-height: 64px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.pacing-btn {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--panel3);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.pacing-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.pacing-btn:not(:disabled):hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.18);
}
.pacing-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;
}
.pacing-pos {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--text);
  min-width: 90px;
  text-align: center;
}
.stage-stepper {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  min-width: 0;
  flex: 1 1 360px;
}
.stage-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.stage-node {
  position: relative;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.16);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}
.stage-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
}
.stage-item.is-done .stage-node {
  background: rgba(82,196,122,0.22);
  border-color: rgba(82,196,122,0.38);
  color: var(--green);
}
.stage-item.is-done .stage-node::before {
  content: "\2713";
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
  color: currentColor;
}
.stage-item.is-done .stage-label {
  color: #c8d5d0;
}
.stage-item.is-current .stage-node {
  background: var(--blue);
  border-color: rgba(88,152,224,0.95);
  box-shadow: 0 0 0 0 rgba(88,152,224,0.24);
  animation: ring-pulse 1.9s ease-in-out infinite;
}
.stage-item.is-current .stage-label {
  color: var(--text);
}
.stage-item.is-upcoming .stage-node {
  background: transparent;
  border-color: rgba(255,255,255,0.18);
}
.stage-connector {
  width: 18px;
  height: 2px;
  background: rgba(255,255,255,0.14);
  border-radius: 999px;
  flex: none;
}
.strip-ticker {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  min-width: 240px;
  font-size: 12px;
  line-height: 1.35;
  color: #c8c4d7;
  text-align: right;
  flex: 0 1 320px;
  margin-left: auto;
}
.strip-ticker .strip-now {
  color: var(--text);
  font-weight: 700;
}
.strip-ticker .strip-age {
  color: var(--green);
  font-weight: 800;
}
.strip-retry {
  color: #d7c08d;
}
.strip-retry .strip-now {
  color: var(--text);
}
.strip-retry .strip-retry-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(232,160,48,0.08);
  border: 1px solid rgba(232,160,48,0.18);
  color: var(--accent);
  font-weight: 900;
  white-space: nowrap;
}
.strip-retry .strip-age {
  color: var(--accent);
}
.strip-stalled {
  color: #bba9ad;
}
.strip-stalled .strip-age {
  color: var(--red);
}
.strip-stalled-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(224,80,80,0.08);
  border: 1px solid rgba(224,80,80,0.18);
  color: var(--red);
  font-weight: 900;
  white-space: nowrap;
}
.ticker-dot,
.ticker-retry-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex: none;
}
.ticker-live .ticker-dot {
  color: var(--green);
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(82,196,122,0.08);
  animation: pulse-dot 1.35s ease-in-out infinite;
}
.ticker-retry .ticker-retry-dot {
  color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(232,160,48,0.08);
  animation: pulse-retry 1.85s ease-in-out infinite;
}
.pacing-auto.is-active {
  color: var(--green);
  border-color: rgba(82,196,122,0.35);
  background: rgba(82,196,122,0.08);
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.72); opacity: 0.5; }
}

@keyframes pulse-retry {
  0%, 100% { transform: scale(1); opacity: 0.95; }
  50% { transform: scale(0.82); opacity: 0.62; }
}

@keyframes ring-pulse {
  0% { box-shadow: 0 0 0 0 rgba(88,152,224,0.34); }
  70% { box-shadow: 0 0 0 8px rgba(88,152,224,0.00); }
  100% { box-shadow: 0 0 0 0 rgba(88,152,224,0.00); }
}

@keyframes barPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

.layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr) 380px;
}
.panel {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel + .panel { border-left: 1px solid var(--border); }
.panel-head {
  flex-shrink: 0;
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(18,18,20,0.88);
}
.panel-kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.panel-title {
  font-size: 18px;
  font-weight: 750;
  letter-spacing: -0.02em;
  color: var(--text);
}
.panel-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}
.scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px;
}
.standings-scroll {
  padding: 56px 14px 56px;
  position: relative;
}

/* Wire */
.wire-round {
  margin: 14px 0 8px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
}
.wire-round::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.wire-item {
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr);
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.wire-portrait {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--panel3);
  position: relative;
  flex-shrink: 0;
}
.wire-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
.wire-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: rgba(255,255,255,0.24);
  font-family: monospace;
}
.wire-body {
  min-width: 0;
}
.wire-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.wire-name {
  font-size: 12px;
  font-weight: 750;
  color: var(--text);
}
.wire-target {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
}
.wire-text {
  font-size: 13px;
  line-height: 1.55;
  color: #c8c4d7;
  white-space: pre-wrap;
}

/* Standings */
.standings-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.round-card {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 220ms ease, transform 220ms ease;
}
.round-card.show {
  opacity: 1;
  transform: translateY(0);
}
.round-card-inner {
  min-width: 288px;
  max-width: calc(100% - 36px);
  padding: 22px 28px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(19,19,22,0.96);
  text-align: center;
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
}
.round-card-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.7px;
  color: var(--text);
  margin-bottom: 6px;
}
.round-card-sub {
  font-size: 11px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
}
.ai-card {
  position: relative;
  background: linear-gradient(180deg, rgba(23,23,28,0.98) 0%, rgba(18,18,20,0.98) 100%);
  border: 1px solid var(--border);
  border-left-width: 4px;
  border-left-color: transparent;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 12px 28px rgba(0,0,0,0.18);
}
.ai-card.is-flip,
.ai-card.is-reveal {
  will-change: transform, opacity;
}
.ai-card.spotlight {
  z-index: 8;
  box-shadow:
    0 22px 44px rgba(0,0,0,0.42),
    0 0 0 1px rgba(232,160,48,0.18),
    0 0 30px rgba(232,160,48,0.12);
  will-change: transform;
}
.ai-card.winner {
  box-shadow: 0 0 0 1px rgba(232,160,48,0.16), 0 0 24px rgba(232,160,48,0.14);
}
.ai-card.winner::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(120deg, rgba(232,160,48,0.10), rgba(232,160,48,0.00) 60%);
  animation: winnerFlash 900ms ease-out;
}
.ai-card[data-ai-color="accent"] { border-left-color: var(--accent); }
.ai-card[data-ai-color="blue"] { border-left-color: var(--blue); }
.ai-card[data-ai-color="purple"] { border-left-color: var(--purple); }
.ai-card[data-ai-color="green"] { border-left-color: var(--green); }
.ai-card[data-ai-color="red"] { border-left-color: var(--red); }
.card-top {
  display: grid;
  grid-template-columns: 64px 10px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 14px 14px 12px;
}
.rank-block {
  width: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1;
}
.rank-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.rank-num {
  font-size: 28px;
  line-height: 1;
  font-weight: 900;
  font-family: monospace;
  color: var(--text);
}
.rank-num.winner {
  color: var(--accent);
}
.rank-change {
  margin-top: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  opacity: 0;
  transform: translateY(-3px) scale(0.96);
  transition: opacity 140ms ease, transform 140ms ease;
}
.rank-change.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.rank-change.up {
  background: rgba(82,196,122,0.12);
  color: var(--green);
}
.rank-change.dn {
  background: rgba(224,80,80,0.10);
  color: var(--red);
}
.rank-change.same {
  background: transparent;
  color: var(--muted);
}
.ai-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ai-dot.accent { background: var(--accent); }
.ai-dot.blue { background: var(--blue); }
.ai-dot.purple { background: var(--purple); }
.ai-dot.green { background: var(--green); }
.ai-dot.red { background: var(--red); }
.name-col {
  min-width: 0;
}
.ai-name {
  font-size: 19px;
  font-weight: 780;
  letter-spacing: -0.02em;
  min-width: 0;
  line-height: 1.1;
}
.total-col {
  min-width: 160px;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.total-val {
  font-size: 22px;
  line-height: 1;
  font-weight: 900;
  font-family: monospace;
  color: var(--accent);
}
.total-meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: nowrap;
}
.take-badge {
  min-width: 78px;
  text-align: right;
  font-size: 11px;
  font-weight: 700;
  font-family: monospace;
  color: var(--green);
  opacity: 0;
  transform: translateY(-2px);
}
.take-badge.show {
  opacity: 1;
  transform: translateY(0);
}
.heat-chip {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.heat-label {
  color: var(--muted);
  opacity: 0.75;
}
.heat-value {
  font-family: monospace;
  font-weight: 800;
}
.heat-value.n-low {
  color: var(--green);
}
.heat-value.n-med {
  color: var(--accent);
}
.heat-value.n-high {
  color: var(--red);
}
.heat-value.pulse {
  animation: barPulse 900ms ease-in-out infinite;
}
.card-body {
  padding: 0 14px 14px;
  display: grid;
  gap: 14px;
}
.crew-and-coverage {
  display: flex;
  gap: 18px;
  align-items: center;
}
.crew-and-coverage .crew-grid { flex: 0 1 auto; }
.coverage {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1 1 0;
  min-width: 0;
  max-width: 340px;
}
.coverage-row {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: center;
  gap: 8px;
}
.coverage-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: right;
}
.coverage-label.zero { color: var(--red); }
.coverage-stack {
  display: flex;
  flex-direction: row;
  gap: 3px;
}
.coverage-seg {
  flex: 1;
  height: 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.08);
}
.coverage-seg.on.hack { background: var(--sk-hack); }
.coverage-seg.on.safe { background: var(--sk-safe); }
.coverage-seg.on.musc { background: var(--sk-musc); }
.coverage-seg.on.soc  { background: var(--sk-soc);  }
.coverage-seg.on.drive { background: var(--sk-drive); }
.round-history { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.round-row {
  display: grid;
  grid-template-columns: 26px 1fr auto 18px auto;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  padding: 4px 6px;
  border-radius: 5px;
  border: 1px solid transparent;
  background: rgba(255,255,255,0.03);
}
.round-row.rh-nav {
  cursor: pointer;
}
.round-row.rh-nav:hover {
  background: rgba(232,160,48,0.07);
  border: 1px solid rgba(232,160,48,0.2);
}
.rh-links {
  display: flex;
  gap: 4px;
}
.rh-num { color: var(--muted); font-weight: 800; font-size: 10px; }
.rh-job { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rh-take { color: var(--accent); font-weight: 700; }
.rh-icon { text-align: center; font-size: 12px; }
.round-row.rh-clean .rh-icon { color: var(--green); }
.round-row.rh-caught .rh-icon { color: var(--red); }
.round-row.rh-fail .rh-icon { color: var(--muted); }
.round-row.rh-abort .rh-icon { color: var(--accent); }
.round-row.rh-abort .rh-job { color: var(--accent); }
.rh-abort-tag { font-size: 9px; font-weight: 700; letter-spacing: 1px; opacity: 0.8; }
.round-row.rh-sat { opacity: 0.35; }
.rh-sat-label { font-style: italic; }
.rh-hire-link {
  font-size: 9px; font-weight: 800; color: var(--accent);
  text-decoration: none; opacity: 0.7; margin-left: 4px;
}
.rh-hire-link:hover { opacity: 1; }

.crew-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.crew-grid .portrait-card { width: 120px; }

/* Reflection rail */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px 12px 8px;
  flex-shrink: 0;
  overflow: visible;
  border-bottom: 1px solid var(--border);
  background: rgba(18,18,20,0.96);
}
.tab-btn {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--muted);
  border-radius: 999px;
  padding: 6px 9px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.3px;
  white-space: nowrap;
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.tab-btn:hover { color: var(--text); border-color: rgba(232,160,48,0.35); }
.tab-btn.active { color: var(--text); border-color: rgba(232,160,48,0.5); background: rgba(232,160,48,0.08); }
.rail-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}
.rail-label {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.rail-copy {
  font-size: 13px;
  line-height: 1.65;
  color: #d3cee2;
  white-space: pre-wrap;
}
.rail-copy.emph { color: var(--text); }
.rail-empty {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.rail-live {
  font-size: 13px;
  line-height: 1.65;
  color: #d0cbe0;
}
.watch-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid rgba(232,160,48,0.22);
  background: rgba(232,160,48,0.10);
  color: var(--accent);
  text-decoration: none;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.watch-link:hover { border-color: rgba(232,160,48,0.4); background: rgba(232,160,48,0.16); }

.card-foot {
  padding: 0 14px 14px;
  display: grid;
  gap: 10px;
}

/* Mind of AI — thought stream */
.state-error {
  padding: 22px 18px;
  color: var(--red);
  font-size: 13px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a34; border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: #40404c; }

@media (max-width: 1200px) {
  body { overflow: auto; }
  .layout { grid-template-columns: 1fr; overflow: visible; }
  .panel + .panel { border-left: 0; border-top: 1px solid var(--border); }
}

@media (max-width: 820px) {
  .pacing-bar {
    align-items: flex-start;
  }
  .pacing-nav,
  .stage-stepper,
  .strip-ticker {
    width: 100%;
    margin-left: 0;
  }
  .strip-ticker {
    justify-content: flex-start;
    text-align: left;
  }
}

@media (prefers-reduced-motion: reduce) {
  .round-card,
  .ai-card,
  .rank-change,
  .take-badge,
  .status-pill .live-dot,
  .status-pill .retry-dot,
  .status-pill .heartbeat-dot,
  .stage-item.is-current .stage-node,
  .ticker-live .ticker-dot,
  .ticker-retry .ticker-retry-dot {
    transition-duration: 1ms !important;
    animation-duration: 1ms !important;
    animation: none !important;
  }
}
</style>
</head>
<body>
  <div class="shell">
    <header class="mast">
      <div class="brand"><a href="/" class="brand-home">Heist</a><span class="brand-sep"> / </span><span class="brand-sub">Campaign War Room</span></div>
      <div class="live-dot"></div>
      <div class="meta" id="meta">Waiting for campaign state…</div>
      <div class="status-pill" id="status-pill">LOADING</div>
    </header>

    <div class="pacing-bar">
      <div class="pacing-nav">
        <button class="pacing-btn" id="btn-prev" aria-label="Previous round">‹</button>
        <span class="pacing-pos" id="pacing-pos">ROUND — / —</span>
        <button class="pacing-btn" id="btn-next" aria-label="Next round">›</button>
      </div>
      <div class="stage-stepper" id="pacing-stepper" aria-label="Campaign stages"></div>
      <div class="strip-ticker" id="activity-ticker" aria-label="Current activity"></div>
      <button class="pacing-btn" id="btn-replay">Replay</button>
      <button class="pacing-btn pacing-auto" id="btn-auto">Auto</button>
    </div>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-kicker">The Wire</div>
          <div class="panel-title">Trash Talk Feed</div>
          <div class="panel-sub" id="center-sub">Round — wire</div>
        </div>
        <div class="scroll" id="wire"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-kicker">Standings</div>
          <div class="panel-title">Leaderboard</div>
          <div class="panel-sub">Sorted by banked loot.</div>
        </div>
        <div class="scroll standings-scroll" id="standings-scroll">
          <div class="round-card" id="round-card" aria-hidden="true">
            <div class="round-card-inner">
              <div class="round-card-title" id="round-card-title">ROUND 1 · RESULTS</div>
              <div class="round-card-sub" id="round-card-sub">of 0</div>
            </div>
          </div>
          <div class="standings-list" id="standings"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <div class="panel-kicker">Reflection Rail</div>
          <div class="panel-title">Mind of AI</div>
          <div class="panel-sub">Round-by-round AI reasoning and narration.</div>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="scroll" id="rail"></div>
      </aside>
    </main>
  </div>

<script src="/shell.js"></script>
<script>
(function() {
  const SKILL_KEYS = ['hack', 'safe', 'musc', 'soc', 'drive'];
  const SKILL_API = {
    hack: 'hacker',
    safe: 'safecracker',
    musc: 'muscle',
    soc: 'inside_man',
    drive: 'driver',
  };
  const SKILL_VALUE = { HIGH: 3, MEDIUM: 2, LOW: 1, NONE: 0 };
  const STALL_MS = 240000;
  const STAGE_ORDER = ['opening_wire', 'hiring', 'heist', 'reflection'];
  const STAGE_LABELS = {
    opening_wire: 'Wire',
    hiring: 'Hiring',
    heist: 'Heist',
    reflection: 'Reflection',
  };
  const STAGE_VERBS = {
    opening_wire: 'trash talk',
    hiring: 'bidding',
    heist: 'on the job',
    reflection: 'reflecting',
  };

  const params = new URLSearchParams(location.search);
  const gameId = params.get('game') || window.__campaignGameId || location.pathname.match(/\/campaign\/(\d+)/)?.[1] || '';
  const stateUrl = `/api/campaign/${encodeURIComponent(gameId)}/state`;

  const wireEl = document.getElementById('wire');
  const standingsEl = document.getElementById('standings');
  const tabsEl = document.getElementById('tabs');
  const railEl = document.getElementById('rail');
  const metaEl = document.getElementById('meta');
  const statusPill = document.getElementById('status-pill');
  const centerSub = document.getElementById('center-sub');
  const pacingStepperEl = document.getElementById('pacing-stepper');
  const activityTickerEl = document.getElementById('activity-ticker');

  let previousState = null;
  let selectedAiIdx = null;
  let viewedRound = 0;
  // Start on the pre-round baseline. The first live state load can jump to
  // the current round, and "Auto" keeps the view pinned to the latest round.
  let autoMode = false;
  let pollTimer = null;
  const replayBtn = document.getElementById('btn-replay');
  const roundCardEl = document.getElementById('round-card');
  const roundCardTitleEl = document.getElementById('round-card-title');
  const roundCardSubEl = document.getElementById('round-card-sub');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const motion = reduceMotion ? 0.01 : 1;
  const AI_DOT_KEYS = ['accent', 'blue', 'purple', 'green', 'red'];

  let activeReveal = null;
  let currentBoard = null;
  let heartbeatTimer = null;
  let loadHasError = false;

  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Portrait fallback initials for the wire (trash-talk) speaker avatars.
  function initials(name) {
    const parts = String(name || '').replace(/["']/g, '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    const first = parts[0][0] || '';
    const last = parts.length > 1 ? parts[parts.length - 1][0] : '';
    return (first + last).toUpperCase() || '?';
  }

  function money(n) {
    return '$' + Number(n || 0).toLocaleString();
  }

  function moneyM(n) {
    return `$${(Number(n || 0) / 1000000).toFixed(2)}M`;
  }

  function stageLabel(stage) {
    return STAGE_LABELS[stage] || stage || '';
  }

  function stageVerb(stage) {
    return STAGE_VERBS[stage] || stage || '';
  }

  function humanizeAge(ms) {
    if (!Number.isFinite(ms) || ms < 0) return '';
    if (ms < 60000) return `${Math.floor(ms / 1000)}s`;
    return `${Math.floor(ms / 60000)}m`;
  }

  function resolveProgress(progress, fallback = {}) {
    const updatedAt = progress && progress.updated_at != null ? Number(progress.updated_at) : null;
    const ageMs = updatedAt == null || !Number.isFinite(updatedAt) ? null : Date.now() - (updatedAt * 1000);
    const round = Number(
      progress?.round ??
      fallback.round ??
      fallback.current_round ??
      (((fallback.current_round_idx ?? -1) + 1) || 0)
    );
    const totalRounds = Number(progress?.total_rounds ?? fallback.total_rounds ?? fallback.num_rounds ?? 0);
    const stage = progress?.stage || fallback.current_stage || 'starting';
    const aiName = progress?.ai_name || '';
    const attempt = Number(progress?.attempt ?? 0);
    const maxAttempts = Number(progress?.max_attempts ?? 0);
    const mode = !progress
      ? 'none'
      : attempt > 1
        ? 'retrying'
        : ageMs != null && ageMs > STALL_MS
          ? 'stalled'
          : 'live';
    return {
      round,
      totalRounds,
      stage,
      stageLabel: stageLabel(stage),
      stageVerb: stageVerb(stage),
      aiName,
      attempt,
      maxAttempts,
      updatedAt,
      ageMs,
      ageText: updatedAt == null ? '0s' : humanizeAge(ageMs),
      mode,
    };
  }

  function isLiveHeartbeat(progressInfo) {
    return !!progressInfo && (progressInfo.mode === 'live' || progressInfo.mode === 'retrying');
  }

  function renderStageStepper(progressInfo, state) {
    const viewed = viewedRound;
    const liveRound = Number(progressInfo?.round ?? state.round ?? 0);
    const liveHeartbeat = isLiveHeartbeat(progressInfo);
    const inLiveView = liveHeartbeat && viewed === liveRound;
    const stageIdx = STAGE_ORDER.indexOf(progressInfo?.stage || '');
    const doneAll = state.current_stage === 'done' || (state.status === 'done');
    const beforeFirst = progressInfo?.stage === 'starting';
    const nodes = STAGE_ORDER.map((stage, index) => {
      let cls = 'stage-item';
      if (doneAll || viewed < liveRound) {
        cls += ' is-done';
      } else if (liveHeartbeat && inLiveView && index === stageIdx) {
        cls += ' is-current';
      } else if (liveHeartbeat && inLiveView && index < stageIdx) {
        cls += ' is-done';
      } else if (beforeFirst) {
        cls += ' is-upcoming';
      } else if (index < stageIdx) {
        cls += ' is-done';
      } else {
        cls += ' is-upcoming';
      }
      return `
        <div class="${cls}">
          <span class="stage-node" aria-hidden="true"></span>
          <span class="stage-label">${stageLabel(stage)}</span>
        </div>`;
    }).join('<div class="stage-connector" aria-hidden="true"></div>');
    return nodes;
  }

  function renderActivityTicker(progressInfo, state) {
    const liveHeartbeat = isLiveHeartbeat(progressInfo);
    const liveRound = Number(progressInfo?.round ?? state.round ?? 0);
    const show = liveHeartbeat && viewedRound === liveRound;
    if (!show) return '';
    const activityText = `${progressInfo.stageVerb}${progressInfo.aiName ? ` (${progressInfo.aiName})` : ''}`;
    if (progressInfo.mode === 'retrying') {
      return `
        <span class="ticker-retry" aria-hidden="true"><span class="ticker-retry-dot"></span></span>
        <span><span class="strip-now">now:</span> ${esc(activityText)}&hellip;</span>
        <span class="strip-retry-badge">&#x21bb; retry ${progressInfo.attempt}/${progressInfo.maxAttempts || '?'}</span>
        <span class="strip-age">${esc(progressInfo.ageText)}</span>`;
    }
    return `
      <span class="ticker-live" aria-hidden="true"><span class="ticker-dot"></span></span>
      <span><span class="strip-now">now:</span> ${esc(activityText)}&hellip;</span>
      <span class="strip-age">${esc(progressInfo.ageText)}</span>`;
  }

  function renderHeartbeatPill(state, progressInfo) {
    if (state.status === 'done' || state.current_stage === 'done') {
      return {
        className: 'status-pill is-done',
        text: 'DONE',
        html: 'DONE',
      };
    }
    if (progressInfo && progressInfo.mode !== 'none') {
      if (progressInfo.mode === 'retrying') {
        return {
          className: 'status-pill is-retrying',
          text: `↻ RETRYING · ${progressInfo.attempt}/${progressInfo.maxAttempts || '?'}`,
          html: `<span class="retry-dot" aria-hidden="true"></span>↻ RETRYING · ${progressInfo.attempt}/${progressInfo.maxAttempts || '?'}`,
        };
      }
      if (progressInfo.mode === 'stalled') {
        return {
          className: 'status-pill is-stalled',
          text: `STALLED · ${progressInfo.ageText}`,
          html: `<span class="heartbeat-dot" aria-hidden="true"></span>STALLED · ${progressInfo.ageText}`,
        };
      }
      return {
        className: 'status-pill is-live',
        text: `◴ LIVE · ${progressInfo.ageText}`,
        html: `<span class="live-dot" aria-hidden="true"></span>◴ LIVE · ${progressInfo.ageText}`,
      };
    }
    return {
      className: 'status-pill',
      text: 'SYNCED',
      html: 'SYNCED',
    };
  }

  function skillValue(level) {
    if (!level) return 0;
    if (typeof level === 'number') return level;
    if (SKILL_VALUE[level] != null) return SKILL_VALUE[level];
    return 0;
  }

  function coverageForCrew(crew, includeCaptured = false) {
    const out = { hack: 0, safe: 0, musc: 0, soc: 0, drive: 0 };
    crew.filter(m => includeCaptured || !m.captured).forEach(member => {
      const skills = member.skills || {};
      out.hack = Math.max(out.hack, skillValue(skills.hacker));
      out.safe = Math.max(out.safe, skillValue(skills.safecracker));
      out.musc = Math.max(out.musc, skillValue(skills.muscle));
      out.soc = Math.max(out.soc, skillValue(skills.inside_man));
      out.drive = Math.max(out.drive, skillValue(skills.driver));
    });
    return out;
  }

  function latestWireForAi(state, aiIdx) {
    const aiName = state.standings.find(s => s.ai_idx === aiIdx)?.ai_name;
    const matches = state.wire.filter(w => w.ai_name === aiName);
    return matches.length ? matches[matches.length - 1] : null;
  }

  function roundResultAt(row, roundIdx) {
    return (row.round_results || []).find(r => r.round_idx === roundIdx) || null;
  }

  function lastRoundResultAtOrBefore(row, roundIdx) {
    const results = (row.round_results || []).filter(r => r.round_idx <= roundIdx);
    if (!results.length) return null;
    return results[results.length - 1] || null;
  }

  function sumTakeThroughRound(row, roundIdx) {
    if (roundIdx < 0) return 0;
    return (row.round_results || [])
      .filter(r => r.round_idx <= roundIdx)
      .reduce((sum, r) => sum + Number(r.take || 0), 0);
  }

  function latestRoundIndex(row) {
    const results = row.round_results || [];
    return results.length ? Math.max(...results.map(r => Number(r.round_idx || 0))) : -1;
  }

  function heatClass(value) {
    if (value >= 7) return 'n-high';
    if (value >= 4) return 'n-med';
    return 'n-low';
  }

  function resolveHeat(row, result, roundIdx) {
    if (!result) return 0;
    const latestIdx = latestRoundIndex(row);
    if (roundIdx === latestIdx && Number(row.notoriety || 0) > 0) {
      return Number(row.notoriety || 0);
    }
    const after = Number(result.notoriety_after || 0);
    if (after !== 0) return after;
    const before = Number(result.notoriety_before || 0);
    if (before !== 0) return before;
    return Number(row.notoriety || 0);
  }

  function formatRankDelta(delta) {
    if (delta > 0) return `↑${delta}`;
    if (delta < 0) return `↓${Math.abs(delta)}`;
    return '—';
  }

  function aiColorKey(aiIdx, index) {
    return AI_DOT_KEYS[(Number(aiIdx ?? index) || 0) % AI_DOT_KEYS.length];
  }

  function buildRoundView(state, roundNumber) {
    const standings = Array.isArray(state.standings) ? state.standings : [];
    const roundIdx = Math.max(0, roundNumber - 1);
    const cards = standings.map((row, index) => {
      const results = row.round_results || [];
      const currentResult = roundNumber > 0 ? roundResultAt(row, roundIdx) : null;
      const previousResult = roundNumber > 1 ? roundResultAt(row, roundIdx - 1) : null;
      const beforeTotal = roundNumber > 0 ? sumTakeThroughRound(row, roundIdx - 1) : 0;
      const afterTotal = roundNumber > 0 ? sumTakeThroughRound(row, currentResult ? roundIdx : roundIdx - 1) : 0;
      const beforeRank = roundNumber > 1
        ? (previousResult?.rank_after ?? row.rank ?? index + 1)
        : (index + 1);
      const afterRank = roundNumber > 0
        ? (currentResult?.rank_after ?? previousResult?.rank_after ?? row.rank ?? index + 1)
        : (row.rank ?? index + 1);
      const rankDelta = currentResult?.rank_delta ?? 0;
      const take = currentResult?.take ?? 0;
      const heatBefore = roundNumber > 1
        ? resolveHeat(row, previousResult, roundIdx - 1)
        : 0;
      const heatAfter = roundNumber > 0
        ? resolveHeat(row, currentResult || previousResult, currentResult ? roundIdx : roundIdx - 1)
        : 0;
      const caughtIds = new Set((currentResult?.caught_member_ids || []).map(v => String(v)));
      const aiColor = aiColorKey(row.ai_idx, index);
      const sortBefore = roundNumber === 0
        ? (row.rank ?? index + 1)
        : (roundNumber === 1 ? (index + 1) : beforeRank);
      const sortAfter = roundNumber === 0
        ? (row.rank ?? index + 1)
        : afterRank;
      return {
        row,
        aiIdx: row.ai_idx,
        aiName: row.ai_name,
        aiColor,
        crew: row.crew || [],
        reflectionsByRound: row.reflections_by_round || [],
        roundResult: currentResult,
        previousResult,
        beforeTotal,
        afterTotal,
        beforeRank,
        afterRank,
        rankDelta,
        take,
        heatBefore,
        heatAfter,
        caughtIds,
        sortBefore,
        sortAfter,
        totalRounds: state.total_rounds || 0,
        roundNumber,
      };
    });
    const beforeOrder = cards.slice().sort((a, b) => a.sortBefore - b.sortBefore || a.aiIdx - b.aiIdx);
    const afterOrder = cards.slice().sort((a, b) => a.sortAfter - b.sortAfter || a.aiIdx - b.aiIdx);
    return {
      cards,
      beforeOrder,
      afterOrder,
      byAiIdx: new Map(cards.map(card => [card.aiIdx, card])),
      totalRounds: state.total_rounds || 0,
      roundNumber,
    };
  }

  function updateHeat(ref, value) {
    ref.heatValue.textContent = `${value} / 9`;
    ref.heatValue.className = `heat-value ${heatClass(value)}${value >= 7 ? ' pulse' : ''}`;
  }

  function memberCardHtml(member, caughtNow, phase, baseline) {
    const charId = String(member.char_id || member.id);
    const caughtThisRound = !baseline && phase === 'before' && caughtNow;
    const capturedVisible = !baseline && (member.captured || (phase !== 'before' && caughtNow));
    const extraClasses = [
      caughtThisRound ? 'caught-pending' : '',
      capturedVisible && phase !== 'before' && caughtNow ? 'caught-landed' : '',
    ].filter(Boolean).join(' ');
    return Shell.helpers.portraitCardHtml(member, {
      charId,
      captured: capturedVisible && !caughtThisRound,
      extraClasses,
    });
  }

  function renderCrewGrid(crew, caughtIds, phase, baseline = false) {
    return crew.map(member => memberCardHtml(member, caughtIds.has(String(member.char_id || member.id)), phase, baseline)).join('');
  }

  function coverageHtml(crew, baseline = false) {
    const coverage = coverageForCrew(crew, baseline);
    const labels = { hack: 'HCK', safe: 'SFE', musc: 'MSC', soc: 'SOC', drive: 'DRV' };
    return `
      <div class="coverage">
        ${SKILL_KEYS.map(key => {
          const value = coverage[key];
          return `
            <div class="coverage-row">
              <div class="coverage-label ${value === 0 ? 'zero' : ''}">${labels[key]}</div>
              <div class="coverage-stack">
                ${[1, 2, 3].map(level =>
                  `<div class="coverage-seg ${level <= value ? 'on ' + key : ''}"></div>`
                ).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderRoundHistory(row, totalRounds) {
    const roundZero = viewedRound === 0;
    if (roundZero) return '';
    const playedByRound = new Map((row.round_results || []).map(r => [r.round_idx, r]));
    const rows = Array.from({ length: totalRounds || 0 }, (_, i) => {
      const r = playedByRound.get(i);
      if (!r) {
        return `<div class="round-row rh-sat">
      <span class="rh-num">R${i + 1}</span>
      <span class="rh-job rh-sat-label">sat out</span>
      <span class="rh-take">—</span>
      <span class="rh-icon">·</span>
    </div>`;
      }
      const isAbort = r.aborted;
      const cls = isAbort ? 'rh-abort' : r.escape === 'clean' ? 'rh-clean' : r.escape === 'caught' ? 'rh-caught' : 'rh-fail';
      const icon = isAbort ? '↩' : r.escape === 'clean' ? '✓' : r.escape === 'caught' ? '✗' : '~';
      const hireLink = r.hiring_game_id
        ? `<a class="rh-hire-link" href="/hiring?campaign=${encodeURIComponent(gameId)}&ai=${encodeURIComponent(row.ai_idx)}&round=${encodeURIComponent(r.round_idx)}" title="Watch hiring" onclick="event.stopPropagation()">H</a>`
        : '';
      const watchLink = r.game_id
        ? `<a class="rh-hire-link" href="/heist?campaign=${encodeURIComponent(gameId)}&ai=${encodeURIComponent(row.ai_idx)}&round=${encodeURIComponent(r.round_idx)}" title="Watch heist" onclick="event.stopPropagation()">→</a>`
        : '';
      return `<div class="round-row ${cls} rh-nav" data-round-idx="${r.round_idx}" data-ai-idx="${row.ai_idx}">
      <span class="rh-num">R${r.round_idx + 1}</span>
      <span class="rh-job">${esc(r.job_name || '—')}${isAbort ? ' <span class="rh-abort-tag">ABORT</span>' : ''}</span>
      <span class="rh-take">${money(r.take || 0)}</span>
      <span class="rh-icon">${icon}</span>
      <span class="rh-links">${hireLink}${watchLink}</span>
    </div>`;
    });
    return rows.length ? `<div class="round-history">${rows.join('')}</div>` : '';
  }

  function wireHtml(state, vRound) {
    const entries = (state.wire || []).filter(w => w.round === vRound);
    if (!entries.length) {
      return `<div class="rail-empty">The wire is quiet this round.</div>`;
    }
    return entries.map(item => `
      <div class="wire-item">
        <div class="wire-portrait">
          <div class="wire-fallback">${esc(initials(item.speaker_name))}</div>
          <img src="/portraits/${encodeURIComponent(item.speaker_char_id || '')}"
               alt="${esc(item.speaker_name)}" loading="lazy"
               onerror="this.style.display='none';this.previousElementSibling.style.display='flex';">
        </div>
        <div class="wire-body">
          <div class="wire-head">
            <div class="wire-name">${esc(item.speaker_name || 'Unknown')}</div>
            <div class="wire-target">vs ${esc(item.target_ai_name || 'unknown')}</div>
          </div>
          <div class="wire-text">${esc(item.text || '')}</div>
        </div>
      </div>
    `).join('');
  }

  function renderRail(state) {
    if (!state.standings.length) {
      railEl.innerHTML = `<div class="thinking-empty">No crew available yet.</div>`;
      return;
    }

    if (viewedRound === 0) {
      railEl.innerHTML = `<div class="thinking-empty">No learnings yet — step to Round 1.</div>`;
      return;
    }

    const selectedCrew = selectedAiIdx == null
      ? state.standings
      : state.standings.filter(s => s.ai_idx === selectedAiIdx);
    if (!selectedCrew.length) {
      railEl.innerHTML = `<div class="thinking-empty">No crew available yet.</div>`;
      return;
    }

    const roundLabel = `Round ${viewedRound}`;
    const cards = selectedCrew.map(row => {
      const reflection = (row.reflections_by_round || []).find(r => r.round === viewedRound - 1) || null;
      const learnedText = reflection?.learned || 'No reflection yet.';
      const planText = reflection?.plan || 'No plan yet.';
      const bodyHtml = `
        <div class="rail-label">${esc(row.ai_name)} · What I learned</div>
        <div class="rail-copy emph">${esc(learnedText)}</div>
        <div class="rail-label">${esc(row.ai_name)} · Plan</div>
        <div class="rail-copy">${esc(planText)}</div>
      `;
      return Shell.helpers.thoughtCardHtml('strategy', `${roundLabel} · ${row.ai_name}`, bodyHtml, {});
    });
    railEl.innerHTML = cards.join('');
  }

  function refreshThinkingPanels(state) {
    renderRail(state);
  }

  function renderTabs(state) {
    const allActive = selectedAiIdx == null;
    tabsEl.innerHTML = `
      <button class="tab-btn${allActive ? ' active' : ''}" data-select="all">All</button>
      ${state.standings.map(row => `
        <button class="tab-btn${row.ai_idx === selectedAiIdx ? ' active' : ''}" data-ai-idx="${row.ai_idx}">${esc(row.ai_name)}</button>
      `).join('')}
    `;
    tabsEl.querySelectorAll('[data-ai-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedAiIdx = Number(btn.dataset.aiIdx);
        refreshThinkingPanels(previousState || state);
        renderTabs(previousState || state);
      });
    });
    const allBtn = tabsEl.querySelector('[data-select="all"]');
    if (allBtn) {
      allBtn.addEventListener('click', () => {
        selectedAiIdx = null;
        refreshThinkingPanels(previousState || state);
        renderTabs(previousState || state);
      });
    }
  }

  function updatePacingBar(state) {
    const progressInfo = resolveProgress(state.progress, state);
    const maxRound = playedRounds(state);
    const total = progressInfo.totalRounds || state.total_rounds || 0;

    if (autoMode) {
      viewedRound = maxRound;
    }

    viewedRound = Math.max(0, Math.min(viewedRound, maxRound));

    document.getElementById('pacing-pos').textContent = `ROUND ${viewedRound} / ${total}`;
    pacingStepperEl.innerHTML = renderStageStepper(progressInfo, state);

    const tickerHtml = renderActivityTicker(progressInfo, state);
    activityTickerEl.className = `strip-ticker${progressInfo.mode === 'retrying' ? ' strip-retry' : progressInfo.mode === 'stalled' ? ' strip-stalled' : ''}`;
    activityTickerEl.innerHTML = tickerHtml;
    activityTickerEl.hidden = !tickerHtml;

    const heartbeat = renderHeartbeatPill(state, progressInfo);
    statusPill.className = heartbeat.className;
    statusPill.innerHTML = heartbeat.html;

    const title = state.name || state.campaign_name;
    metaEl.innerHTML = title ? esc(title) : `<strong>${(state.standings || []).length}</strong> AIs`;

    document.getElementById('btn-prev').disabled = viewedRound <= 0;
    document.getElementById('btn-next').disabled = viewedRound >= maxRound;
    document.getElementById('btn-auto').classList.toggle('is-active', autoMode);
    replayBtn.disabled = viewedRound <= 0;
  }

  function statusClass(status) {
    return status === 'done' ? 'is-done' : status === 'running' ? 'is-running' : 'is-waiting';
  }

  function updateRoundCard(state, roundNumber) {
    if (roundNumber <= 0) {
      roundCardTitleEl.textContent = 'ROUND 0 · BASELINE';
      roundCardSubEl.textContent = 'drafted roster';
      return;
    }
    roundCardTitleEl.textContent = `ROUND ${roundNumber} · RESULTS`;
    roundCardSubEl.textContent = `of ${state.total_rounds || 0}`;
  }

  function collectCardRefs() {
    return Array.from(standingsEl.querySelectorAll('.ai-card')).map(card => ({
      aiIdx: Number(card.dataset.aiIdx),
      card,
      rank: card.querySelector('[data-role="rank"]'),
      rankChange: card.querySelector('[data-role="rank-change"]'),
      total: card.querySelector('[data-role="total"]'),
      take: card.querySelector('[data-role="take"]'),
      heatValue: card.querySelector('[data-role="heat-value"]'),
      members: Array.from(card.querySelectorAll('.portrait-card')).map(memberEl => ({
        el: memberEl,
        charId: String(memberEl.dataset.charId || ''),
      })),
    }));
  }

  function renderCardHtml(model, phase) {
    const isBefore = phase === 'before';
    const showResult = model.roundNumber > 0;
    const rankValue = isBefore ? model.beforeRank : model.afterRank;
    const totalValue = isBefore ? model.beforeTotal : model.afterTotal;
    const takeValue = isBefore ? 0 : model.take;
    const heatValue = isBefore ? model.heatBefore : model.heatAfter;
    const showDelta = !isBefore && showResult && model.rankDelta !== 0;
    const rankChangeText = showDelta ? formatRankDelta(model.rankDelta) : '';
    const rankChangeClass = `rank-change${showDelta ? ' show ' + (model.rankDelta > 0 ? 'up' : 'dn') : ''}`;
    const takeClass = `take-badge${!isBefore && showResult ? ' show' : ''}`;
    const watchLink = (model.row.status === 'done' || model.row.status === 'running') && model.row.ai_idx != null
      ? `<a class="watch-link" href="/hiring?campaign=${encodeURIComponent(gameId)}&ai=${encodeURIComponent(model.row.ai_idx)}&round=0">Watch →</a>`
      : '';
    const historyHtml = renderRoundHistory(model.row, model.totalRounds);
    const caughtIds = model.caughtIds;
    const baseline = model.roundNumber === 0;
    const crewHtml = renderCrewGrid(model.crew, caughtIds, phase, baseline);
    return `
      <article class="ai-card${!isBefore && rankValue === 1 ? ' winner' : ''}${isBefore ? ' is-reveal' : ''}" data-ai-idx="${model.aiIdx}" data-ai-color="${model.aiColor}">
        <div class="card-top">
          <div class="rank-block">
            <div class="rank-row">
              <div class="rank-num${!isBefore && rankValue === 1 ? ' winner' : ''}" data-role="rank">#${rankValue}</div>
            </div>
            <div class="${rankChangeClass}" data-role="rank-change">${esc(rankChangeText)}</div>
          </div>
          <div class="ai-dot ${model.aiColor}"></div>
          <div class="name-col">
            <div class="ai-name">${esc(model.aiName)}</div>
          </div>
          <div class="total-col">
            <div class="total-val" data-role="total">${moneyM(totalValue)}</div>
            <div class="total-meta">
              <div class="${takeClass}" data-role="take">${isBefore ? '+$0.00M' : '+' + moneyM(takeValue)}</div>
              <div class="heat-chip">
                <span class="heat-label">HEAT</span>
                <span class="heat-value ${heatClass(heatValue)}${!isBefore && heatValue >= 7 ? ' pulse' : ''}" data-role="heat-value">${heatValue} / 9</span>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="crew-and-coverage">
            <div class="crew-grid">
              ${crewHtml}
            </div>
            ${coverageHtml(model.crew, baseline)}
          </div>
          ${historyHtml}
          ${watchLink}
        </div>
      </article>
    `;
  }

  function renderStandingsHtml(board, phase) {
    const ordered = (phase === 'before' ? board.beforeOrder : board.afterOrder);
    return ordered.map(model => renderCardHtml(model, phase)).join('');
  }

  function renderState(state, phase = 'final') {
    updatePacingBar(state);
    centerSub.textContent = viewedRound === 0 ? 'Opening wire' : `Round ${viewedRound} wire`;
    roundCardEl.classList.remove('show');

    currentBoard = buildRoundView(state, viewedRound);
    updateRoundCard(state, viewedRound);
    standingsEl.innerHTML = renderStandingsHtml(currentBoard, phase);
    currentBoard.refs = collectCardRefs();
    currentBoard.refsByAiIdx = new Map(currentBoard.refs.map(ref => [ref.aiIdx, ref]));
    renderTabs(state);
    refreshThinkingPanels(state);
    wireEl.innerHTML = wireHtml(state, viewedRound);
    return currentBoard;
  }

  function cancelReveal() {
    if (!activeReveal) return;
    activeReveal.cancelled = true;
    for (const id of activeReveal.timeouts) {
      clearTimeout(id);
    }
    for (const id of activeReveal.rafs) {
      cancelAnimationFrame(id);
    }
    activeReveal.timeouts.clear();
    activeReveal.rafs.clear();
    activeReveal = null;
  }

  function makeToken() {
    cancelReveal();
    activeReveal = {
      cancelled: false,
      timeouts: new Set(),
      rafs: new Set(),
    };
    return activeReveal;
  }

  function sleep(ms, token) {
    return new Promise(resolve => {
      if (token.cancelled) {
        resolve();
        return;
      }
      const id = window.setTimeout(() => {
        token.timeouts.delete(id);
        resolve();
      }, ms);
      token.timeouts.add(id);
    });
  }

  function animate(duration, frame, token) {
    return new Promise(resolve => {
      if (token.cancelled) {
        resolve();
        return;
      }
      if (duration <= 0) {
        frame(1);
        resolve();
        return;
      }
      const start = performance.now();
      let rafId = 0;
      const step = now => {
        token.rafs.delete(rafId);
        if (token.cancelled) {
          resolve();
          return;
        }
        const t = Math.min(1, (now - start) / duration);
        frame(t);
        if (t >= 1) {
          resolve();
          return;
        }
        rafId = window.requestAnimationFrame(step);
        token.rafs.add(rafId);
      };
      rafId = window.requestAnimationFrame(step);
      token.rafs.add(rafId);
    });
  }

  async function staggeredStarts(items, gapMs, token, start) {
    const running = [];
    for (let index = 0; index < items.length; index += 1) {
      if (index > 0) {
        await sleep(gapMs * motion, token);
        if (token.cancelled) break;
      }
      running.push(start(items[index], index));
    }
    await Promise.all(running);
  }

  async function staggeredReveal(items, gapMs, token, reveal) {
    for (let index = 0; index < items.length; index += 1) {
      if (index > 0) {
        await sleep(gapMs * motion, token);
        if (token.cancelled) return;
      }
      reveal(items[index], index);
    }
  }

  async function roundCardSequence(token, state) {
    roundCardEl.classList.add('show');
    await sleep(1100 * motion, token);
    if (token.cancelled) return;
    roundCardEl.classList.remove('show');
  }

  async function rollUpResults(board, token) {
    const duration = 750 * motion;
    await staggeredStarts(board.refs, 350, token, ref => animate(duration, t => {
      const model = board.byAiIdx.get(ref.aiIdx);
      const total = model.beforeTotal + (model.afterTotal - model.beforeTotal) * t;
      const take = model.take * t;
      ref.total.textContent = moneyM(total);
      ref.take.textContent = `+${moneyM(take)}`;
      ref.take.style.opacity = `${Math.min(1, t * 1.4)}`;
      ref.take.style.transform = `translateY(${(1 - Math.min(1, t * 1.4)) * -2}px)`;
    }, token));
    if (token.cancelled) return;
    board.refs.forEach(ref => {
      const model = board.byAiIdx.get(ref.aiIdx);
      ref.total.textContent = moneyM(model.afterTotal);
      ref.take.textContent = `+${moneyM(model.take)}`;
      ref.take.style.opacity = '1';
      ref.take.style.transform = 'translateY(0)';
    });
  }

  async function spotlightRanks(board, token) {
    const popDuration = prefersReducedMotion ? 90 : 250;
    const holdDuration = prefersReducedMotion ? 60 : 350;
    const travelDuration = prefersReducedMotion ? 140 : 250;
    const shrinkDuration = prefersReducedMotion ? 140 : 250;
    const popScale = prefersReducedMotion ? 1.02 : 1.5;
    const settleEase = 'cubic-bezier(0.2,0.8,0.2,1)';
    const finalRefs = board.afterOrder.map(model => board.refsByAiIdx.get(model.aiIdx)).filter(Boolean);

    for (const model of board.afterOrder) {
      if (token.cancelled) return;

      const ref = board.refsByAiIdx.get(model.aiIdx);
      if (!ref) continue;

      const currentCards = Array.from(standingsEl.querySelectorAll('.ai-card'));
      const currentIndex = currentCards.indexOf(ref.card);
      const targetIndex = Math.max(0, model.afterRank - 1);
      const needsMove = currentIndex !== targetIndex;
      let motionCards = [ref.card];

      try {
        if (model.rankDelta === 0) {
          ref.rankChange.textContent = '';
          ref.rankChange.className = 'rank-change';
        } else {
          ref.rankChange.textContent = formatRankDelta(model.rankDelta);
          ref.rankChange.className = `rank-change show ${model.rankDelta > 0 ? 'up' : 'dn'}`;
        }
        ref.take.textContent = `+${moneyM(model.take)}`;
        ref.take.style.opacity = '1';
        ref.take.style.transform = 'translateY(0)';
        ref.card.classList.add('spotlight');
        ref.card.style.transformOrigin = 'center center';
        ref.card.style.zIndex = '10';

        await animate(popDuration, t => {
          const scale = 1 + (popScale - 1) * t;
          ref.card.style.transform = `scale(${scale})`;
        }, token);
        if (token.cancelled) return;

        await sleep(holdDuration, token);
        if (token.cancelled) return;

        ref.rank.textContent = `#${model.afterRank}`;
        ref.rank.className = `rank-num${model.afterRank === 1 ? ' winner' : ''}`;
        ref.card.classList.toggle('winner', model.afterRank === 1);

        if (needsMove) {
          const beforeRects = new Map();
          currentCards.forEach(card => {
            beforeRects.set(card, card.getBoundingClientRect());
          });

          const siblings = currentCards.filter(card => card !== ref.card);
          const anchor = siblings[targetIndex] || null;
          standingsEl.insertBefore(ref.card, anchor);

          const afterCards = Array.from(standingsEl.querySelectorAll('.ai-card'));
          const afterRects = new Map();
          afterCards.forEach(card => {
            afterRects.set(card, card.getBoundingClientRect());
          });

          afterCards.forEach(card => {
            const beforeRect = beforeRects.get(card);
            const afterRect = afterRects.get(card);
            const deltaY = beforeRect ? beforeRect.top - afterRect.top : 0;
            card.style.transition = 'none';
            card.style.transform = card === ref.card
              ? `translateY(${deltaY}px) scale(${popScale})`
              : `translateY(${deltaY}px)`;
          });

          void standingsEl.offsetHeight;

          afterCards.forEach(card => {
            card.style.transition = `transform ${travelDuration}ms ${settleEase}`;
            card.style.transform = card === ref.card
              ? `translateY(0) scale(${popScale})`
              : 'translateY(0)';
          });

          motionCards = afterCards;
          await sleep(travelDuration + 40, token);
          if (token.cancelled) return;
        }

        ref.card.style.transition = `transform ${shrinkDuration}ms ${settleEase}`;
        ref.card.style.transform = 'translateY(0) scale(1)';
        await sleep(shrinkDuration + 40, token);
        if (token.cancelled) return;
      } finally {
        for (const card of motionCards) {
          card.style.transition = '';
          card.style.transform = '';
        }
        ref.card.style.transformOrigin = '';
        ref.card.style.zIndex = '';
        ref.card.classList.remove('spotlight');
      }
    }

    board.refs = finalRefs;
    board.refsByAiIdx = new Map(finalRefs.map(ref => [ref.aiIdx, ref]));
  }

  function updateNotorietyForRef(ref, value) {
    updateHeat(ref, value);
  }

  async function tickNotoriety(board, token) {
    const duration = 750 * motion;
    const cards = board.refs.slice();
    await staggeredStarts(cards, 250, token, ref => animate(duration, t => {
      const model = board.byAiIdx.get(ref.aiIdx);
      const notoriety = model.heatBefore + (model.heatAfter - model.heatBefore) * t;
      const value = Math.round(notoriety);
      updateNotorietyForRef(ref, value);
    }, token));
    if (token.cancelled) return;
    cards.forEach(ref => {
      const model = board.byAiIdx.get(ref.aiIdx);
      updateNotorietyForRef(ref, model.heatAfter);
    });
  }

  async function casualtyBeat(board, token) {
    const cards = board.refs.slice();
    await staggeredReveal(cards, 120, token, ref => {
      const model = board.byAiIdx.get(ref.aiIdx);
      model.caughtIds.forEach(memberId => {
        const memberEl = ref.members.find(m => String(m.charId) === String(memberId));
        if (!memberEl) return;
        memberEl.el.classList.remove('caught-pending');
        memberEl.el.classList.add('caught-landed', 'captured');
      });
    });
  }

  async function runRoundReveal(board, token, state) {
    await roundCardSequence(token, state);
    if (token.cancelled) return;
    await sleep(600 * motion, token);
    if (token.cancelled) return;
    await rollUpResults(board, token);
    if (token.cancelled) return;
    await sleep(600 * motion, token);
    if (token.cancelled) return;
    await spotlightRanks(board, token);
    if (token.cancelled) return;
    await sleep(450 * motion, token);
    if (token.cancelled) return;
    await tickNotoriety(board, token);
    if (token.cancelled) return;
    await sleep(450 * motion, token);
    if (token.cancelled) return;
    await casualtyBeat(board, token);
    if (token.cancelled) return;
    await sleep(650 * motion, token);
  }

  function startReveal(state, roundNumber) {
    if (!state) return;
    autoMode = false;
    document.getElementById('btn-auto').classList.remove('is-active');
    viewedRound = roundNumber;
    cancelReveal();
    const board = renderState(state, 'before');
    const token = makeToken();
    runRoundReveal(board, token, state).catch(() => {});
  }

  function renderFinal(state) {
    cancelReveal();
    renderState(state, 'final');
  }

  // The highest round the viewer can step to = number of COMPLETED rounds
  // (each finished round appends a round_result). Note current_round_idx is the
  // 0-based index of the last round, so it's one short for a done campaign —
  // use the result count instead so the final round is reachable.
  function playedRounds(state) {
    return Math.max(0, ...((state && state.standings) || []).map(s => (s.round_results || []).length));
  }

  function navigateRound(targetRound, opts = {}) {
    const state = previousState;
    if (!state) return;
    const maxRound = playedRounds(state);
    const clamped = Math.max(0, Math.min(targetRound, maxRound));
    const prevRound = viewedRound;
    autoMode = false;
    document.getElementById('btn-auto').classList.remove('is-active');
    if (typeof opts.selectAiIdx === 'number') {
      selectedAiIdx = opts.selectAiIdx;
    }
    viewedRound = clamped;
    if (opts.animate && clamped > 0 && (opts.replay || clamped > prevRound)) {
      startReveal(state, clamped);
    } else {
      renderFinal(state);
    }
    tabsEl.querySelectorAll('[data-ai-idx]').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.aiIdx) === selectedAiIdx);
    });
  }

  standingsEl.addEventListener('click', e => {
    const row = e.target.closest('.rh-nav');
    if (!row) return;
    const roundIdx = Number(row.dataset.roundIdx);
    const aiIdx = Number(row.dataset.aiIdx);
    const animate = roundIdx + 1 > viewedRound;
    navigateRound(roundIdx + 1, { animate, selectAiIdx: aiIdx });
  });

  function stateLooksNew(next) {
    if (!previousState) return true;
    if (next.round !== previousState.round) return true;
    if ((next.current_round_idx ?? 0) !== (previousState.current_round_idx ?? 0)) return true;
    const prevBanked = previousState.standings.map(s => `${s.ai_idx}:${s.banked}:${s.rank}:${s.status}`).join('|');
    const nextBanked = next.standings.map(s => `${s.ai_idx}:${s.banked}:${s.rank}:${s.status}`).join('|');
    return prevBanked !== nextBanked;
  }

  async function loadState() {
    if (!gameId) {
      loadHasError = true;
      statusPill.className = 'status-pill is-error';
      statusPill.textContent = 'NO GAME';
      metaEl.textContent = 'Missing game id.';
      activityTickerEl.hidden = true;
      activityTickerEl.innerHTML = '';
      return;
    }
    try {
      const next = await fetch(stateUrl, { cache: 'no-store' }).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      });
      if (!next || !next.standings) throw new Error('bad campaign payload');
      if (!previousState) selectedAiIdx = null;
      if (selectedAiIdx != null && !next.standings.some(s => s.ai_idx === selectedAiIdx)) {
        selectedAiIdx = null;
      }
      const progressInfo = resolveProgress(next.progress, next);
      if (!previousState && next.status !== 'done' && next.current_stage !== 'done' && isLiveHeartbeat(progressInfo)) {
        const liveRound = Number(progressInfo.round ?? 0);
        const maxRound = playedRounds(next);
        viewedRound = Number.isFinite(liveRound) ? Math.max(0, Math.min(liveRound, maxRound)) : 0;
      }
      if (autoMode) {
        viewedRound = playedRounds(next);
      }
      if (activeReveal) {
        cancelReveal();
      }
      renderFinal(next);
      loadHasError = false;
      previousState = next;
    } catch (err) {
      loadHasError = true;
      statusPill.className = 'status-pill is-error';
      statusPill.textContent = 'ERROR';
      metaEl.textContent = `Failed to load campaign state: ${err.message || err}`;
      wireEl.innerHTML = `<div class="state-error">${esc(err.message || err)}</div>`;
      standingsEl.innerHTML = '';
      tabsEl.innerHTML = '';
      railEl.innerHTML = '';
      activityTickerEl.hidden = true;
      activityTickerEl.innerHTML = '';
    }
  }

  loadState();
  document.getElementById('btn-prev').addEventListener('click', () => {
    navigateRound(viewedRound - 1, { animate: false });
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    const nextRound = Math.min(viewedRound + 1, previousState ? playedRounds(previousState) : 0);
    navigateRound(nextRound, { animate: true });
  });

  replayBtn.addEventListener('click', () => {
    if (!previousState || viewedRound <= 0) return;
    navigateRound(viewedRound, { animate: true, replay: true });
  });

  document.getElementById('btn-auto').addEventListener('click', () => {
    autoMode = !autoMode;
    if (autoMode && previousState) {
      viewedRound = playedRounds(previousState);
      renderFinal(previousState);
    }
    document.getElementById('btn-auto').classList.toggle('is-active', autoMode);
  });

  pollTimer = setInterval(loadState, 5000);
  if (!reduceMotion) {
    heartbeatTimer = setInterval(() => {
      if (previousState && !loadHasError) updatePacingBar(previousState);
    }, 1000);
  }
  window.addEventListener('beforeunload', () => {
    cancelReveal();
    pollTimer && clearInterval(pollTimer);
    heartbeatTimer && clearInterval(heartbeatTimer);
  });
})();
</script>
</body>
</html>
