<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heist</title>
<style>
:root {
  --bg: #0c0c0e;
  --panel: #131316;
  --panel2: #18181c;
  --border: #26262c;
  --text: #e0dfe8;
  --muted: #72717a;
  --accent: #e8a030;
  --green: #52c47a;
  --red: #e05050;
  --blue: #5898e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background:
    radial-gradient(900px 420px at 50% -140px, rgba(232,160,48,0.08), transparent 60%),
    radial-gradient(760px 320px at 18% 10%, rgba(88,152,224,0.08), transparent 55%),
    radial-gradient(860px 360px at 82% 18%, rgba(82,196,122,0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  padding: 32px 24px 56px;
}
.shell {
  width: min(1080px, 100%);
  margin: 0 auto;
}
.hero {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px 0 28px;
}
.brand {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
}
.tagline {
  font-size: 14px;
  color: var(--muted);
}
.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary {
  background: var(--accent);
  color: #0a0a0a;
  border: 1px solid var(--accent);
}
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.section {
  margin-top: 18px;
}
.section-label {
  margin-bottom: 12px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.game-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.game-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(19,19,22,0.96), rgba(17,17,20,0.96));
}
.game-row:hover { border-color: #34343d; background: var(--panel2); }
.game-status { flex: 0 0 auto; width: 92px; }
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-running {
  color: var(--blue);
  background: rgba(88,152,224,0.1);
  border-color: rgba(88,152,224,0.28);
}
.status-running .status-dot { animation: blink 1.2s ease-in-out infinite; }
.status-done {
  color: var(--green);
  background: rgba(82,196,122,0.1);
  border-color: rgba(82,196,122,0.22);
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
.game-info {
  min-width: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.game-title {
  font-size: 16px;
  font-weight: 750;
  letter-spacing: -0.01em;
  color: var(--text);
}
.game-sub {
  font-size: 12px;
  color: var(--muted);
}
.game-banked {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  min-width: 140px;
  text-align: right;
}
.leader-name {
  font-size: 14px;
  font-weight: 750;
  color: var(--accent);
}
.banked-label {
  font-size: 12px;
  color: var(--muted);
}
.game-banked.empty {
  color: var(--muted);
  font-size: 20px;
  font-weight: 600;
  align-self: center;
}
.game-actions {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.action-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  color: var(--accent);
  text-decoration: none;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.action-link:hover { background: rgba(232,160,48,0.1); }
.action-delete {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}
.action-delete:hover { border-color: var(--red); color: var(--red); }
.action-delete-running { opacity: 0.5; }
.action-delete-running:hover { border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1; }
.action-delete:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.empty-state {
  padding: 34px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  text-align: center;
  color: var(--muted);
  line-height: 1.7;
}
.empty-state strong { color: var(--text); }
@media (max-width: 760px) {
  body { padding: 20px 14px 40px; }
  .game-row {
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .game-status { width: auto; }
  .game-banked {
    align-items: flex-start;
    text-align: left;
    min-width: 0;
    width: 100%;
    order: 4;
  }
  .game-actions {
    width: 100%;
    justify-content: flex-start;
    order: 5;
  }
}
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <div class="brand">HEIST</div>
    <div class="tagline">Write the strategy. Watch the crew work.</div>
    <div class="hero-actions">
      <button class="btn btn-primary" onclick="newCampaign()">+ New Campaign</button>
      <button class="btn btn-secondary" onclick="quickTest()" title="Launch a 3-round campaign: The Operators (Codex) vs The Wreckers (Codex) vs The Ghost (Gemini)">▶ Quick Test</button>
    </div>
  </header>

  <section class="section">
    <div class="section-label">CAMPAIGNS</div>
    <div class="game-list" id="campaign-list">
      <div class="empty-state">
        <strong>No campaigns yet.</strong><br>
        Hit + New Campaign to get started.
      </div>
    </div>
  </section>
</div>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

function timeAgo(ts) {
  const secs = Math.floor(Date.now() / 1000 - Number(ts || 0));
  if (secs < 60) return 'just now';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

function renderCampaigns(campaigns) {
  const el = document.getElementById('campaign-list');
  if (!campaigns.length) {
    el.innerHTML = `
      <div class="empty-state">
        <strong>No campaigns yet.</strong><br>
        Hit + New Campaign to get started.
      </div>`;
    return;
  }

  el.innerHTML = campaigns.map(campaign => {
    const aiCount = (campaign.ais || []).length;
    const currentRound = Number(campaign.current_round || 0);
    const totalRounds = Number(campaign.num_rounds || 5);
    const titleAi = [...(campaign.ais || [])].sort((a, b) => {
      if ((b.banked || 0) !== (a.banked || 0)) return (b.banked || 0) - (a.banked || 0);
      return (a.ai_idx || 0) - (b.ai_idx || 0);
    })[0];
    const title = campaign.name
      ? esc(campaign.name)
      : campaign.status === 'done' && titleAi
        ? esc(titleAi.ai_name)
        : `Campaign #${campaign.id}`;
    const leader = titleAi && currentRound > 0
      ? `
        <div class="leader-name">${esc(titleAi.ai_name)}</div>
        <div class="banked-label">$${Number(titleAi.banked || 0).toLocaleString()} banked</div>`
      : `<div class="game-banked empty">—</div>`;
    const pillClass = campaign.status === 'done' ? 'status-done' : 'status-running';
    const pillLabel = campaign.status === 'done' ? 'Done' : 'Running';
    const deleteBtn = campaign.status === 'running'
      ? `<button class="action-delete action-delete-running" onclick="deleteCampaign(${campaign.id}, '${esc(title).replace(/'/g, "\\'")}', true)" title="Force-delete this running campaign">✕</button>`
      : `<button class="action-delete" onclick="deleteCampaign(${campaign.id}, '${esc(title).replace(/'/g, "\\'")}')" title="Delete this campaign">✕</button>`;

    return `
      <div class="game-row">
        <div class="game-status">
          <span class="status-pill ${pillClass}">
            <span class="status-dot"></span>${pillLabel}
          </span>
        </div>
        <div class="game-info">
          <div class="game-title">${title}</div>
          <div class="game-sub">Round ${currentRound} / ${totalRounds} · ${aiCount} AI${aiCount === 1 ? '' : 's'} · ${timeAgo(campaign.created_at)}</div>
        </div>
        ${leader}
        <div class="game-actions">
          <a class="action-link" href="/campaign?game=${campaign.id}">War Room -></a>
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

async function newCampaign() {
  window.location = '/setup';
}

async function quickTest() {
  try {
    const resp = await fetch('/api/quick-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error || resp.status);
    }
    const data = await resp.json();
    window.location = `/campaign?game=${data.campaign_id}`;
  } catch (err) {
    alert('Quick test failed: ' + err.message);
  }
}

async function deleteCampaign(id, label, running = false) {
  const name = label && label !== 'Campaign #' + id ? `"${label}"` : `campaign #${id}`;
  const warning = running
    ? `Force-delete ${name}? It's still running — this will kill it mid-campaign. Can't be undone.`
    : `Delete ${name}? This wipes the record and any saved snapshots — can't be undone.`;
  if (!confirm(warning)) return;
  try {
    const url = `/api/games/${id}` + (running ? '?force=1' : '');
    const resp = await fetch(url, { method: 'DELETE' });
    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error || resp.status);
    }
    refresh();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

async function refresh() {
  try {
    const games = await fetch('/api/games').then(r => r.json());
    window.__visibleGames = (games || []).filter(game => !game.hidden_from_lobby);
  } catch {}
  try {
    const campaigns = await fetch('/api/campaigns').then(r => r.json());
    renderCampaigns(campaigns);
  } catch {}
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
