<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heist</title>
<style>
:root {
  --bg: #0c0c0e;
  --panel: #131316;
  --panel2: #18181c;
  --border: #26262c;
  --text: #e0dfe8;
  --muted: #72717a;
  --accent: #e8a030;
  --green: #52c47a;
  --red: #e05050;
  --blue: #5898e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background:
    radial-gradient(900px 420px at 50% -140px, rgba(232,160,48,0.08), transparent 60%),
    radial-gradient(760px 320px at 18% 10%, rgba(88,152,224,0.08), transparent 55%),
    radial-gradient(860px 360px at 82% 18%, rgba(82,196,122,0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  padding: 32px 24px 56px;
}
.shell {
  width: min(1080px, 100%);
  margin: 0 auto;
}
.hero {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px 0 28px;
}
.brand {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
}
.tagline {
  font-size: 14px;
  color: var(--muted);
}
.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary {
  background: var(--accent);
  color: #0a0a0a;
  border: 1px solid var(--accent);
}
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.section {
  margin-top: 18px;
}
.section-label {
  margin-bottom: 12px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.game-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.game-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(19,19,22,0.96), rgba(17,17,20,0.96));
}
.game-row:hover { border-color: #34343d; background: var(--panel2); }
.game-row.is-stalled {
  background: linear-gradient(180deg, rgba(28,18,18,0.98), rgba(19,15,16,0.98));
  border-color: rgba(224,80,80,0.22);
}
.game-row.is-stalled:hover {
  border-color: rgba(224,80,80,0.30);
}
.game-row.is-retrying {
  background: linear-gradient(180deg, rgba(28,22,13,0.98), rgba(20,17,12,0.98));
  border-color: rgba(232,160,48,0.22);
}
.game-row.is-retrying:hover {
  border-color: rgba(232,160,48,0.32);
}
.game-status { flex: 0 0 auto; width: 92px; }
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-running {
  color: var(--blue);
  background: rgba(88,152,224,0.1);
  border-color: rgba(88,152,224,0.28);
}
.status-running .status-dot { animation: blink 1.2s ease-in-out infinite; }
.status-running.status-retrying {
  color: var(--accent);
  background: rgba(232,160,48,0.1);
  border-color: rgba(232,160,48,0.28);
}
.status-running.status-retrying .status-dot {
  animation: pulse-retry 1.85s ease-in-out infinite;
}
.status-stalled {
  color: var(--red);
  background: rgba(224,80,80,0.1);
  border-color: rgba(224,80,80,0.28);
}
.status-stalled .status-dot { animation: none; }
.status-done {
  color: var(--green);
  background: rgba(82,196,122,0.1);
  border-color: rgba(82,196,122,0.22);
}
.status-done .status-dot {
  width: 7px;
  height: 7px;
  background: transparent;
  position: relative;
}
.status-done .status-dot::before {
  content: "\2713";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 8px;
  font-weight: 900;
  line-height: 1;
  color: currentColor;
  transform: translateY(-0.5px);
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
@keyframes pulse-retry {
  0%, 100% { transform: scale(1); opacity: 0.95; }
  50% { transform: scale(0.82); opacity: 0.62; }
}
.game-info {
  min-width: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.game-title {
  font-size: 16px;
  font-weight: 750;
  letter-spacing: -0.01em;
  color: var(--text);
}
.game-sub {
  font-size: 12px;
  color: var(--muted);
}
.campaign-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
  font-size: 12px;
  line-height: 1.45;
  color: #c8c4d7;
  flex-wrap: wrap;
}
.chip-live {
  color: #d7e7df;
}
.chip-retry {
  color: #d7c08d;
}
.chip-cold {
  color: #bdb4bc;
}
.chip-live .live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(82,196,122,0.08);
  animation: pulse-dot 1.35s ease-in-out infinite;
}
.chip-retry .retry-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(232,160,48,0.08);
  animation: pulse-retry 1.85s ease-in-out infinite;
}
.chip-episode,
.chip-round,
.chip-stage,
.chip-activity,
.chip-age,
.chip-retry-badge {
  white-space: nowrap;
}
.chip-episode {
  font-size: 11px;
  color: var(--muted);
  line-height: 1;
}
.chip-round,
.chip-stage,
.chip-activity {
  color: var(--text);
}
.chip-retry-badge {
  color: var(--accent);
  font-weight: 800;
}
.chip-age {
  color: var(--green);
  font-weight: 800;
}
.game-banked {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  min-width: 140px;
  text-align: right;
}
.leader-name {
  font-size: 14px;
  font-weight: 750;
  color: var(--accent);
}
.banked-label {
  font-size: 12px;
  color: var(--muted);
}
.game-banked.empty {
  color: var(--muted);
  font-size: 20px;
  font-weight: 600;
  align-self: center;
}
.game-actions {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.action-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  color: var(--accent);
  text-decoration: none;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.action-link:hover { background: rgba(232,160,48,0.1); }
.action-resume { background: transparent; cursor: pointer; font-family: inherit; }
.action-delete {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}
.action-delete:hover { border-color: var(--red); color: var(--red); }
.action-delete-running { opacity: 0.5; }
.action-delete-running:hover { border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1; }
.action-delete:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.empty-state {
  padding: 34px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  text-align: center;
  color: var(--muted);
  line-height: 1.7;
}
.empty-state strong { color: var(--text); }
@media (max-width: 760px) {
  body { padding: 20px 14px 40px; }
  .game-row {
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .game-status { width: auto; }
  .game-banked {
    align-items: flex-start;
    text-align: left;
    min-width: 0;
    width: 100%;
    order: 4;
  }
  .game-actions {
    width: 100%;
    justify-content: flex-start;
    order: 5;
  }
}
@media (prefers-reduced-motion: reduce) {
  .status-running .status-dot,
  .status-running.status-retrying .status-dot,
  .chip-live .live-dot,
  .chip-retry .retry-dot {
    animation: none !important;
  }
}
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <div class="brand">HEIST</div>
    <div class="tagline">Write the strategy. Watch the crew work.</div>
    <div class="hero-actions">
      <button class="btn btn-primary" onclick="newCampaign()">+ New Campaign</button>
      <button class="btn btn-secondary" onclick="quickTest()" title="Launch a 3-round campaign: The Operators vs The Wreckers vs The Ghost (all Codex)">▶ Quick Test</button>
      <button class="btn btn-secondary" onclick="mediumTest()" title="Launch a 7-round campaign: The Operators vs The Wreckers vs The Ghost (all Codex)">▶ Medium Test</button>
    </div>
  </header>

  <section class="section">
    <div class="section-label">CAMPAIGNS</div>
    <div class="game-list" id="campaign-list">
      <div class="empty-state">
        <strong>No campaigns yet.</strong><br>
        Hit + New Campaign to get started.
      </div>
    </div>
  </section>
</div>

<script>
function esc(value) {
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

function timeAgo(ts) {
  const secs = Math.floor(Date.now() / 1000 - Number(ts || 0));
  if (secs < 60) return 'just now';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

const STALL_MS = 240000;
const STAGE_LABELS = {
  opening_wire: 'Wire',
  hiring: 'Hiring',
  heist: 'Heist',
  reflection: 'Reflection',
};
const STAGE_VERBS = {
  opening_wire: 'trash talk',
  hiring: 'bidding',
  heist: 'on the job',
  reflection: 'reflecting',
};

function humanizeAge(ms) {
  if (!Number.isFinite(ms) || ms < 0) return '';
  if (ms < 60000) return `${Math.floor(ms / 1000)}s`;
  return `${Math.floor(ms / 60000)}m`;
}

function resolveProgress(progress, fallback = {}) {
  const updatedAt = progress && progress.updated_at != null ? Number(progress.updated_at) : null;
  const ageMs = updatedAt == null || !Number.isFinite(updatedAt) ? null : Date.now() - (updatedAt * 1000);
  const round = Number(
    progress?.round ??
    fallback.current_round ??
    fallback.round ??
    (((fallback.current_round_idx ?? -1) + 1) || 0)
  );
  const totalRounds = Number(progress?.total_rounds ?? fallback.num_rounds ?? fallback.total_rounds ?? 0);
  const stage = progress?.stage || fallback.current_stage || 'starting';
  const aiName = progress?.ai_name || '';
  const attempt = Number(progress?.attempt ?? 0);
  const maxAttempts = Number(progress?.max_attempts ?? 0);
  const mode = !progress
    ? 'none'
    : attempt > 1
      ? 'retrying'
      : ageMs != null && ageMs > STALL_MS
        ? 'stalled'
        : 'live';
  return {
    round,
    totalRounds,
    stage,
    stageLabel: STAGE_LABELS[stage] || stage,
    stageVerb: STAGE_VERBS[stage] || stage,
    aiName,
    attempt,
    maxAttempts,
    updatedAt,
    ageMs,
    ageText: updatedAt == null ? '0s' : humanizeAge(ageMs),
    mode,
  };
}

function renderStatusPill(progressInfo, status) {
  if (status === 'done') {
    return {
      label: 'Done',
      className: 'status-pill status-done',
      dotClass: 'status-dot',
      ariaLabel: 'Done',
    };
  }
  if (status === 'interrupted') {
    return {
      label: 'Interrupted',
      className: 'status-pill status-stalled',
      dotClass: 'status-dot',
      ariaLabel: 'Interrupted',
    };
  }
  if (!progressInfo || progressInfo.mode === 'none') {
    return {
      label: 'Running',
      className: 'status-pill status-running',
      dotClass: 'status-dot',
      ariaLabel: 'Running',
    };
  }
  if (progressInfo.mode === 'retrying') {
    return {
      label: 'Running',
      className: 'status-pill status-running status-retrying',
      dotClass: 'status-dot',
      ariaLabel: 'Running, retrying',
    };
  }
  if (progressInfo.mode === 'stalled') {
    return {
      label: 'Stalled',
      className: 'status-pill status-stalled',
      dotClass: 'status-dot',
      ariaLabel: 'Stalled',
    };
  }
  return {
    label: 'Running',
    className: 'status-pill status-running',
    dotClass: 'status-dot',
    ariaLabel: 'Running',
  };
}

function renderCampaignChip(progressInfo, status) {
  if (status !== 'running' || !progressInfo || progressInfo.mode === 'none') return '';
  const roundText = `Round ${progressInfo.round}/${progressInfo.totalRounds}`;
  const stageText = progressInfo.stageLabel || progressInfo.stage;
  const activityText = `${progressInfo.stageVerb}${progressInfo.aiName ? ` (${esc(progressInfo.aiName)})` : ''}`;
  if (progressInfo.mode === 'retrying') {
    return `
      <div class="campaign-chip chip-retry" data-role="progress-chip">
        <span class="chip-live" aria-hidden="true"><span class="retry-dot"></span></span>
        <span class="chip-round">${esc(roundText)}</span>
        <span>&middot;</span>
        <span class="chip-stage">${esc(stageText)}</span>
        <span>&middot;</span>
        <span class="chip-activity">${esc(activityText)}</span>
        <span>&middot;</span>
        <span class="chip-retry-badge">&#x21bb; retry ${progressInfo.attempt}/${progressInfo.maxAttempts || '?'}</span>
        <span>&middot; updated <span class="chip-age">${esc(progressInfo.ageText)}</span> ago</span>
      </div>`;
  }
  if (progressInfo.mode === 'stalled') {
    return `
      <div class="campaign-chip chip-cold" data-role="progress-chip">
        <span class="chip-round">${esc(roundText)}</span>
        <span>&middot;</span>
        <span class="chip-stage">${esc(stageText)}</span>
        <span>&middot;</span>
        <span class="chip-activity">no update for <span class="chip-age">${esc(progressInfo.ageText)}</span></span>
      </div>`;
  }
  return `
    <div class="campaign-chip chip-live" data-role="progress-chip">
      <span class="chip-live" aria-hidden="true"><span class="live-dot"></span></span>
      <span class="chip-episode">&#x25F4;</span>
      <span class="chip-round">${esc(roundText)}</span>
      <span>&middot;</span>
      <span class="chip-stage">${esc(stageText)}</span>
      <span>&middot;</span>
      <span class="chip-activity">${esc(activityText)}</span>
      <span>&middot; updated <span class="chip-age">${esc(progressInfo.ageText)}</span> ago</span>
    </div>`;
}

function renderCampaigns(campaigns) {
  const el = document.getElementById('campaign-list');
  if (!campaigns.length) {
    el.innerHTML = `
      <div class="empty-state">
        <strong>No campaigns yet.</strong><br>
        Hit + New Campaign to get started.
      </div>`;
    return;
  }

  el.innerHTML = campaigns.map(campaign => {
    const aiCount = (campaign.ais || []).length;
    const currentRound = Number(campaign.current_round || 0);
    const totalRounds = Number(campaign.num_rounds || 5);
    const progress = resolveProgress(campaign.progress, campaign);
    const displayRound = Number(progress.round || currentRound || 0);
    const displayTotal = Number(progress.totalRounds || totalRounds || 0);
    const titleAi = [...(campaign.ais || [])].sort((a, b) => {
      if ((b.banked || 0) !== (a.banked || 0)) return (b.banked || 0) - (a.banked || 0);
      return (a.ai_idx || 0) - (b.ai_idx || 0);
    })[0];
    const title = campaign.name
      ? esc(campaign.name)
      : campaign.status === 'done' && titleAi
        ? esc(titleAi.ai_name)
        : `Campaign #${campaign.id}`;
    const leader = titleAi && displayRound > 0
      ? `
        <div class="leader-name">${esc(titleAi.ai_name)}</div>
        <div class="banked-label">$${Number(titleAi.banked || 0).toLocaleString()} banked</div>`
      : `<div class="game-banked empty">—</div>`;
    const pill = renderStatusPill(progress, campaign.status);
    const deleteBtn = campaign.status === 'running'
      ? `<button class="action-delete action-delete-running" onclick="deleteCampaign(${campaign.id}, '${esc(title).replace(/'/g, "\\'")}', true)" title="Force-delete this running campaign">✕</button>`
      : `<button class="action-delete" onclick="deleteCampaign(${campaign.id}, '${esc(title).replace(/'/g, "\\'")}')" title="Delete this campaign">✕</button>`;
    // Offer Resume on a campaign whose conductor looks gone: a "running" record
    // that's gone cold (stalled heartbeat) or one flagged interrupted. The
    // backend has the final say — a non-resumable one surfaces a 409/422.
    const canResume = (campaign.status === 'running' && progress.mode === 'stalled')
      || campaign.status === 'interrupted';
    const resumeBtn = canResume
      ? `<button class="action-link action-resume" onclick="resumeCampaign(${campaign.id})" title="Resume this stalled campaign from its last checkpoint">Resume</button>`
      : '';
    const chipHtml = renderCampaignChip(progress, campaign.status);

    return `
      <div class="game-row${progress.mode === 'stalled' ? ' is-stalled' : progress.mode === 'retrying' ? ' is-retrying' : ''}"
           data-campaign-id="${campaign.id}"
           data-campaign-status="${esc(campaign.status)}"
           data-progress-mode="${esc(progress.mode)}"
           data-progress-round="${esc(progress.round)}"
           data-progress-total="${esc(progress.totalRounds)}"
           data-progress-stage="${esc(progress.stage)}"
           data-progress-ai="${esc(progress.aiName)}"
           data-progress-attempt="${esc(progress.attempt)}"
           data-progress-max="${esc(progress.maxAttempts)}"
           data-progress-updated-at="${esc(progress.updatedAt == null ? '' : progress.updatedAt)}">
        <div class="game-status">
          <span class="${pill.className}" aria-label="${pill.ariaLabel}">
            <span class="${pill.dotClass}"></span>${pill.label}
          </span>
        </div>
        <div class="game-info">
          <div class="game-title">${title}</div>
          <div class="game-sub">Round ${displayRound} / ${displayTotal} · ${aiCount} AI${aiCount === 1 ? '' : 's'} · ${timeAgo(campaign.created_at)}</div>
          ${chipHtml}
        </div>
        ${leader}
        <div class="game-actions">
          ${resumeBtn}
          <a class="action-link" href="/campaign?game=${campaign.id}">War Room -></a>
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

function updateCampaignProgressTicks() {
  document.querySelectorAll('.game-row[data-campaign-status="running"]').forEach(row => {
    const progressMode = row.dataset.progressMode || 'none';
    const updatedAt = row.dataset.progressUpdatedAt ? Number(row.dataset.progressUpdatedAt) : null;
    const progress = {
      round: Number(row.dataset.progressRound || 0),
      total_rounds: Number(row.dataset.progressTotal || 0),
      stage: row.dataset.progressStage || 'starting',
      ai_name: row.dataset.progressAi || '',
      attempt: Number(row.dataset.progressAttempt || 0),
      max_attempts: Number(row.dataset.progressMax || 0),
      updated_at: updatedAt,
    };
    const resolved = resolveProgress(progress, {
      current_round: progress.round,
      num_rounds: progress.total_rounds,
      current_stage: progress.stage,
    });
    if (resolved.mode !== progressMode) {
      row.dataset.progressMode = resolved.mode;
    }
    row.classList.toggle('is-stalled', resolved.mode === 'stalled');
    row.classList.toggle('is-retrying', resolved.mode === 'retrying');

    const pill = row.querySelector('.status-pill');
    if (pill) {
      const pillState = renderStatusPill(resolved, 'running');
      pill.className = pillState.className;
      pill.setAttribute('aria-label', pillState.ariaLabel);
      pill.innerHTML = `<span class="${pillState.dotClass}"></span>${pillState.label}`;
    }

    const chip = row.querySelector('[data-role="progress-chip"]');
    if (chip) {
      chip.outerHTML = renderCampaignChip(resolved, 'running');
    }
  });
}

async function newCampaign() {
  window.location = '/setup';
}

async function quickTest() {
  try {
    const resp = await fetch('/api/quick-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error || resp.status);
    }
    const data = await resp.json();
    window.location = `/campaign?game=${data.campaign_id}`;
  } catch (err) {
    alert('Quick test failed: ' + err.message);
  }
}

async function mediumTest() {
  try {
    const resp = await fetch('/api/medium-campaign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error || resp.status);
    }
    const data = await resp.json();
    window.location = `/campaign?game=${data.campaign_id}`;
  } catch (err) {
    alert('Medium test failed: ' + err.message);
  }
}

async function resumeCampaign(id) {
  try {
    const resp = await fetch(`/api/campaign/${id}/resume`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) {
      throw new Error(data.error || resp.status);
    }
    refresh();
  } catch (err) {
    alert('Resume failed: ' + err.message);
  }
}

async function deleteCampaign(id, label, running = false) {
  const name = label && label !== 'Campaign #' + id ? `"${label}"` : `campaign #${id}`;
  const warning = running
    ? `Force-delete ${name}? It's still running — this will kill it mid-campaign. Can't be undone.`
    : `Delete ${name}? This wipes the record and any saved snapshots — can't be undone.`;
  if (!confirm(warning)) return;
  try {
    const url = `/api/games/${id}` + (running ? '?force=1' : '');
    const resp = await fetch(url, { method: 'DELETE' });
    if (!resp.ok) {
      const data = await resp.json();
      throw new Error(data.error || resp.status);
    }
    refresh();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

async function refresh() {
  try {
    const games = await fetch('/api/games').then(r => r.json());
    window.__visibleGames = (games || []).filter(game => !game.hidden_from_lobby);
  } catch {}
  try {
    const campaigns = await fetch('/api/campaigns').then(r => r.json());
    renderCampaigns(campaigns);
    updateCampaignProgressTicks();
  } catch {}
}

const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let refreshTimer = null;
let heartbeatTimer = null;

refresh();
refreshTimer = setInterval(refresh, 3000);
if (!reducedMotion) {
  heartbeatTimer = setInterval(updateCampaignProgressTicks, 1000);
}
window.addEventListener('beforeunload', () => {
  if (refreshTimer) clearInterval(refreshTimer);
  if (heartbeatTimer) clearInterval(heartbeatTimer);
});
</script>
</body>
