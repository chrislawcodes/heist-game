<!--
  The Heist tab. Loaded into the page shell at boot via /tabs/heist.

  Shell contract:
    1. Shell loads this fragment (style + template + script all activate).
    2. Shell calls HeistTab.mount(container, { shell })
    3. Shell forwards every SSE event via HeistTab.handleEvent(ev)
    4. Shell calls HeistTab.reset() on replay reset

  Events the tab acts on:
    job_known               → fix job, render job header
    crew_known              → fix crew membership (used to look up assigned chars)
    scene_start             → create scene card (in-progress state)
    scene_done              → update scene card (success/failure, narration if any)
    turn_end (narration)    → fill in scene narration once it lands
    game_done               → render the heist outcome card at the bottom

  Visual style ported from heist/mocks/game.html. Re-renders fully when the
  shell switches AI (each AI plays the same job independently).
-->

<style>
.heist-root {
  display: flex; flex-direction: column; flex: 1; overflow: hidden;
}

/* ── job header ───────────────────────────────────────────────────────────── */
.heist-root .h2-job-header {
  flex-shrink: 0; padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.heist-root .h2-job-name { font-size: 15px; font-weight: 700; color: var(--text); }
.heist-root .h2-job-profile { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.heist-root .h2-profile-chip {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  padding: 3px 9px; border-radius: 3px;
  background: var(--panel); border: 1px solid var(--border); color: var(--muted);
}
.heist-root .h2-profile-chip.med  { color: var(--accent); border-color: rgba(232,160,48,0.4); background: rgba(232,160,48,0.08); }
.heist-root .h2-profile-chip.hard { color: var(--red);    border-color: rgba(224,80,80,0.4);  background: rgba(224,80,80,0.08); }
.heist-root .h2-profile-chip.low  { color: var(--green);  border-color: rgba(82,196,122,0.4); background: rgba(82,196,122,0.08); }
.heist-root .h2-job-reward { margin-left: auto; font-family: monospace; font-size: 13px; color: var(--muted); }
.heist-root .h2-job-reward strong { color: var(--accent); font-size: 14px; }

/* ── scenes panel ─────────────────────────────────────────────────────────── */
.heist-root .h2-scenes {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.heist-root .h2-empty {
  padding: 40px 20px; text-align: center;
  font-size: 13px; color: var(--muted); font-style: italic;
}

/* ── scene card ───────────────────────────────────────────────────────────── */
.heist-root .h2-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  animation: h2CardIn 0.4s ease;
}
@keyframes h2CardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.heist-root .h2-card.success { border-left: 4px solid var(--green); }
.heist-root .h2-card.failure { border-left: 4px solid var(--red); }
.heist-root .h2-card.neutral { border-left: 4px solid var(--border); }
.heist-root .h2-card.active  { border-left: 4px solid var(--accent); }

.heist-root .h2-head {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: var(--panel2);
  cursor: pointer; user-select: none;
}
.heist-root .h2-head:hover { background: #1e1e24; }
.heist-root .h2-card.expanded .h2-head { border-bottom: 1px solid var(--border); }
.heist-root .h2-chevron {
  font-size: 11px; color: var(--muted); flex-shrink: 0;
  transition: transform 0.2s ease;
}
.heist-root .h2-card.expanded .h2-chevron { transform: rotate(90deg); }
.heist-root .h2-num {
  font-size: 11px; font-weight: 700; font-family: monospace;
  color: var(--muted); letter-spacing: 1px; flex-shrink: 0;
}
.heist-root .h2-title { font-size: 16px; font-weight: 700; flex: 1; color: var(--text); }

.heist-root .h2-type-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 3px; flex-shrink: 0;
}
.heist-root .stb-setup      { background: rgba(114,113,122,0.2); color: var(--muted); }
.heist-root .stb-challenge  { background: rgba(88,152,224,0.15); color: var(--blue); }
.heist-root .stb-decision   { background: rgba(232,160,48,0.15); color: var(--accent); }
.heist-root .stb-hidden     { background: rgba(144,112,224,0.15); color: var(--purple); }
.heist-root .stb-transition { background: rgba(114,113,122,0.1); color: var(--muted); }
.heist-root .stb-escape     { background: rgba(82,196,122,0.15); color: var(--green); }

.heist-root .h2-outcome-chip {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 12px; flex-shrink: 0;
}
.heist-root .oc-success { background: rgba(82,196,122,0.15); color: var(--green); }
.heist-root .oc-failure { background: rgba(224,80,80,0.15);  color: var(--red); }
.heist-root .oc-none    { background: rgba(114,113,122,0.1); color: var(--muted); }
.heist-root .oc-pending { background: rgba(232,160,48,0.1);  color: var(--accent);
                          animation: h2Pulse 1.6s ease-in-out infinite; }
@keyframes h2Pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ── scene body ───────────────────────────────────────────────────────────── */
.heist-root .h2-body { padding: 16px; display: none; flex-direction: column; gap: 18px; }
.heist-root .h2-card.expanded .h2-body { display: flex; }

.heist-root .h2-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}

/* ── assigned characters ──────────────────────────────────────────────────── */
.heist-root .h2-chars { display: flex; gap: 12px; flex-wrap: wrap; }
.heist-root .h2-char {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  display: flex; flex-direction: row; min-width: 220px;
}
.heist-root .h2-char[data-primary="hack"]  { border-color: rgba(88,152,224,0.4); }
.heist-root .h2-char[data-primary="safe"]  { border-color: rgba(232,160,48,0.4); }
.heist-root .h2-char[data-primary="musc"]  { border-color: rgba(224,80,80,0.4); }
.heist-root .h2-char[data-primary="soc"]   { border-color: rgba(144,112,224,0.4); }
.heist-root .h2-char[data-primary="drive"] { border-color: rgba(82,196,122,0.4); }
.heist-root .h2-char-portrait {
  width: 72px; height: 72px; flex-shrink: 0;
  background: rgba(0,0,0,0.35); position: relative; overflow: hidden;
}
.heist-root .h2-char-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
.heist-root .h2-char-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.2); font-family: monospace;
}
.heist-root .h2-char-info { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.heist-root .h2-char-name { font-size: 14px; font-weight: 700; color: var(--text); }
.heist-root .h2-char-role {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted);
}
.heist-root .h2-char-skills { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
.heist-root .h2-skill-row { display: flex; align-items: center; gap: 8px; }
.heist-root .h2-skill-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  font-family: monospace; color: var(--muted); width: 34px; flex-shrink: 0;
}
.heist-root .h2-skill-bars { display: flex; gap: 3px; }
.heist-root .h2-skill-bars .seg {
  width: 14px; height: 6px; border-radius: 1px; background: rgba(255,255,255,0.07);
}
.heist-root .h2-skill-bars .seg.f-hack  { background: var(--sk-hack); }
.heist-root .h2-skill-bars .seg.f-safe  { background: var(--sk-safe); }
.heist-root .h2-skill-bars .seg.f-musc  { background: var(--sk-musc); }
.heist-root .h2-skill-bars .seg.f-soc   { background: var(--sk-soc); }
.heist-root .h2-skill-bars .seg.f-drive { background: var(--sk-drive); }

.heist-root .h2-reasoning {
  font-size: 12px; color: var(--muted); font-style: italic;
  padding: 6px 10px; background: var(--panel2);
  border-radius: 4px; margin-top: 4px;
}

/* ── challenge block ──────────────────────────────────────────────────────── */
.heist-root .h2-challenge {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.heist-root .h2-skill-chip {
  font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 4px;
}
.heist-root .sc-hack  { background: rgba(88,152,224,0.2);  color: var(--sk-hack); }
.heist-root .sc-safe  { background: rgba(232,160,48,0.2);  color: var(--sk-safe); }
.heist-root .sc-musc  { background: rgba(224,80,80,0.2);   color: var(--sk-musc); }
.heist-root .sc-soc   { background: rgba(144,112,224,0.2); color: var(--sk-soc); }
.heist-root .sc-drive { background: rgba(82,196,122,0.2);  color: var(--sk-drive); }
.heist-root .h2-level { font-size: 13px; font-weight: 700; color: var(--muted); }
.heist-root .h2-level.hard { color: var(--red); }
.heist-root .h2-level.med  { color: var(--accent); }
.heist-root .h2-core-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  background: rgba(224,80,80,0.12); color: var(--red);
  padding: 3px 8px; border-radius: 3px;
}
.heist-root .h2-hidden-warn {
  font-size: 11px; color: var(--purple);
  padding: 6px 10px; background: rgba(144,112,224,0.08);
  border-left: 2px solid var(--purple); border-radius: 0 4px 4px 0;
  margin-top: 8px;
}

/* ── decision block ───────────────────────────────────────────────────────── */
.heist-root .h2-decision-note {
  font-size: 13px; color: var(--accent); font-style: italic;
}
.heist-root .h2-decision-pass {
  font-size: 13px; color: var(--muted); font-style: italic;
}

/* ── escape info ──────────────────────────────────────────────────────────── */
.heist-root .h2-escape-info {
  font-size: 13px; color: var(--muted); font-family: monospace;
}

/* ── narration ────────────────────────────────────────────────────────────── */
.heist-root .h2-narration {
  font-size: 14px; line-height: 1.8; color: #c0bdd4;
  font-style: italic;
  border-top: 1px solid var(--border); padding-top: 16px;
}
.heist-root .h2-narration p { margin-bottom: 10px; }
.heist-root .h2-narration p:last-child { margin-bottom: 0; }
.heist-root .h2-narrating {
  font-size: 12px; color: var(--muted); font-style: italic;
  border-top: 1px solid var(--border); padding-top: 12px;
}

/* ── outcome card ─────────────────────────────────────────────────────────── */
.heist-root .h2-outcome {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  animation: h2CardIn 0.4s ease;
}
.heist-root .h2-outcome h3 {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}
.heist-root .h2-outcome-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.heist-root .h2-og-cell { display: flex; flex-direction: column; gap: 4px; }
.heist-root .h2-og-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted);
}
.heist-root .h2-og-value { font-size: 18px; font-weight: 700; color: var(--text); font-family: monospace; }
.heist-root .h2-og-value.take { color: var(--accent); font-size: 26px; }
.heist-root .h2-og-value.win  { color: var(--green); }
.heist-root .h2-og-value.loss { color: var(--red); }
</style>

<template id="heist-template">
  <div class="heist-root">
    <div class="h2-job-header" data-ht="job-header" style="display:none">
      <span class="h2-job-name" data-ht="job-name">—</span>
      <div class="h2-job-profile" data-ht="job-profile"></div>
      <span class="h2-job-reward" data-ht="job-reward"></span>
    </div>
    <div class="h2-scenes" data-ht="scenes">
      <div class="h2-empty">Waiting for the heist to begin…</div>
    </div>
  </div>
</template>

<script>
(function () {
  'use strict';

  // challenge_skill → short code (used for CSS class on chips)
  const SKILL_API_TO_SHORT = {
    hacker: 'hack', safecracker: 'safe', muscle: 'musc',
    inside_man: 'soc', driver: 'drive',
  };
  // primary skill → role label
  const ROLE_BY_PRIMARY = {
    hack:  'HACKER',
    safe:  'SAFECRACKER',
    musc:  'MUSCLE',
    soc:   'INSIDE MAN',
    drive: 'DRIVER',
  };
  // challenge_skill → display word ("electronic", "social", etc.)
  const SKILL_TO_TYPE_WORD = {
    hacker:      'ELECTRONIC',
    safecracker: 'PHYSICAL',
    muscle:      'CONFRONTATION',
    inside_man:  'SOCIAL',
    driver:      'DRIVER',
  };
  // job.profile key → short code (for the header chips)
  const PROFILE_KEY_TO_SHORT = {
    social:        'soc',
    physical:      'safe',
    electronic:    'hack',
    confrontation: 'musc',
  };
  const PROFILE_KEY_TO_LABEL = {
    social:        'Social',
    physical:      'Physical',
    electronic:    'Electronic',
    confrontation: 'Confrontation',
  };

  let root = null;
  let Shell = null;
  // per-AI state
  const scenesByAI = {};       // ai_idx → { sceneNum → { meta, result, narration } }
  const narrationsByAI = {};   // ai_idx → { sceneNum → narration } (when it arrives before scene_done)
  const gameStateByAI = {};    // ai_idx → state from game_done
  const heatByAI = {};         // ai_idx → current heat
  const crewByAI = {};         // ai_idx → crew object (with .members)
  const jobByAI = {};          // ai_idx → job object

  function $$(name) { return root && root.querySelector(`[data-ht="${name}"]`); }
  function _scenesFor(aiIdx)     { return scenesByAI[aiIdx]     ||= {}; }
  function _narrationsFor(aiIdx) { return narrationsByAI[aiIdx] ||= {}; }

  // ── job header ──────────────────────────────────────────────────────────────
  function renderJobHeader() {
    if (!root || !Shell) return;
    const esc = Shell.helpers.escapeHtml;
    const job = jobByAI[Shell.currentAI];
    const header = $$('job-header');
    if (!job) { if (header) header.style.display = 'none'; return; }
    if (header) header.style.display = '';

    $$('job-name').textContent = job.name || '—';

    const profile = job.profile || {};
    const chips = Object.entries(PROFILE_KEY_TO_LABEL).map(([key, label]) => {
      const level = (profile[key] || 'NONE').toUpperCase();
      const cls = level === 'HARD' ? 'hard' : level === 'MEDIUM' ? 'med' : level === 'LOW' ? 'low' : '';
      const text = level === 'NONE' ? `${esc(label)} —` : `${esc(label)} ${esc(level.slice(0,3))}`;
      return `<span class="h2-profile-chip ${cls}">${text}</span>`;
    }).join('');
    $$('job-profile').innerHTML = chips;

    const rr = job.reward_range;
    const rewardEl = $$('job-reward');
    if (rr) rewardEl.innerHTML =
      `Reward <strong>$${Number(rr[0]).toLocaleString()} – $${Number(rr[1]).toLocaleString()}</strong>`;
    else rewardEl.innerHTML = '';
  }

  // ── scene list ──────────────────────────────────────────────────────────────
  function renderSceneList() {
    if (!root || !Shell) return;
    const listEl = $$('scenes');
    if (!listEl) return;
    listEl.innerHTML = '';
    const scenes = scenesByAI[Shell.currentAI] || {};
    const sceneNums = Object.keys(scenes).map(Number).sort((a, b) => a - b);
    if (!sceneNums.length) {
      listEl.innerHTML = '<div class="h2-empty">Waiting for the heist to begin…</div>';
    } else {
      sceneNums.forEach(n => renderSceneCard(n));
    }
    if (gameStateByAI[Shell.currentAI]) renderOutcome();
  }

  function renderSceneCard(sceneNum) {
    if (!root || !Shell) return;
    const esc = Shell.helpers.escapeHtml;
    const scenes = scenesByAI[Shell.currentAI] || {};
    const s = scenes[sceneNum]; if (!s) return;
    const job = jobByAI[Shell.currentAI];
    const crew = crewByAI[Shell.currentAI];
    const listEl = $$('scenes');
    listEl.querySelector('.h2-empty')?.remove();

    const cardId = 'h2-card-' + Shell.currentAI + '-' + sceneNum;
    let card = document.getElementById(cardId);
    const isNew = !card;
    if (isNew) {
      card = document.createElement('div');
      card.id = cardId;
      // newest-first: insert at the top of the scenes panel
      listEl.insertBefore(card, listEl.firstChild);
    }
    const meta = s.meta || {}, result = s.result || null, narr = s.narration || null;

    // ── type classification ───────────────────────────────────────────────────
    let typeLabel, typeCls;
    if (meta.scene_type === 'escape')        { typeLabel = 'ESCAPE';     typeCls = 'stb-escape'; }
    else if (meta.scene_type === 'decision') { typeLabel = 'DECISION';   typeCls = 'stb-decision'; }
    else if (meta.scene_type === 'setup')    { typeLabel = 'SETUP';      typeCls = 'stb-setup'; }
    else if (meta.is_core)                   { typeLabel = 'CHALLENGE';  typeCls = 'stb-challenge'; }
    else if (meta.challenge_skill)           { typeLabel = 'CHALLENGE';  typeCls = 'stb-challenge'; }
    else                                     { typeLabel = 'TRANSITION'; typeCls = 'stb-transition'; }

    // ── outcome chip + card class ────────────────────────────────────────────
    let chipCls, chipText, cardCls;
    if (!result) {
      chipCls = 'oc-pending'; chipText = '…'; cardCls = 'active';
    } else if (result.aborted) {
      chipCls = 'oc-failure'; chipText = 'ABORTED ✗'; cardCls = 'failure';
    } else if (meta.scene_type === 'escape') {
      if (result.escape_success) { chipCls = 'oc-success'; chipText = 'CLEAN EXIT ✓'; cardCls = 'success'; }
      else                       { chipCls = 'oc-failure'; chipText = 'CAUGHT ✗';     cardCls = 'failure'; }
    } else if (result.success === true) {
      chipCls = 'oc-success'; chipText = 'SUCCESS ✓'; cardCls = 'success';
    } else if (result.success === false) {
      chipCls = 'oc-failure'; chipText = 'FAILED ✗'; cardCls = 'failure';
    } else {
      chipCls = 'oc-none'; chipText = '—'; cardCls = 'neutral';
    }

    card.className = 'h2-card ' + cardCls + (isNew || card.classList.contains('expanded') ? ' expanded' : '');

    // ── assigned characters block ────────────────────────────────────────────
    let charsHtml = '';
    const assignedIds = (result && result.assigned_member_ids) || [];
    if (assignedIds.length && crew && crew.members) {
      const blocks = assignedIds.map(id => {
        const c = crew.members.find(x => x.id == id);
        return c ? charBlockHtml(c) : '';
      }).filter(Boolean).join('');
      const reasoningHtml = result && result.reasoning
        ? `<div class="h2-reasoning">"${esc(result.reasoning)}"</div>` : '';
      charsHtml = `<div>
        <div class="h2-section-label">Assigned</div>
        <div class="h2-chars">${blocks}</div>
        ${reasoningHtml}
      </div>`;
    }

    // ── challenge / escape block ─────────────────────────────────────────────
    let challengeHtml = '';
    if (meta.scene_type === 'escape') {
      const diff = result ? result.escape_difficulty : null;
      const mod  = job ? job.escape_modifier : null;
      const heat = result ? result.heat : null;
      const parts = [];
      if (diff != null) parts.push(`difficulty ${esc(String(diff))}`);
      if (mod  != null) parts.push(`modifier ${mod > 0 ? '+' : ''}${esc(String(mod))}`);
      if (heat != null) parts.push(`heat ${esc(String(heat))}`);
      challengeHtml = `<div>
        <div class="h2-section-label">Escape Roll</div>
        <div class="h2-escape-info">${parts.join(' · ') || '—'}</div>
      </div>`;
    } else if (meta.challenge_skill) {
      const apiSkill = (meta.challenge_skill || '').toLowerCase();
      const shortSk  = SKILL_API_TO_SHORT[apiSkill] || 'soc';
      const word     = SKILL_TO_TYPE_WORD[apiSkill] || meta.challenge_skill;
      const reality  = result ? (result.challenge_level || 'NONE').toUpperCase() : null;
      // Expected from job.profile, looked up via reverse mapping
      let expected = null;
      if (job && job.profile) {
        const profileKey = Object.entries(PROFILE_KEY_TO_SHORT).find(([, sh]) => sh === shortSk)?.[0];
        if (profileKey) expected = (job.profile[profileKey] || 'NONE').toUpperCase();
      }
      const level = reality || expected || '';
      const lvlCls = level === 'HARD' ? 'hard' : level === 'MEDIUM' ? 'med' : '';
      const coreHtml = meta.is_core ? '<span class="h2-core-badge">Core Scene</span>' : '';
      const warnHtml = (expected && reality && expected !== reality)
        ? `<div class="h2-hidden-warn">⚠ Hidden depth: expected ${esc(expected)}, got ${esc(reality)}</div>`
        : '';
      challengeHtml = `<div>
        <div class="h2-section-label">Challenge</div>
        <div class="h2-challenge">
          <span class="h2-skill-chip sc-${shortSk}">${esc(word)}</span>
          ${level ? `<span class="h2-level ${lvlCls}">${esc(level)}</span>` : ''}
          ${coreHtml}
        </div>
        ${warnHtml}
      </div>`;
    }

    // ── decision block ───────────────────────────────────────────────────────
    let decisionHtml = '';
    if (meta.scene_type === 'decision' && result) {
      const pursue = result.decision === 'pursue' || result.pursue === true;
      decisionHtml = `<div>
        <div class="h2-section-label">Decision</div>
        <div class="${pursue ? 'h2-decision-note' : 'h2-decision-pass'}">${pursue ? '▶ Pursued' : '— Passed'}</div>
        ${result.reasoning ? `<div class="h2-reasoning">"${esc(result.reasoning)}"</div>` : ''}
      </div>`;
    }

    // ── narration ────────────────────────────────────────────────────────────
    const narrationHtml = result
      ? (narr ? `<div class="h2-narration">${Shell.helpers.renderMd(narr)}</div>`
              : '<div class="h2-narrating">Narrating…</div>')
      : '';

    card.innerHTML = `
      <div class="h2-head">
        <span class="h2-chevron">▶</span>
        <span class="h2-num">SCENE ${sceneNum}</span>
        <span class="h2-title">${esc(meta.title || '')}</span>
        <span class="h2-type-badge ${typeCls}">${typeLabel}</span>
        <span class="h2-outcome-chip ${chipCls}">${chipText}</span>
      </div>
      <div class="h2-body">
        ${charsHtml}
        ${challengeHtml}
        ${decisionHtml}
        ${narrationHtml}
      </div>`;

    // Click header to toggle expand
    card.querySelector('.h2-head').addEventListener('click', () => card.classList.toggle('expanded'));
  }

  function charBlockHtml(c) {
    const esc = Shell.helpers.escapeHtml;
    const primary = Shell.helpers.primarySkill(c);
    const role = ROLE_BY_PRIMARY[primary] || '';
    const portrait = Shell.helpers.portraitUrl(c);
    // Show only skills the character actually has (level > 0)
    const skillsHtml = ['hack', 'safe', 'musc', 'soc', 'drive'].map(sk => {
      const val = Shell.helpers.skillVal(c, sk);
      if (val <= 0) return '';
      const segs = [0,1,2].map(i =>
        `<span class="seg ${i < val ? 'f-' + sk : ''}"></span>`).join('');
      return `<div class="h2-skill-row">
        <span class="h2-skill-label">${sk.toUpperCase()}</span>
        <div class="h2-skill-bars">${segs}</div>
      </div>`;
    }).filter(Boolean).join('');

    const initials = (c.name || '?').slice(0,1).toUpperCase();

    return `<div class="h2-char" data-primary="${primary}">
      <div class="h2-char-portrait">
        <div class="h2-char-fallback">${esc(initials)}</div>
        <img src="${portrait}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="h2-char-info">
        <div class="h2-char-name">${esc(c.name)}</div>
        <div class="h2-char-role">${esc(role)}</div>
        <div class="h2-char-skills">${skillsHtml}</div>
      </div>
    </div>`;
  }

  // ── outcome ─────────────────────────────────────────────────────────────────
  function renderOutcome() {
    if (!root || !Shell) return;
    const esc = Shell.helpers.escapeHtml;
    const listEl = $$('scenes');
    const existing = document.getElementById('h2-outcome-' + Shell.currentAI);
    if (existing) existing.remove();
    const gs = gameStateByAI[Shell.currentAI];
    if (!gs) return;
    const take = gs.final_take != null ? '$' + Number(gs.final_take).toLocaleString() : '—';
    const card = document.createElement('div');
    card.id = 'h2-outcome-' + Shell.currentAI;
    card.className = 'h2-outcome';
    const aiName = (Shell.aiList[Shell.currentAI] || {}).label || ('AI ' + Shell.currentAI);
    card.innerHTML = `
      <h3>Final Result — ${esc(aiName)}</h3>
      <div class="h2-outcome-grid">
        <div class="h2-og-cell">
          <span class="h2-og-label">Take</span>
          <span class="h2-og-value take">${esc(take)}</span>
        </div>
        <div class="h2-og-cell">
          <span class="h2-og-label">Escape</span>
          <span class="h2-og-value ${gs.escape_success ? 'win' : 'loss'}">${gs.escape_success ? 'Clean' : 'Blown'}</span>
        </div>
        <div class="h2-og-cell">
          <span class="h2-og-label">Aborted</span>
          <span class="h2-og-value ${gs.aborted ? 'loss' : 'win'}">${gs.aborted ? 'Yes' : 'No'}</span>
        </div>
      </div>`;
    // newest-first: outcome card sits at the very top
    listEl.insertBefore(card, listEl.firstChild);
  }

  // ── lifecycle ──────────────────────────────────────────────────────────────
  function mount(container, opts) {
    Shell = (opts && opts.shell) || window.Shell;
    const tpl = document.getElementById('heist-template');
    if (!tpl) { console.error('HeistTab: #heist-template not in DOM'); return; }
    container.innerHTML = '';
    container.appendChild(tpl.content.cloneNode(true));
    root = container.querySelector('.heist-root');
    renderJobHeader();
    renderSceneList();
    if (Shell.onAISelected) Shell.onAISelected(() => {
      renderJobHeader();
      renderSceneList();
      // Sync topbar heat with the newly-selected AI's last-known heat
      if (Shell.setHeat) Shell.setHeat(heatByAI[Shell.currentAI] || 0);
    });
  }

  function handleEvent(e) {
    if (!root || !Shell) return;
    const aiIdx = e.ai_idx ?? 0;
    const scenes = _scenesFor(aiIdx);
    const narrations = _narrationsFor(aiIdx);

    if (e.type === 'crew_known') {
      crewByAI[aiIdx] = e.crew;

    } else if (e.type === 'job_known') {
      jobByAI[aiIdx] = e.job;
      if (aiIdx === Shell.currentAI) renderJobHeader();

    } else if (e.type === 'turn_end') {
      const m = e.label && e.label.match(/^scene_(\d+)_(?:escape_)?narrate$/);
      if (m && e.parsed && e.parsed.narration) {
        const sNum = parseInt(m[1], 10);
        narrations[sNum] = e.parsed.narration;
        if (scenes[sNum]) {
          scenes[sNum].narration = e.parsed.narration;
          if (aiIdx === Shell.currentAI) renderSceneCard(sNum);
        }
      }

    } else if (e.type === 'scene_start') {
      const sNum = e.scene_num;
      if (!scenes[sNum]) scenes[sNum] = {};
      scenes[sNum].meta = e;
      if (narrations[sNum]) scenes[sNum].narration = narrations[sNum];
      if (aiIdx === Shell.currentAI) renderSceneCard(sNum);

    } else if (e.type === 'scene_done') {
      heatByAI[aiIdx] = e.heat;
      const sNum = e.scene_num;
      if (!scenes[sNum]) scenes[sNum] = {};
      scenes[sNum].result = e;
      if (narrations[sNum]) scenes[sNum].narration = narrations[sNum];
      if (aiIdx === Shell.currentAI) renderSceneCard(sNum);

    } else if (e.type === 'game_done') {
      gameStateByAI[aiIdx] = e.state;
      if (e.state.crew) crewByAI[aiIdx] = e.state.crew;
      if (e.state.job)  jobByAI[aiIdx]  = e.state.job;
      heatByAI[aiIdx] = e.state.heat;
      if (aiIdx === Shell.currentAI) {
        renderJobHeader();
        renderOutcome();
      }
    }
  }

  function reset() {
    for (const k of Object.keys(scenesByAI))    delete scenesByAI[k];
    for (const k of Object.keys(narrationsByAI))delete narrationsByAI[k];
    for (const k of Object.keys(gameStateByAI)) delete gameStateByAI[k];
    for (const k of Object.keys(heatByAI))      delete heatByAI[k];
    for (const k of Object.keys(crewByAI))      delete crewByAI[k];
    for (const k of Object.keys(jobByAI))       delete jobByAI[k];
    renderJobHeader();
    renderSceneList();
  }

  function unmount() { root = null; }

  window.HeistTab = { mount, handleEvent, reset, unmount };
})();
</script>
