<!--
  The Heist tab. Loaded into the viewer shell at boot via /tabs/heist.

  Shell contract:
    1. Shell loads this fragment (style + template + script all activate).
    2. Shell calls HeistTab.mount(container, { shell })
    3. Shell forwards every SSE event via HeistTab.handleEvent(ev)
    4. Shell calls HeistTab.reset() on replay reset

  Events the tab acts on:
    crew_known              → fix crew membership
    job_known               → fix job theme
    scene_start             → add / advance active scene
    scene_done              → finalize scene state and emit reasoning to rail
    turn_end (narration)    → fill in scene narration once it lands
    game_done               → cache final state for replay / switching

  The old stacked scene cards and job header are gone. The page now shows a
  timeline plus a single active-scene hero view.
-->

<template id="heist-template">
  <div class="heist-root">
    <div class="h2-timeline" data-ht="timeline">
      <span class="h2-timeline-label">Scenes</span>
      <span class="h2-timeline-empty" data-ht="timeline-empty">Waiting for the heist to begin…</span>
    </div>
    <div class="h2-stage" data-ht="stage">
      <div class="h2-empty">Waiting for the heist to begin…</div>
    </div>

</template>

<script>
(function () {
  'use strict';

  const SKILL_API_TO_SHORT = {
    hacker: 'hack',
    safecracker: 'safe',
    muscle: 'musc',
    inside_man: 'soc',
    driver: 'drive',
  };
  const SKILL_TO_TYPE_WORD = {
    hacker: 'ELECTRONIC',
    safecracker: 'PHYSICAL',
    muscle: 'CONFRONTATION',
    inside_man: 'SOCIAL',
    driver: 'DRIVING',
  };
  const PROFILE_KEY_TO_SHORT = {
    social: 'soc',
    physical: 'safe',
    electronic: 'hack',
    confrontation: 'musc',
  };

  const STOP_WORDS = new Set([
    'the', 'a', 'an', 'of', 'and', 'to', 'in', 'on', 'at', 'for', 'from',
    'with', 'into', 'over', 'under', 'through', 'after', 'before', 'by',
  ]);
  const SUFFIX_WORDS = new Set([
    'floor', 'room', 'hall', 'level', 'deck', 'wing', 'bay', 'basement',
    'roof', 'lobby', 'garage', 'exit', 'entrance', 'approach', 'decision',
    'handoff', 'hand-off', 'interior', 'exterior', 'vault',
  ]);
  const DIFF_SEGS = { LOW: 1, MEDIUM: 2, HARD: 3 };
  const SKILL_ABBR = { hack: 'HCK', safe: 'SFR', musc: 'MSC', soc: 'SOC', drive: 'DRV' };

  let root = null;
  let Shell = null;

  const scenesByAI = {};
  const narrationsByAI = {};
  const gameStateByAI = {};
  const heatByAI = {};
  const crewByAI = {};
  const jobByAI = {};
  const activeSceneByAI = {};
  const reasoningEmittedByAI = {};
  const decisionEmittedByAI = {};

  function $$(name) {
    return root && root.querySelector(`[data-ht="${name}"]`);
  }
  function _scenesFor(aiIdx) {
    return scenesByAI[aiIdx] ||= {};
  }
  function _narrationsFor(aiIdx) {
    return narrationsByAI[aiIdx] ||= {};
  }
  function _reasoningSet(aiIdx) {
    return reasoningEmittedByAI[aiIdx] ||= new Set();
  }
  function _decisionSet(aiIdx) {
    return decisionEmittedByAI[aiIdx] ||= new Set();
  }

  function esc(s) {
    return Shell.helpers.escapeHtml(s);
  }

  function levelToCount(level) {
    const s = String(level || '').toUpperCase();
    return { HARD: 3, MEDIUM: 2, LOW: 1, MED: 2 }[s] || 0;
  }

  function segs(n, cls) {
    return [0, 1, 2].map(i => `<span class="seg${i < n ? ' f-' + cls : ''}"></span>`).join('');
  }

  function photoClassForJob(name) {
    const n = String(name || '').toLowerCase();
    if (n.includes('armored') || n.includes('armoured') || n.includes('truck') || n.includes('car')) return 'still-armored';
    if (n.includes('server') || n.includes('data') || n.includes('tech') || n.includes('corporate')) return 'still-server';
    if (n.includes('penthouse') || n.includes('caper') || n.includes('roof')) return 'still-penthouse';
    if (n.includes('cargo') || n.includes('yard') || n.includes('dock') || n.includes('port')) return 'still-cargo';
    if (n.includes('diplomat') || n.includes('embassy') || n.includes('reception')) return 'still-diplomat';
    if (n.includes('casino') || n.includes('vault') || n.includes('hotel')) return 'still-casino';
    return 'still-default';
  }

  function iconForJob(name) {
    const n = String(name || '').toLowerCase();
    if (n.includes('museum') || n.includes('gallery') || n.includes('gala')) return '🏛️';
    if (n.includes('armored') || n.includes('armoured') || n.includes('truck')) return '🚐';
    if (n.includes('server') || n.includes('data') || n.includes('tech')) return '🖥️';
    if (n.includes('penthouse') || n.includes('roof')) return '🌆';
    if (n.includes('cargo') || n.includes('dock') || n.includes('port')) return '🏗️';
    if (n.includes('diplomat') || n.includes('embassy')) return '🎩';
    if (n.includes('casino') || n.includes('vault')) return '🎰';
    return '🏢';
  }

  function shortenSceneName(title, sceneNum) {
    const raw = String(title || '').trim();
    if (!raw) return `Scene ${sceneNum}`;
    const cleaned = raw.replace(/[^A-Za-z0-9\s-]+/g, ' ');
    const words = cleaned.split(/[\s-]+/).filter(Boolean);
    const sig = words.filter(w => !STOP_WORDS.has(w.toLowerCase()));
    let parts = sig.length >= 2 ? sig.slice(-2) : sig.slice();
    if (!parts.length) parts = words.slice(-2);
    if (parts.length > 1 && SUFFIX_WORDS.has(parts[parts.length - 1].toLowerCase())) {
      parts = parts.slice(0, -1);
    }
    let short = parts.join(' ').trim();
    if (!short) short = words.slice(-1)[0] || `Scene ${sceneNum}`;
    if (short.length > 12) {
      const last = sig.length ? sig[sig.length - 1] : words[words.length - 1];
      if (last && last.length <= 12) short = last;
      else short = short.slice(0, 12).trim();
    }
    return short || `Scene ${sceneNum}`;
  }

  function currentCrew(aiIdx) {
    const crew = crewByAI[aiIdx];
    return crew && Array.isArray(crew.members) ? crew.members : [];
  }

  function currentJob(aiIdx) {
    return jobByAI[aiIdx] || null;
  }

  function currentScenes(aiIdx) {
    return _scenesFor(aiIdx);
  }

  function getActiveSceneNum(aiIdx) {
    const scenes = currentScenes(aiIdx);
    const active = activeSceneByAI[aiIdx];
    if (active != null && scenes[active]) return active;
    const nums = Object.keys(scenes).map(Number).sort((a, b) => a - b);
    const latest = nums.length ? nums[nums.length - 1] : null;
    if (latest != null) activeSceneByAI[aiIdx] = latest;
    return latest;
  }

  function sceneOutcome(scene) {
    const meta = scene.meta || {};
    const result = scene.result || null;
    if (!result) {
      return { cls: 'oc-pending', text: '…' };
    }
    if (result.aborted) {
      return { cls: 'oc-failure', text: 'Aborted ✗' };
    }
    if (meta.scene_type === 'escape') {
      return result.escape_success
        ? { cls: 'oc-success', text: 'Clean Exit ✓' }
        : { cls: 'oc-failure', text: 'Caught ✗' };
    }
    if (result.success === false) {
      return { cls: 'oc-failure', text: 'Failed ✗' };
    }
    return { cls: 'oc-success', text: 'Success ✓' };
  }

  function sceneStatusClass(scene) {
    const result = scene.result || null;
    if (!result) return 'pending';
    if (result.aborted) return 'failure';
    if (scene.meta && scene.meta.scene_type === 'escape') {
      return result.escape_success ? 'success' : 'failure';
    }
    if (result.success === false) return 'failure';
    return 'success';
  }

  function renderTimeline() {
    if (!root || !Shell) return;
    const wrap = $$('timeline');
    const empty = $$('timeline-empty');
    if (!wrap) return;

    const aiIdx = Shell.currentAI;
    const scenes = currentScenes(aiIdx);
    const nums = Object.keys(scenes).map(Number).sort((a, b) => a - b);
    const pills = nums.map(sceneNum => {
      const scene = scenes[sceneNum];
      const meta = scene.meta || {};
      const active = getActiveSceneNum(aiIdx) === sceneNum;
      const short = shortenSceneName(meta.title, sceneNum);
      const cls = ['h2-timeline-pill', sceneStatusClass(scene), active ? 'active' : '']
        .filter(Boolean)
        .join(' ');
      return `<button type="button" class="${cls}" onclick="HeistTab.setActiveScene(${aiIdx}, ${sceneNum})">
        <span class="h2-timeline-num">${String(sceneNum).padStart(2, '0')}</span>
        <span>${esc(short)}</span>
      </button>`;
    }).join('');

    if (empty) empty.style.display = nums.length ? 'none' : '';
    wrap.querySelectorAll('.h2-timeline-pill').forEach(el => el.remove());
    if (pills) {
      if (empty) empty.insertAdjacentHTML('afterend', pills);
      else wrap.insertAdjacentHTML('beforeend', pills);
    }
  }

  function leadHtmlForScene(scene, aiIdx) {
    const result = scene.result || null;
    const narr = scene.narration || '';
    const assignedIds = (result && result.assigned_member_ids) || [];
    if (!result || !narr || !assignedIds.length) return '';
    const crew = currentCrew(aiIdx);
    const leadId = assignedIds[0];
    const lead = crew.find(c => String(c.id) === String(leadId));
    if (!lead) return '';
    const initial = (lead.name || '?').slice(0, 1).toUpperCase();
    const primary = Shell.helpers.primarySkill(lead);
    return `<div class="h2-narration-lead" data-primary="${primary}">
      <div class="h2-narration-lead-fallback">${esc(initial)}</div>
      <img src="${Shell.helpers.portraitUrl(lead)}" alt="${esc(lead.name)}" loading="lazy" onerror="this.style.display='none'">
      <div class="h2-narration-lead-cap">${esc(lead.name)}</div>
    </div>`;
  }

  function renderChallengeCard(scene, job) {
    const meta = scene.meta || {};
    const result = scene.result || null;
    if (meta.scene_type !== 'escape' && !meta.challenge_skill) return '';

    const apiSkill = String(meta.challenge_skill || 'driver').toLowerCase();
    const shortSk = SKILL_API_TO_SHORT[apiSkill] || 'drive';
    const word = SKILL_TO_TYPE_WORD[apiSkill] || String(meta.challenge_skill || 'DRIVING').toUpperCase();

    let declared = meta.challenge_level ? String(meta.challenge_level).toUpperCase() : null;
    let reality = result && result.challenge_level ? String(result.challenge_level).toUpperCase() : null;
    let expected = null;
    if (job && job.profile) {
      const profileKey = Object.entries(PROFILE_KEY_TO_SHORT).find(([, sh]) => sh === shortSk)?.[0];
      if (profileKey) {
        const p = String(job.profile[profileKey] || '').toUpperCase();
        if (p && p !== 'NONE') expected = p;
      }
    }
    const level = reality || declared || expected || null;
    const filled = DIFF_SEGS[level] || 0;
    const diffRow = level
      ? `<div class="h2-challenge-row">
           <span class="h2-challenge-row-label">DIFF</span>
           <div class="h2-challenge-bars">${[0,1,2].map(i => `<span class="seg${i < filled ? ' f-' + shortSk : ''}"></span>`).join('')}</div>
         </div>`
      : '';
    const warn = expected && reality && expected !== reality
      ? `<div class="h2-hidden-warn">⚠ Hidden depth: expected ${esc(expected)}, got ${esc(reality)}</div>`
      : '';
    const abbr = SKILL_ABBR[shortSk] || shortSk.toUpperCase();

    return `<div class="h2-challenge-card" data-skill="${shortSk}">
      <div class="h2-challenge-icon">
        <span class="h2-challenge-icon-text">${esc(abbr)}</span>
      </div>
      <div class="h2-challenge-body">
        <div class="h2-challenge-head">
          <div>${esc(word)}</div>
          <div class="h2-challenge-head-sub">${esc(level || 'VARIES')}</div>
        </div>
        <div class="h2-challenge-info">
          ${diffRow}
          <div class="h2-challenge-level">${esc(level || 'VARIES')}</div>
        </div>
      </div>
    </div>${warn}`;
  }

  function renderScene() {
    if (!root || !Shell) return;
    const stage = $$('stage');
    if (!stage) return;

    const aiIdx = Shell.currentAI;
    const scenes = currentScenes(aiIdx);
    const sceneNum = getActiveSceneNum(aiIdx);
    const scene = sceneNum != null ? scenes[sceneNum] : null;

    if (!scene) {
      stage.innerHTML = '<div class="h2-empty">Waiting for the heist to begin…</div>';
      return;
    }

    const meta = scene.meta || {};
    const result = scene.result || null;
    const narr = scene.narration || _narrationsFor(aiIdx)[sceneNum] || '';
    const job = currentJob(aiIdx);
    const title = meta.title || `Scene ${sceneNum}`;
    const outcome = sceneOutcome(scene);
    const assignedIds = (result && result.assigned_member_ids) || [];
    const crew = currentCrew(aiIdx);
    const leadHtml = leadHtmlForScene({ ...scene, narration: narr }, aiIdx);
    const narrationHtml = narr
      ? `${leadHtml}<div class="h2-narration-prose">${Shell.helpers.renderMd(narr)}</div>`
      : '<div class="h2-narrating">Narrating…</div>';

    const castHtml = crew.length
      ? crew.map(member => {
          const assigned = assignedIds.some(id => String(id) === String(member.id));
          return `<div class="h2-cast-card${assigned ? '' : ' standby'}">
            ${Shell.helpers.charCardHtml(member, { hideCost: true, noId: true })}
          </div>`;
        }).join('')
      : '';

    const sceneTheme = photoClassForJob(job && job.name);
    const sceneLabel = esc(job && job.name ? job.name : 'The Job');
    const sceneIcon = esc(iconForJob(job && job.name));
    const challengeHtml = renderChallengeCard(scene, job);
    const challengeSection = challengeHtml
      ? `<div>
          <div class="h2-vp-label">Challenge</div>
          ${challengeHtml}
        </div>`
      : '';

    stage.innerHTML = `
      <div class="h2-scene-head">
        <div class="h2-scene-title">${esc(title)}</div>
        <div class="h2-scene-outcome ${outcome.cls}">${esc(outcome.text)}</div>
      </div>
      <div class="h2-stage-body">
        <div class="h2-narration">
          ${narrationHtml}
        </div>
        <div class="h2-visual-panel">
          <div>
            <div class="h2-vp-label">Scene Still</div>
            <div class="h2-scene-still ${sceneTheme}">
              <div class="h2-scene-still-vignette"></div>
              <div class="h2-scene-still-icon">${sceneIcon}</div>
              <div class="h2-scene-still-meta">
                <div class="h2-scene-still-loc">${sceneLabel}</div>
                <div class="h2-scene-still-title">${esc(title)}</div>
              </div>
            </div>
          </div>
          <div>
            <div class="h2-vp-label">Cast</div>
            <div class="h2-cast-row">${castHtml}</div>
          </div>
          ${challengeSection}
        </div>
      </div>`;
  }

  function renderAll() {
    if (!root || !Shell) return;
    renderTimeline();
    renderScene();
  }

  function setActiveScene(aiIdx, sceneNum) {
    activeSceneByAI[aiIdx] = sceneNum;
    if (aiIdx === Shell.currentAI) renderAll();
  }

  function mount(container, opts) {
    Shell = (opts && opts.shell) || window.Shell;
    const tpl = document.getElementById('heist-template');
    if (!tpl) {
      console.error('HeistTab: #heist-template not in DOM');
      return;
    }
    container.innerHTML = '';
    container.appendChild(tpl.content.cloneNode(true));
    root = container.querySelector('.heist-root');
    renderAll();
    if (Shell.onAISelected) {
      Shell.onAISelected(() => {
        renderAll();
        if (Shell.setHeat) Shell.setHeat(heatByAI[Shell.currentAI] || 0);
      });
    }
  }

  function handleEvent(e) {
    if (!root || !Shell) return;
    const aiIdx = e.ai_idx ?? 0;
    const scenes = _scenesFor(aiIdx);
    const narrations = _narrationsFor(aiIdx);

    if (e.type === 'crew_known') {
      crewByAI[aiIdx] = e.crew;
      if (aiIdx === Shell.currentAI) renderAll();

    } else if (e.type === 'job_known') {
      jobByAI[aiIdx] = e.job;
      if (aiIdx === Shell.currentAI) renderAll();

    } else if (e.type === 'turn_end') {
      const m = e.label && e.label.match(/^scene_(\d+)_(?:escape_)?narrate$/);
      if (m && e.parsed && e.parsed.narration) {
        const sNum = parseInt(m[1], 10);
        narrations[sNum] = e.parsed.narration;
        if (scenes[sNum]) scenes[sNum].narration = e.parsed.narration;
        if (aiIdx === Shell.currentAI) renderAll();
      }

    } else if (e.type === 'scene_start') {
      const sNum = e.scene_num;
      if (!scenes[sNum]) scenes[sNum] = {};
      scenes[sNum].meta = e;
      if (narrations[sNum]) scenes[sNum].narration = narrations[sNum];
      activeSceneByAI[aiIdx] = sNum;
      if (aiIdx === Shell.currentAI) renderAll();

    } else if (e.type === 'scene_done') {
      heatByAI[aiIdx] = e.heat;
      const sNum = e.scene_num;
      if (!scenes[sNum]) scenes[sNum] = {};
      scenes[sNum].result = e;
      if (narrations[sNum]) scenes[sNum].narration = narrations[sNum];
      if (!activeSceneByAI[aiIdx] || !scenes[activeSceneByAI[aiIdx]]) activeSceneByAI[aiIdx] = sNum;

      const reasoningSet = _reasoningSet(aiIdx);
      const decisionSet = _decisionSet(aiIdx);
      if (e.reasoning && !reasoningSet.has(sNum)) {
        reasoningSet.add(sNum);
        Shell.addThought(
          aiIdx,
          'scene',
          `Scene ${sNum} · Why these`,
          Shell.helpers.escapeHtml(e.reasoning)
        );
      }
      if (e.decision && !decisionSet.has(sNum)) {
        decisionSet.add(sNum);
        const decisionReasoning = e.decision.reasoning || e.reasoning || '—';
        Shell.addThought(
          aiIdx,
          'scene',
          `Scene ${sNum} · Decision`,
          `<strong>${e.decision.pursue ? 'Pursued' : 'Passed'}</strong> — ${Shell.helpers.escapeHtml(decisionReasoning)}`
        );
      }
      if (aiIdx === Shell.currentAI) renderAll();
      if (Shell.setHeat) Shell.setHeat(heatByAI[Shell.currentAI] || 0);

    } else if (e.type === 'game_done') {
      gameStateByAI[aiIdx] = e.state;
      if (e.state && e.state.crew) crewByAI[aiIdx] = e.state.crew;
      if (e.state && e.state.job) jobByAI[aiIdx] = e.state.job;
      if (e.state && e.state.heat != null) heatByAI[aiIdx] = e.state.heat;
      if (aiIdx === Shell.currentAI) {
        renderAll();
        if (Shell.setHeat) Shell.setHeat(heatByAI[aiIdx] || 0);
      }
    }
  }

  function reset() {
    for (const k of Object.keys(scenesByAI)) delete scenesByAI[k];
    for (const k of Object.keys(narrationsByAI)) delete narrationsByAI[k];
    for (const k of Object.keys(gameStateByAI)) delete gameStateByAI[k];
    for (const k of Object.keys(heatByAI)) delete heatByAI[k];
    for (const k of Object.keys(crewByAI)) delete crewByAI[k];
    for (const k of Object.keys(jobByAI)) delete jobByAI[k];
    for (const k of Object.keys(activeSceneByAI)) delete activeSceneByAI[k];
    for (const k of Object.keys(reasoningEmittedByAI)) delete reasoningEmittedByAI[k];
    for (const k of Object.keys(decisionEmittedByAI)) delete decisionEmittedByAI[k];
    renderAll();
  }

  function unmount() {
    root = null;
  }

  window.HeistTab = { mount, handleEvent, reset, unmount, setActiveScene };
})();
</script>
