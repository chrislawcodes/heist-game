<!--
  Hiring tab.

  Shell contract:
    1. Shell loads this fragment (style + template + script all activate).
    2. Shell calls HiringTab.mount(container, { shell })
    3. Shell forwards every SSE event via HiringTab.handleEvent(ev)
    4. Shell calls HiringTab.reset() on replay reset
    5. Tab can call Shell.markHired(...) when crews land
-->

<style>
.hiring-root {
  /* Single source of truth for character-card width. Both the free-character
     pool (left) and the crew slots (right) size their cards off this, so cards
     are pixel-identical on both sides. */
  --hr-card-w: 120px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px 18px 18px;
  background:
    radial-gradient(900px 280px at 50% -120px, rgba(232,160,48,0.06), transparent 60%),
    var(--bg);
}

.hiring-root .hr-banner {
  max-height: 0;
  opacity: 0;
  transform: translateY(-10px);
  overflow: hidden;
  margin-bottom: 0;
  border-bottom: 1px solid transparent;
  transition:
    max-height 0.28s ease,
    opacity 0.28s ease,
    transform 0.28s ease,
    margin-bottom 0.28s ease,
    border-color 0.28s ease;
}
.hiring-root .hr-banner.is-visible {
  max-height: 72px;
  opacity: 1;
  transform: translateY(0);
  margin-bottom: 12px;
  border-bottom-color: rgba(82,196,122,0.35);
}
.hiring-root .hr-banner-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 10px;
  border-radius: 10px;
  background: linear-gradient(90deg, rgba(82,196,122,0.2), rgba(82,196,122,0.04));
  color: var(--green);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.hiring-root .hr-banner-inner::before {
  content: '✓';
  font-size: 14px;
}
.hiring-root .hr-banner-detail {
  color: var(--text);
  font-weight: 700;
  letter-spacing: 0.2px;
  text-transform: none;
}

.hiring-root .hr-floor {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  min-height: 0;
  flex: 1;
}

.hiring-root .hr-pool {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.hiring-root .hr-pool-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.hiring-root .hr-section-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.hiring-root .hr-section-count {
  font-size: 11px;
  color: var(--muted);
  font-family: monospace;
}
.hiring-root .hr-pool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, var(--hr-card-w));
  justify-content: start;
  gap: 6px;
  align-content: start;
}
.hiring-root.is-done .hr-pool-grid {
  opacity: 0.45;
  filter: grayscale(0.22);
}

.hiring-root .hr-card {
  position: relative;   /* anchor for the bid-marker overlay on the portrait */
  display: flex;
  flex-direction: column;
  min-width: 0;
}
/* shell.js gives every .char-card a `cardIn` entrance animation. Our full
   re-renders recreate the cards, which would replay cardIn across the whole
   board on every marker drop / move — a jarring full-screen flash. Suppress
   it here; the hiring tab supplies its own targeted animations (hr-card
   enter/leave, chip drop). */
.hiring-root .char-card { animation: none; }

/* Flying clone used to animate a won card from the pool to its crew slot.
   It lives on document.body (so it can travel across containers), hence these
   rules are NOT scoped to .hiring-root. Freeze its inner animations so it
   reads as a single solid card gliding across. */
.hr-fly-ghost {
  border-radius: 7px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.55);
  will-change: transform;
}
.hr-fly-ghost .char-card,
.hr-fly-ghost .hr-chip { animation: none; }
.hiring-root .hr-card.is-leaving {
  animation: hrLeave 0.5s ease forwards;
}
.hiring-root .hr-card.is-entering {
  opacity: 0;
  transform: translateY(10px) scale(0.97);
  animation: hrEnter 0.6s ease forwards;
}
@keyframes hrLeave {
  from { opacity: 1; transform: none; filter: none; }
  to   { opacity: 0.18; transform: translateY(10px) scale(0.97); filter: grayscale(0.25); }
}
@keyframes hrEnter {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}

/* Bid markers overlay the top of the portrait so it's obvious which
   character is being bid on. */
.hiring-root .hr-chip-row {
  position: absolute;
  top: 5px;
  left: 5px;
  right: 5px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
  z-index: 2;
  pointer-events: none;
}
.hiring-root .hr-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
  white-space: nowrap;
  border: 1.5px solid color-mix(in srgb, var(--chip-color) 55%, transparent);
  background: color-mix(in srgb, var(--chip-color) 38%, rgba(0,0,0,0.62));
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
  transition:
    opacity 0.2s ease,
    transform 0.2s ease,
    color 0.2s ease,
    background-color 0.2s ease,
    border-color 0.2s ease;
}
.hiring-root .hr-chip.is-dropping {
  animation: chipDrop 0.32s cubic-bezier(0.2, 0.9, 0.3, 1.4);
}
@keyframes chipDrop {
  0%   { opacity: 0; transform: translateY(-10px) scale(0.6); }
  100% { opacity: 1; transform: none; }
}
.hiring-root .hr-chip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--chip-color);
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.35);
}
.hiring-root .hr-chip-amt {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
/* State changes recolor the marker via --chip-color; the base dark-tinted
   overlay style (white text) carries through for legibility over portraits. */
.hiring-root .hr-chip.won {
  --chip-color: var(--green);
}
.hiring-root .hr-chip.won .hr-chip-amt::before {
  content: '✓';
  font-size: 9px;
  line-height: 1;
}
.hiring-root .hr-chip.lost {
  --chip-color: #8f8e99;
  text-decoration: line-through;
  animation: chipLost 0.6s ease forwards;
}
.hiring-root .hr-chip.tied {
  --chip-color: var(--red);
  animation: tieFlash 0.85s ease-in-out infinite;
}
@keyframes chipLost {
  0%   { opacity: 1; transform: none; }
  100% { opacity: 0.55; transform: translateY(1px); }
}
@keyframes tieFlash {
  0%, 100% { box-shadow: 0 0 0 0 transparent; }
  50%      { box-shadow: 0 0 0 2px rgba(224,80,80,0.22); }
}

.hiring-root .hr-crews {
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 0 0 auto;
  width: max-content;
}
.hiring-root .hr-crew-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}
.hiring-root .hr-crew-col {
  flex: 0 0 auto;
  width: max-content;
  min-height: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-top-width: 3px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}
.hiring-root .hr-crew-col.is-active {
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 10px 24px rgba(0,0,0,0.18);
  transform: translateY(-1px);
}
.hiring-root .hr-crew-head {
  padding: 10px 10px 9px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
}
.hiring-root .hr-crew-topline {
  display: flex;
  align-items: center;
  gap: 7px;
  min-width: 0;
}
.hiring-root .hr-crew-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--crew-color);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--crew-color) 16%, transparent);
}
.hiring-root .hr-crew-name {
  min-width: 0;
  flex: 1;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hiring-root .hr-crew-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
}
.hiring-root .hr-bankroll-text {
  font-family: monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.hiring-root .hr-done-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 6px;
  border-radius: 999px;
  background: rgba(82,196,122,0.14);
  border: 1px solid rgba(82,196,122,0.24);
  color: var(--green);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.hiring-root .hr-crew-slots {
  display: grid;
  grid-template-columns: repeat(2, var(--hr-card-w));
  gap: 6px;
  padding: 10px;
}
.hiring-root .hr-slot {
  width: 100%;
}
.hiring-root .hr-slot .hr-card,
.hiring-root .hr-slot-empty {
  width: 100%;
}
.hiring-root .hr-slot-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  border: 1px dashed rgba(255,255,255,0.14);
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  background: rgba(255,255,255,0.02);
}

.hiring-root .hr-footnote {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}
</style>

<template id="hiring-template">
  <div class="hiring-root"></div>
</template>

<script>
(function () {
  'use strict';

  let root = null;
  let Shell = null;

  // HIRES: char_id -> array of ai_idx values that have hired this character.
  const HIRES = {};
  // crewByAI: ai_idx -> crew payload from crew_known / game_done.
  const crewByAI = {};
  // bidParsedByAI: ai_idx -> { char_id -> chip record }.
  const bidParsedByAI = {};
  const crewKnownByAI = new Set();
  const movingCharIds = new Set();
  const moveTimersByChar = new Map();
  const chipTimersByKey = new Map();
  // spentByAI: ai_idx -> authoritative spend, set from auction_round_resolved
  // (BANKROLL - bankrolls_after). Drives the bankroll meter once a round resolves.
  const spentByAI = {};
  let resolvingTimer = null;

  const BANKROLL = 2000;
  const CHIP_CLEAR_MS = 900;
  const MOVE_MS = 700;            // slow glide so the move to crew is visible
  const RESOLVE_MS = 500;
  const MARKER_STAGGER_MS = 500;  // gap between bid markers dropping onto portraits
  const WIN_HOLD_MS = 600;        // hold winners highlighted before cards move
  // Gap between each won card's flight. Must exceed MOVE_MS so flights don't
  // overlap (each card lands + commits before the next one targets a slot).
  const MOVE_STAGGER_MS = MOVE_MS + 120;

  // Staggered bid-marker placement: markers are added to the ledger one at a
  // time (MARKER_STAGGER_MS apart) so the user clearly sees each bid land.
  const _placeQueue = [];
  let _placeTimer = null;
  let _moveHoldTimer = null;
  let _moveSeqTimer = null;
  const _ghosts = [];   // in-flight flying-card clones, for cleanup on reset

  function $$(name) {
    return root && root.querySelector(`[data-hr="${name}"]`);
  }

  function charKey(id) {
    return String(id);
  }

  function getChar(id) {
    if (!Shell) return null;
    const raw = Shell.charById && (Shell.charById.get(id) || Shell.charById.get(Number(id)) || Shell.charById.get(String(id)));
    if (raw) return raw;
    return (Shell.roster || []).find(c => charKey(c.id) === charKey(id)) || null;
  }

  function getCrewLetter(aiIdx) {
    return String.fromCharCode(65 + aiIdx);
  }

  function isHiredSomewhere(charId) {
    const key = charKey(charId);
    return !!(HIRES[key] && HIRES[key].length);
  }

  function hiredCount() {
    return Object.keys(HIRES).length;
  }

  function getAiLedger(aiIdx) {
    if (!bidParsedByAI[aiIdx]) bidParsedByAI[aiIdx] = {};
    return bidParsedByAI[aiIdx];
  }

  function getCrew(aiIdx) {
    return crewByAI[aiIdx] || { members: [] };
  }

  function crewMembers(crew) {
    return (crew && crew.members) || [];
  }

  function clearTimer(map, key) {
    const t = map.get(key);
    if (t) clearTimeout(t);
    map.delete(key);
  }

  function addHire(charId, aiIdx) {
    const key = charKey(charId);
    if (!HIRES[key]) HIRES[key] = [];
    if (!HIRES[key].includes(aiIdx)) HIRES[key].push(aiIdx);
  }

  function charById(charId) {
    return getChar(charId);
  }

  function setBiddingStatus() {
    if (!Shell) return;
    Shell.setStatus('s-idle', 'BIDDING');
  }

  function setResolvingStatus() {
    if (!Shell) return;
    Shell.setStatus('s-running', 'RESOLVING');
    clearTimeout(resolvingTimer);
    resolvingTimer = setTimeout(() => {
      if (!Shell || isAllKnown()) return;
      Shell.setStatus('s-idle', 'BIDDING');
    }, RESOLVE_MS);
  }

  function setDoneStatus() {
    if (!Shell) return;
    clearTimeout(resolvingTimer);
    Shell.setStatus('s-done', 'HIRED');
  }

  function isAllKnown() {
    return !!Shell && Shell.aiList.every(ai => crewKnownByAI.has(ai.idx));
  }

  function finalSpend(aiIdx) {
    const crew = getCrew(aiIdx);
    const memberIds = new Set(crewMembers(crew).map(m => charKey(m.id)));
    const ledger = getAiLedger(aiIdx);
    return Object.values(ledger).reduce((sum, chip) => {
      if (memberIds.has(charKey(chip.charId))) return sum + chip.amount;
      return sum;
    }, 0);
  }

  function reservedSpend(aiIdx) {
    const ledger = getAiLedger(aiIdx);
    return Object.values(ledger).reduce((sum, chip) => sum + chip.amount, 0);
  }


  function allVisiblePoolChars() {
    if (!Shell) return [];
    return Shell.roster.filter(c => !isHiredSomewhere(c.id) || movingCharIds.has(charKey(c.id)));
  }

  function chipRecordsForChar(charId) {
    const key = charKey(charId);
    const chips = [];
    if (!Shell) return chips;
    Shell.aiList.forEach(ai => {
      const ledger = getAiLedger(ai.idx);
      const chip = ledger[key];
      if (chip) chips.push(chip);
    });
    return chips;
  }

  function refreshTieStates(charId) {
    const chips = chipRecordsForChar(charId).filter(chip => chip.state === 'pending' || chip.state === 'tied');
    if (!chips.length) return;
    const byAmount = new Map();
    chips.forEach(chip => {
      const list = byAmount.get(chip.amount) || [];
      list.push(chip);
      byAmount.set(chip.amount, list);
    });

    // AUCTION-V2: future backend will provide explicit tie / win / loss
    // resolution. Today we only infer ties when two pending chips share the
    // same amount on the same card.
    chips.forEach(chip => {
      const dupes = byAmount.get(chip.amount) || [];
      chip.state = dupes.length > 1 ? 'tied' : 'pending';
    });
  }

  function scheduleLostChipClear(aiIdx, charId) {
    const key = `${aiIdx}:${charKey(charId)}`;
    clearTimer(chipTimersByKey, key);
    chipTimersByKey.set(key, setTimeout(() => {
      const ledger = getAiLedger(aiIdx);
      delete ledger[charKey(charId)];
      refreshTieStates(charId);
      render();
      chipTimersByKey.delete(key);
    }, CHIP_CLEAR_MS));
  }

  function markChipStateForChar(charId, state, winnerAiIdx) {
    const key = charKey(charId);
    Shell.aiList.forEach(ai => {
      const ledger = getAiLedger(ai.idx);
      const chip = ledger[key];
      if (!chip) return;
      if (state === 'won') {
        chip.state = ai.idx === winnerAiIdx ? 'won' : 'lost';
      } else if (state === 'lost') {
        chip.state = 'lost';
      }
      if (chip.state === 'won') {
        clearTimer(chipTimersByKey, `${ai.idx}:${key}`);
      } else if (chip.state === 'lost') {
        scheduleLostChipClear(ai.idx, key);
      }
    });
    refreshTieStates(charId);
  }

  function upsertChip(aiIdx, charId, amount, source) {
    const ledger = getAiLedger(aiIdx);
    const key = charKey(charId);
    ledger[key] = {
      aiIdx,
      charId,
      amount: Number(amount) || 0,
      source,
      state: 'pending',
      placed: false,   // false until first rendered → drives the drop-in animation
    };
    clearTimer(chipTimersByKey, `${aiIdx}:${key}`);
    refreshTieStates(key);
  }

  // Drop the next queued marker, render, and schedule the one after it.
  function _drainPlaceQueue() {
    const item = _placeQueue.shift();
    if (!item) { _placeTimer = null; return; }
    upsertChip(item.aiIdx, item.charId, item.amount, 'bid');
    render();
    _placeTimer = _placeQueue.length
      ? setTimeout(_drainPlaceQueue, MARKER_STAGGER_MS)
      : null;
  }

  // Place any markers still queued, immediately (used before resolution so no
  // bid is left unplaced if the user advances faster than the stagger).
  function flushPlaceQueue() {
    if (_placeTimer) { clearTimeout(_placeTimer); _placeTimer = null; }
    while (_placeQueue.length) {
      const item = _placeQueue.shift();
      upsertChip(item.aiIdx, item.charId, item.amount, 'bid');
    }
  }

  function normalizeBidEvent(aiIdx, parsed) {
    if (!parsed || !Array.isArray(parsed.bids)) return;
    parsed.bids.forEach(bid => {
      const charId = bid.character_id ?? bid.characterId ?? bid.id ?? bid.char_id;
      if (charId == null) return;
      _placeQueue.push({ aiIdx, charId, amount: bid.bid });
    });
    // Kick the stagger if it isn't already running (first marker lands now).
    if (!_placeTimer) _drainPlaceQueue();
  }

  function normalizeFillEvent(aiIdx, parsed) {
    if (!parsed || !Array.isArray(parsed.additions)) return;
    // Legacy per-AI fill (pre-auction backend). Kept for replaying old games.
    parsed.additions.forEach(charId => {
      const c = charById(charId);
      if (!c) return;
      upsertChip(aiIdx, charId, c.floor_cost, 'fill');
    });
  }

  // Spend shown on the bankroll meter: money already committed to won crew
  // (authoritative, from bankrolls_after) plus this round's still-pending /
  // tied bids that are "on the table".
  function meterSpend(aiIdx) {
    const committed = spentByAI[aiIdx] || 0;
    const ledger = getAiLedger(aiIdx);
    const pending = Object.values(ledger).reduce((sum, chip) =>
      (chip.state === 'pending' || chip.state === 'tied') ? sum + chip.amount : sum, 0);
    return committed + pending;
  }

  // Commit a won character into an AI's crew (data only).
  function _commitToCrew(aiIdx, charId) {
    const key = charKey(charId);
    const crew = crewByAI[aiIdx] || { members: [] };
    if (!crew.members.some(m => charKey(m.id) === key)) {
      const c = charById(charId);
      crew.members.push(c ? { id: c.id } : { id: charId });
    }
    crewByAI[aiIdx] = crew;
    addHire(charId, aiIdx);
    Shell.markHired(aiIdx, charId);
  }

  // The first still-empty slot element in an AI's crew column (the flight target).
  function _firstEmptySlot(aiIdx) {
    const col = root && root.querySelector(`.hr-crew-col[data-ai-idx="${aiIdx}"]`);
    if (!col) return null;
    const empty = col.querySelector('.hr-slot-empty');
    return empty ? empty.closest('.hr-slot') : null;
  }

  // Animate a card flying from its pool position to its destination crew slot.
  // Uses a fixed-position clone (FLIP-style); pool and crew cards are the same
  // size so a pure translate lands it cleanly. onLand commits + re-renders so
  // the real card appears exactly where the ghost lands.
  function _flyGhost(sourceEl, fromRect, toRect, onLand) {
    const ghost = sourceEl.cloneNode(true);
    ghost.classList.add('hr-fly-ghost');
    ghost.classList.remove('is-leaving', 'is-entering');
    // Start the clone exactly over the source, with transform:none committed.
    ghost.style.cssText =
      `position:fixed;left:${fromRect.left}px;top:${fromRect.top}px;` +
      `width:${fromRect.width}px;height:${fromRect.height}px;margin:0;` +
      `z-index:9999;pointer-events:none;visibility:visible;` +
      `transform:translate(0px,0px);` +
      `transition:transform ${MOVE_MS}ms cubic-bezier(0.34,0.8,0.3,1);`;
    document.body.appendChild(ghost);
    _ghosts.push(ghost);
    const dx = toRect.left - fromRect.left;
    const dy = toRect.top - fromRect.top;
    // Force the browser to commit the start frame BEFORE changing transform,
    // otherwise both states coalesce into one paint and the card just jumps.
    void ghost.offsetWidth;
    ghost.style.transform = `translate(${dx}px, ${dy}px)`;
    setTimeout(() => {
      if (onLand) onLand();          // real card renders into the slot
      ghost.remove();                // swap out the clone
      const i = _ghosts.indexOf(ghost);
      if (i >= 0) _ghosts.splice(i, 1);
    }, MOVE_MS);
  }

  // Move a won character into its crew with a visible flight from the pool.
  function addToCrew(aiIdx, charId) {
    const key = charKey(charId);
    if (isHiredSomewhere(key)) { _commitToCrew(aiIdx, charId); render(); return; }
    const fromEl = root && root.querySelector(`.hr-pool-grid .hr-card[data-char-id="${key}"]`);
    const slotEl = _firstEmptySlot(aiIdx);
    if (!fromEl || !slotEl) { _commitToCrew(aiIdx, charId); render(); return; }
    const fromRect = fromEl.getBoundingClientRect();
    const toRect = slotEl.getBoundingClientRect();
    fromEl.style.visibility = 'hidden';   // hide source but keep its grid space during flight
    _flyGhost(fromEl, fromRect, toRect, () => {
      _commitToCrew(aiIdx, charId);
      render();   // card now occupies the slot; hidden pool card is gone
    });
  }

  // Drive chip resolution from the authoritative auction_round_resolved event:
  // winners' chips -> won (+ card moves to crew), losers -> lost (+ clear),
  // tied bidders -> tied pulse (+ clear so the card returns to the pool).
  function handleAuctionResolved(e) {
    flushPlaceQueue();  // make sure every bid marker is down before resolving
    const winners = e.winners || [];
    const ties = e.ties || [];
    const bankrollsAfter = e.bankrolls_after || {};

    Object.keys(bankrollsAfter).forEach(idx => {
      spentByAI[idx] = BANKROLL - Number(bankrollsAfter[idx] || 0);
    });

    ties.forEach(t => {
      (t.ai_idxs || []).forEach(idx => {
        const chip = getAiLedger(idx)[charKey(t.char_id)];
        if (chip) chip.state = 'tied';
        scheduleLostChipClear(idx, t.char_id);
      });
    });

    // Beat 1: reveal winners/losers in place (markers turn green/grey). The
    // cards stay in the pool so the user can see who won what.
    winners.forEach(w => {
      const key = charKey(w.char_id);
      Shell.aiList.forEach(ai => {
        const chip = getAiLedger(ai.idx)[key];
        if (!chip) return;
        if (ai.idx === w.ai_idx) {
          chip.state = 'won';
          clearTimer(chipTimersByKey, `${ai.idx}:${key}`);
        } else {
          chip.state = 'lost';
          scheduleLostChipClear(ai.idx, w.char_id);
        }
      });
    });
    render();
    setResolvingStatus();

    // Beat 2: after a hold, glide the won cards into their crews ONE AT A
    // TIME (MOVE_STAGGER_MS apart) so each move is clearly visible.
    clearTimeout(_moveHoldTimer);
    _moveHoldTimer = setTimeout(() => {
      _moveHoldTimer = null;
      _moveWinnersSequentially(winners.slice(), 0);
    }, WIN_HOLD_MS);
  }

  function _moveWinnersSequentially(winners, i) {
    if (i >= winners.length) return;
    const w = winners[i];
    addToCrew(w.ai_idx, w.char_id);
    _moveSeqTimer = setTimeout(
      () => _moveWinnersSequentially(winners, i + 1),
      MOVE_STAGGER_MS,
    );
  }

  function renderChipRowHtml(charId) {
    const chips = chipRecordsForChar(charId);
    if (!chips.length) return '';
    const html = chips.map(chip => {
      const ai = Shell.aiList.find(a => a.idx === chip.aiIdx);
      if (!ai) return '';
      // Animate the drop only the first time a marker is rendered; mark it
      // placed so re-renders (other bids, resolution) don't re-trigger it.
      const isNew = !chip.placed;
      if (isNew) chip.placed = true;
      const cls = ['hr-chip', chip.state, isNew ? 'is-dropping' : ''].filter(Boolean).join(' ');
      const label = `$${Number(chip.amount).toLocaleString()}`;
      return `<span class="${cls}" style="--chip-color:${ai.color}">
        <span class="hr-chip-dot"></span>
        <span class="hr-chip-amt">${label}</span>
      </span>`;
    }).join('');
    return html ? `<div class="hr-chip-row">${html}</div>` : '';
  }

  function renderPoolCardHtml(c) {
    const key = charKey(c.id);
    const leaving = movingCharIds.has(key) && isHiredSomewhere(key);
    return `<div class="hr-card${leaving ? ' is-leaving' : ''}" data-char-id="${key}">
      ${Shell.helpers.charCardHtml(c)}
      ${renderChipRowHtml(key)}
    </div>`;
  }

  function renderCrewCardHtml(c, aiIdx) {
    const key = charKey(c.id);
    const entering = movingCharIds.has(key);
    return `<div class="hr-card${entering ? ' is-entering' : ''}" data-char-id="${key}">
      ${Shell.helpers.charCardHtml(c, { hideCost: true, noId: true })}
    </div>`;
  }

  function renderEmptySlotHtml() {
    return `<div class="hr-slot-empty">Empty Slot</div>`;
  }

  function renderCrewColHtml(ai) {
    const crew = getCrew(ai.idx);
    const members = crewMembers(crew);
    const done = members.length >= 4;
    // Auction backend drives spend authoritatively via spentByAI (committed +
    // on-the-table). Fall back to the legacy crew/reserved sums for old replays.
    const spent = (spentByAI[ai.idx] != null)
      ? meterSpend(ai.idx)
      : crewKnownByAI.has(ai.idx) ? finalSpend(ai.idx) : reservedSpend(ai.idx);
    const slots = [];

    members.forEach(member => {
      const c = charById(member.id) || member;
      slots.push(`<div class="hr-slot">${renderCrewCardHtml(c, ai.idx)}</div>`);
    });
    if (!done) {
      for (let i = members.length; i < 4; i += 1) {
        slots.push(`<div class="hr-slot">${renderEmptySlotHtml()}</div>`);
      }
    }

    return `<div class="hr-crew-col${ai.idx === Shell.currentAI ? ' is-active' : ''}" data-ai-idx="${ai.idx}" data-crew="${getCrewLetter(ai.idx)}" style="--crew-color:${ai.color};border-top-color:${ai.color}">
      <div class="hr-crew-head">
        <div class="hr-crew-topline">
          <span class="hr-crew-dot"></span>
          <span class="hr-crew-name">${Shell.helpers.escapeHtml(ai.label)}</span>
        </div>
        <div class="hr-crew-meta">
          <span class="hr-bankroll-text">$${Number(spent).toLocaleString()} bid of $${BANKROLL.toLocaleString()} total</span>
          ${done ? '<span class="hr-done-pill">DONE</span>' : ''}
        </div>
      </div>
      <div class="hr-crew-slots">${slots.join('')}</div>
    </div>`;
  }

  function renderBannerHtml() {
    const visible = isAllKnown();
    const count = Shell ? Shell.aiList.length : 0;
    return `<div class="hr-banner${visible ? ' is-visible' : ''}" data-hr="banner">
      <div class="hr-banner-inner">
        <span>Hiring complete</span>
        <span class="hr-banner-detail">${count} crews assembled</span>
      </div>
    </div>`;
  }

  function render() {
    if (!root || !Shell) return;
    const poolChars = allVisiblePoolChars();
    const poolCount = poolChars.length;
    const poolHtml = poolChars.length
      ? poolChars.map(renderPoolCardHtml).join('')
      : '<div style="grid-column:1/-1;color:var(--muted);font-style:italic;font-size:13px;text-align:center;padding:30px;">All characters drafted.</div>';

    root.classList.toggle('is-done', isAllKnown());
    root.innerHTML = `
      ${renderBannerHtml()}
      <div class="hr-floor">
        <section class="hr-pool">
          <div class="hr-pool-header">
            <span class="hr-section-label">Free Characters</span>
            <span class="hr-section-count">${poolCount} remaining</span>
          </div>
          <div class="hr-pool-grid" data-hr="pool-grid">${poolHtml}</div>
        </section>
        <section class="hr-crews">
          <div class="hr-pool-header">
            <span class="hr-section-label">Crews</span>
            <span class="hr-section-count">${Shell.aiList.length} ${Shell.aiList.length === 1 ? 'crew' : 'crews'}</span>
          </div>
          <div class="hr-crew-list" data-hr="crew-list">
            ${Shell.aiList.map(renderCrewColHtml).join('')}
          </div>
        </section>
      </div>
      <div class="hr-footnote">Roster cards stay in the pool until a crew claim resolves. Chips carry the bid trail; bankroll meters reflect reserved spend first, then final spend after resolution.</div>
    `;
    syncActiveCrewFocus();
  }

  function syncActiveCrewFocus() {
    if (!root || !Shell) return;
    root.querySelectorAll('.hr-crew-col').forEach(el => {
      const idx = Number(el.getAttribute('data-ai-idx'));
      el.classList.toggle('is-active', idx === Shell.currentAI);
    });
  }

  function finalizeCrewKnown(aiIdx, crew, opts) {
    const safeCrew = crew || { members: [] };
    const members = crewMembers(safeCrew);
    crewByAI[aiIdx] = safeCrew;
    crewKnownByAI.add(aiIdx);

    const memberKeys = new Set(members.map(m => charKey(m.id)));
    members.forEach(member => {
      const key = charKey(member.id);
      const alreadyHere = isHiredSomewhere(key);  // already flown in via the auction
      addHire(member.id, aiIdx);
      // Keep the rail in sync with the hired mark for the current AI stream.
      Shell.markHired(aiIdx, member.id);
      if (alreadyHere) return;   // don't re-animate cards already in the crew
      movingCharIds.add(key);
      clearTimer(moveTimersByChar, key);
      moveTimersByChar.set(key, setTimeout(() => {
        movingCharIds.delete(key);
        moveTimersByChar.delete(key);
        render();
      }, MOVE_MS));
    });

    Shell.aiList.forEach(ai => {
      const ledger = getAiLedger(ai.idx);
      Object.values(ledger).forEach(chip => {
        if (memberKeys.has(charKey(chip.charId))) {
          chip.state = ai.idx === aiIdx ? 'won' : 'lost';
          if (chip.state === 'lost') scheduleLostChipClear(ai.idx, chip.charId);
          else clearTimer(chipTimersByKey, `${ai.idx}:${charKey(chip.charId)}`);
        } else if (ai.idx === aiIdx) {
          chip.state = 'lost';
          scheduleLostChipClear(ai.idx, chip.charId);
        }
      });
    });

    refreshChipSetsForCrew(memberKeys);
    render();

    if (isAllKnown()) {
      setDoneStatus();
      return;
    }

    setResolvingStatus();
    if (opts && opts.final) {
      clearTimeout(resolvingTimer);
      resolvingTimer = setTimeout(() => {
        if (!isAllKnown()) setBiddingStatus();
      }, 0);
    }
  }

  function refreshChipSetsForCrew(memberKeys) {
    memberKeys.forEach(charId => refreshTieStates(charId));
  }

  function handleBidTurn(aiIdx, parsed) {
    normalizeBidEvent(aiIdx, parsed);
    render();
    setBiddingStatus();
  }

  function handleFillTurn(aiIdx, parsed) {
    normalizeFillEvent(aiIdx, parsed);
    render();
    setBiddingStatus();
  }

  function handleEvent(e) {
    if (!root || !Shell) return;
    const aiIdx = e.ai_idx ?? 0;

    if (e.type === 'turn_end' && (e.label === 'bid' || /^bid_round_\d+$/.test(e.label || '')) && e.parsed) {
      // Both the legacy single 'bid' turn and the auction's per-round
      // 'bid_round_N' turns carry parsed.bids of {character_id, bid}.
      handleBidTurn(aiIdx, e.parsed);
    } else if (e.type === 'auction_round_resolved') {
      handleAuctionResolved(e);
    } else if (e.type === 'turn_end' && /^fill_\d+$/.test(e.label || '') && e.parsed) {
      handleFillTurn(aiIdx, e.parsed);
    } else if (e.type === 'crew_known') {
      finalizeCrewKnown(aiIdx, e.crew);
    } else if (e.type === 'game_done') {
      if (e.state && e.state.crew) {
        finalizeCrewKnown(aiIdx, e.state.crew, { final: true });
      }
      if (isAllKnown()) setDoneStatus();
    } else if (e.type === '_reset') {
      reset();
    }
  }

  function clearAllTimers() {
    clearTimeout(resolvingTimer);
    resolvingTimer = null;
    clearTimeout(_moveHoldTimer);
    _moveHoldTimer = null;
    clearTimeout(_moveSeqTimer);
    _moveSeqTimer = null;
    if (_placeTimer) { clearTimeout(_placeTimer); _placeTimer = null; }
    while (_ghosts.length) { const g = _ghosts.pop(); if (g && g.parentNode) g.remove(); }
    moveTimersByChar.forEach(t => clearTimeout(t));
    moveTimersByChar.clear();
    chipTimersByKey.forEach(t => clearTimeout(t));
    chipTimersByKey.clear();
  }

  function resetState() {
    for (const k of Object.keys(HIRES)) delete HIRES[k];
    for (const k of Object.keys(crewByAI)) delete crewByAI[k];
    for (const k of Object.keys(bidParsedByAI)) delete bidParsedByAI[k];
    for (const k of Object.keys(spentByAI)) delete spentByAI[k];
    crewKnownByAI.clear();
    movingCharIds.clear();
    _placeQueue.length = 0;
    clearAllTimers();
  }

  function reset() {
    resetState();
    render();
    setBiddingStatus();
  }

  function mount(container, opts) {
    Shell = (opts && opts.shell) || window.Shell;
    const tpl = document.getElementById('hiring-template');
    if (!tpl) {
      console.error('HiringTab: #hiring-template not in DOM');
      return;
    }
    container.innerHTML = '';
    container.appendChild(tpl.content.cloneNode(true));
    root = container.querySelector('.hiring-root');
    render();
    setBiddingStatus();
    if (Shell.onAISelected) {
      Shell.onAISelected(() => {
        syncActiveCrewFocus();
      });
    }
  }

  function unmount() {
    clearAllTimers();
    root = null;
  }

  window.HiringTab = { mount, handleEvent, reset, unmount };
})();
</script>
