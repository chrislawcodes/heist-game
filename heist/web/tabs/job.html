<!--
  Job tab. Loaded into the viewer shell at boot via /tabs/job.

  Shell contract:
    1. Shell loads this fragment (style + template + script all activate).
    2. Shell calls JobTab.mount(container, { shell })
    3. Shell forwards every SSE event via JobTab.handleEvent(ev)
    4. Shell calls JobTab.reset() on replay reset

  Events the tab acts on:
    turn_end (label='job_pick') → record AI's why-this/why-not reasoning
    job_known                   → fix job, render job card + profile
    hidden_depth_rolled         → render the hidden-depth callout
    game_done                   → finalise job state from game state

  Re-renders when shell switches AI (each AI plays its own job).
-->

<style>
.job-root { padding: 24px; gap: 24px; display: flex; flex-direction: column; overflow-y: auto; flex: 1; }

.job-root .job-card {
  background: var(--panel); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 8px; padding: 20px 24px;
}
.job-root .job-card-name   { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.job-root .job-card-flavor { font-size: 14px; font-style: italic; color: #c0bcd0; line-height: 1.7; margin-bottom: 14px; }
.job-root .job-reward      { font-family: monospace; font-size: 13px; color: var(--green); }
.job-root .job-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.job-root .challenge-table { width: 100%; border-collapse: collapse; }
.job-root .challenge-table td { padding: 5px 0; vertical-align: middle; }
.job-root .ct-label { font-size: 12px; color: var(--muted); width: 130px; font-family: monospace; }
.job-root .ct-bar   { width: 80px; }
.job-root .ct-bar-segs { display: flex; gap: 3px; }
.job-root .ct-seg  { width: 14px; height: 10px; border-radius: 2px; background: #26262c; }
.job-root .ct-seg.lvl-hard   { background: var(--red); }
.job-root .ct-seg.lvl-medium { background: var(--blue); }
.job-root .ct-seg.lvl-low    { background: var(--muted); }
.job-root .ct-level-name   { font-size: 12px; font-family: monospace; min-width: 70px; }
.job-root .ct-level-hard   { color: var(--red); }
.job-root .ct-level-medium { color: var(--blue); }
.job-root .ct-level-low    { color: var(--muted); }
.job-root .ct-level-none   { color: #3a3a44; }
.job-root .job-reasoning {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 18px;
}
.job-root .job-reasoning-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.job-root .job-reasoning-text { font-size: 13px; color: #c0bcd0; line-height: 1.65; }
.job-root .job-reasoning-subhead {
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--accent);
  margin-top: 10px; margin-bottom: 4px;
}
.job-root .job-reasoning-subhead:first-child { margin-top: 0; }
.job-root .job-reasoning-body { font-size: 13px; color: #c0bcd0; line-height: 1.65; margin-bottom: 4px; }

.job-root .hidden-depth-section {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
}
.job-root .hd-callout { border-radius: 5px; padding: 12px 16px; margin: 10px 0; font-size: 13px; line-height: 1.6; }
.job-root .hd-callout-complication { background: #2a0c0c; border-left: 3px solid var(--red); }
.job-root .hd-callout-opportunity  { background: #2a1e04; border-left: 3px solid var(--accent); }
.job-root .hd-callout-bonus        { background: #0a2018; border-left: 3px solid var(--green); }
.job-root .hd-badge {
  display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 2px 8px; border-radius: 3px; margin-bottom: 8px;
}
.job-root .hd-badge-complication { background: #3a1010; color: var(--red); }
.job-root .hd-badge-opportunity  { background: #3a2a08; color: var(--accent); }
.job-root .hd-badge-bonus        { background: #0c2a18; color: var(--green); }
.job-root .hd-reward { font-family: monospace; font-size: 12px; color: var(--muted); margin-top: 8px; }
</style>

<template id="job-template">
  <div class="job-root">
    <div class="job-card" data-jt="job-card" style="display:none">
      <div class="job-card-name"   data-jt="job-name"></div>
      <div class="job-card-flavor" data-jt="job-flavor"></div>
      <div class="job-reward"      data-jt="job-reward"></div>
    </div>
    <div data-jt="profile-section" style="display:none">
      <div class="job-section-label">Challenge Profile</div>
      <table class="challenge-table" data-jt="challenge-table"></table>
    </div>
    <div class="job-reasoning" data-jt="reasoning-block" style="display:none">
      <div class="job-reasoning-label">AI rationale</div>
      <div class="job-reasoning-text" data-jt="reasoning-text"></div>
    </div>
    <div class="hidden-depth-section" data-jt="hd-section" style="display:none">
      <div class="job-section-label">Hidden Depth Revealed</div>
      <div data-jt="hd-callout-wrap"></div>
      <div class="hd-reward" data-jt="hd-reward"></div>
    </div>
  </div>
</template>

<script>
(function () {
  'use strict';

  let root = null;
  let Shell = null;
  const jobByAI = {};
  const jobReasoningByAI = {};   // ai_idx -> { why_this, why_not, legacy }
  const hdByAI = {};

  function $$(name) { return root && root.querySelector(`[data-jt="${name}"]`); }

  function render() {
    if (!root || !Shell) return;
    const esc = Shell.helpers.escapeHtml;
    const job  = jobByAI[Shell.currentAI];
    const jobCard       = $$('job-card');
    const profileBlock  = $$('profile-section');
    const reasoningBlk  = $$('reasoning-block');
    const hdBlock       = $$('hd-section');

    if (!job) {
      jobCard.style.display = 'none';
      profileBlock.style.display = 'none';
      reasoningBlk.style.display = 'none';
      hdBlock.style.display = 'none';
      return;
    }

    $$('job-name').textContent   = job.name;
    $$('job-flavor').textContent = job.flavor || '';
    const rr = job.reward_range;
    $$('job-reward').textContent = rr
      ? '$' + (rr[0]/1e6).toFixed(1) + 'm – $' + (rr[1]/1e6).toFixed(1) + 'm'
      : '';
    jobCard.style.display = '';

    const p = job.profile || {};
    $$('challenge-table').innerHTML = [
      {label:'Electronic',    key:'electronic'},
      {label:'Physical',      key:'physical'},
      {label:'Confrontation', key:'confrontation'},
      {label:'Social',        key:'social'},
      {label:'Escape',        isEscape:true},
    ].map(row => {
      if (row.isEscape) {
        const mod = job.escape_modifier != null ? job.escape_modifier : '—';
        return `<tr><td class="ct-label">Escape</td><td class="ct-bar"></td><td class="ct-level-name ct-level-none" style="font-size:12px;font-family:monospace">modifier ${esc(String(mod))}</td></tr>`;
      }
      const level = (p[row.key] || 'NONE').toUpperCase();
      return `<tr><td class="ct-label">${esc(row.label)}</td><td class="ct-bar">${Shell.helpers.buildDiffBar(level)}</td><td class="ct-level-name ${Shell.helpers.diffCls(level)}">${esc(level)}</td></tr>`;
    }).join('');
    profileBlock.style.display = '';

    const reasoning = jobReasoningByAI[Shell.currentAI];
    if (reasoning && (reasoning.why_this || reasoning.why_not || reasoning.legacy || typeof reasoning === 'string')) {
      const target = $$('reasoning-text');
      if (typeof reasoning === 'string') {
        target.textContent = reasoning;
      } else if (reasoning.why_this || reasoning.why_not) {
        let html = '';
        if (reasoning.why_this) {
          html += `<div class="job-reasoning-subhead">Why this job</div>` +
                  `<div class="job-reasoning-body">${esc(reasoning.why_this)}</div>`;
        }
        if (reasoning.why_not) {
          html += `<div class="job-reasoning-subhead">Why not the others</div>` +
                  `<div class="job-reasoning-body">${esc(reasoning.why_not)}</div>`;
        }
        target.innerHTML = html;
      } else {
        target.textContent = reasoning.legacy || '';
      }
      reasoningBlk.style.display = '';
    } else {
      reasoningBlk.style.display = 'none';
    }

    const hd = hdByAI[Shell.currentAI];
    if (hd) {
      const types = {
        complication:          {badge:'hd-badge-complication', callout:'hd-callout-complication', label:'Complication'},
        opportunity_with_cost: {badge:'hd-badge-opportunity',  callout:'hd-callout-opportunity',  label:'Opportunity'},
        bonus_with_cost:       {badge:'hd-badge-bonus',        callout:'hd-callout-bonus',        label:'Bonus'},
      };
      const t = types[hd.element_type] || types.complication;
      $$('hd-callout-wrap').innerHTML =
        `<div class="hd-callout ${t.callout}"><div class="hd-badge ${t.badge}">${t.label}</div><div>${esc(hd.description)}</div></div>`;
      $$('hd-reward').textContent =
        `Reward rolled: ${hd.reward_label || '—'} — ${hd.reward_amount != null ? '$' + Number(hd.reward_amount).toLocaleString() : '—'}`;
      hdBlock.style.display = '';
    } else {
      hdBlock.style.display = 'none';
    }
  }

  // ── lifecycle ───────────────────────────────────────────────────────────
  function mount(container, opts) {
    Shell = (opts && opts.shell) || window.Shell;
    const tpl = document.getElementById('job-template');
    if (!tpl) { console.error('JobTab: #job-template not in DOM'); return; }
    container.innerHTML = '';
    container.appendChild(tpl.content.cloneNode(true));
    root = container.querySelector('.job-root');
    render();
    if (Shell.onAISelected) Shell.onAISelected(() => render());
  }

  function handleEvent(e) {
    if (!root || !Shell) return;
    const aiIdx = e.ai_idx ?? 0;

    if (e.type === 'turn_end' && e.label === 'job_pick' && e.parsed) {
      jobReasoningByAI[aiIdx] = {
        why_this: e.parsed.why_this || '',
        why_not:  e.parsed.why_not  || '',
        legacy:   e.parsed.reasoning || '',
      };
      if (aiIdx === Shell.currentAI) render();

    } else if (e.type === 'job_known') {
      jobByAI[aiIdx] = e.job;
      if (aiIdx === Shell.currentAI) render();

    } else if (e.type === 'hidden_depth_rolled') {
      hdByAI[aiIdx] = e;
      if (aiIdx === Shell.currentAI) render();

    } else if (e.type === 'game_done') {
      if (e.state && e.state.job) jobByAI[aiIdx] = e.state.job;
      if (aiIdx === Shell.currentAI) render();
    }
  }

  function reset() {
    for (const k of Object.keys(jobByAI))          delete jobByAI[k];
    for (const k of Object.keys(jobReasoningByAI)) delete jobReasoningByAI[k];
    for (const k of Object.keys(hdByAI))           delete hdByAI[k];
    render();
  }

  function unmount() { root = null; }

  window.JobTab = { mount, handleEvent, reset, unmount };
})();
</script>
