<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Heist — Live</title>
<style>
:root {
  --bg: #0c0c0e;
  --panel: #131316;
  --panel2: #18181c;
  --border: #26262c;
  --text: #e0dfe8;
  --muted: #72717a;
  --accent: #e8a030;
  --green: #52c47a;
  --red: #e05050;
  --blue: #5898e0;
  --purple: #9070e0;
  --commentator: #f5d77a;

  --ai-a: #e8a030;
  --ai-b: #5898e0;
  --ai-c: #9070e0;

  --sk-hack:  #5898e0;
  --sk-safe:  #e8a030;
  --sk-musc:  #e05050;
  --sk-soc:   #9070e0;
  --sk-drive: #52c47a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── topbar ─────────────────────────────────────────────────────────────── */
#topbar {
  height: 44px; padding: 0 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
#topbar-title {
  font-size: 12px; font-weight: 700; letter-spacing: 3px; color: var(--accent);
  text-decoration: none; cursor: pointer; transition: opacity 0.15s;
}
#topbar-title:hover { opacity: 0.7; }
#job-display  { font-size: 13px; color: var(--text); }
#heat-display { font-size: 12px; font-family: monospace; color: var(--red); letter-spacing: 1px; }
#topbar-spacer { flex: 1; }
#new-game-btn {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 5px 12px; background: var(--panel2); color: var(--muted);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
}
#new-game-btn:hover { color: var(--text); border-color: var(--muted); }
.replay-btn {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  padding: 4px 10px; margin-right: 4px;
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
}
.replay-btn:hover { border-color: var(--accent); color: var(--accent); }
#replay-controls { display: inline-flex; align-items: center; gap: 2px; }
#status-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 3px;
}
.s-idle    { background: #1e1e22; color: var(--muted); }
.s-running { background: #0c1a2e; color: var(--blue); }
.s-done    { background: #0c2018; color: var(--green); }
.s-error   { background: #2e0c0c; color: var(--red); }

/* ── tabnav ─────────────────────────────────────────────────────────────── */
#tabnav {
  height: 38px; padding: 0 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch; flex-shrink: 0;
  background: var(--panel);
}
.tab-btn {
  background: none; border: none; color: var(--muted);
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 0 18px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  position: relative; top: 1px;
}
.tab-btn:hover:not(.tab-locked) { color: var(--text); }
.tab-btn.tab-active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn.tab-locked { color: #3a3a44; cursor: not-allowed; }

/* ── content layout ─────────────────────────────────────────────────────── */
#content { flex: 1; display: flex; overflow: hidden; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-panel.tab-visible { display: flex; }

/* ── right rail (always visible across tabs) ────────────────────────────── */
#rail {
  width: 320px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--panel);
  display: flex; flex-direction: column; overflow: hidden;
}
#commentary-section {
  flex: 0 0 auto; max-height: 36%;
  display: flex; flex-direction: column; overflow: hidden;
  border-bottom: 2px solid var(--border);
}
.commentary-header {
  padding: 7px 14px; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  background: #15140e;
}
.commentary-icon { font-size: 12px; }
.commentary-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--commentator); flex: 1;
}
.commentary-attrib {
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--muted); font-family: monospace;
}
.commentary-status {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  color: var(--muted); background: #1e1e22;
  padding: 2px 6px; border-radius: 3px;
}
#commentary-stream {
  flex: 1; overflow-y: auto; padding: 8px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.commentary-stub {
  font-size: 11px; color: var(--muted); line-height: 1.5;
  padding: 12px 10px;
  border: 1px dashed var(--border); border-radius: 5px;
  text-align: center;
}
.commentary-stub strong { color: var(--text); }

#ai-picker {
  flex-shrink: 0; padding: 7px 10px;
  display: flex; gap: 5px; align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
}
.ai-pick-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-right: 4px;
}
.ai-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 18px;
  font-size: 11px; font-weight: 700;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.ai-pill:hover { color: var(--text); }
.ai-pill.ap-active { background: var(--panel); color: var(--text); }
.ai-pill .ap-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.ai-pill[data-aiidx="0"].ap-active { border-color: var(--ai-a); }
.ai-pill[data-aiidx="0"] .ap-dot { background: var(--ai-a); }
.ai-pill[data-aiidx="1"].ap-active { border-color: var(--ai-b); }
.ai-pill[data-aiidx="1"] .ap-dot { background: var(--ai-b); }
.ai-pill[data-aiidx="2"].ap-active { border-color: var(--ai-c); }
.ai-pill[data-aiidx="2"] .ap-dot { background: var(--ai-c); }

#thinking-section {
  flex: 1 1 auto; min-height: 0;
  display: flex; flex-direction: column; overflow: hidden;
}
.thinking-header {
  padding: 8px 14px; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.thinking-avatar {
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #000;
}
.thinking-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text); flex: 1;
}
.thinking-private {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  color: var(--muted); background: #1e1e22;
  padding: 2px 6px; border-radius: 3px;
}
#thinking-stream {
  flex: 1; overflow-y: auto; padding: 8px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.thought-line {
  font-size: 12px; line-height: 1.5;
  padding: 7px 10px; border-radius: 4px;
  background: var(--panel2);
  border-left: 3px solid var(--border);
  animation: slideDownIn 0.35s ease;
}
@keyframes slideDownIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: none; }
}
.thought-kind {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 3px;
}
.thought-body { color: #d0cee0; }
.thought-body strong { color: var(--text); font-weight: 600; }
.thought-line.tk-strategy { border-left-color: var(--accent); }
.thought-line.tk-strategy .thought-kind { color: var(--accent); }
.thought-line.tk-bid { border-left-color: var(--blue); }
.thought-line.tk-bid .thought-kind { color: var(--blue); }
.thought-line.tk-hire { border-left-color: var(--green); }
.thought-line.tk-hire .thought-kind { color: var(--green); }
.thought-line.tk-job { border-left-color: var(--purple); }
.thought-line.tk-job .thought-kind { color: var(--purple); }
.thought-line.tk-scene { border-left-color: var(--muted); }
.thought-sub-head {
  font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--purple);
  margin-top: 6px; margin-bottom: 2px;
}
.thought-sub-head:first-child { margin-top: 0; }
.thinking-empty { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; padding: 16px 0; }
.thought-hired-badge {
  margin-top: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  background: #0c2018; color: var(--green);
  padding: 2px 7px; border-radius: 3px;
  font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
}

/* ── shared prose styles (used by Heist tab narration) ──────────────────── */
.prose { font-size: 14px; line-height: 1.8; color: #c8c4d8; }
.prose p { margin-bottom: 12px; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { color: var(--text); font-weight: 600; }
.prose em     { color: #a0a8c0; font-style: italic; }
.prose code   { font-family: monospace; background: #1a1a22; padding: 1px 4px; border-radius: 3px; font-size: 12px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a34; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #40404c; }
</style>
</head>
<body>

<div id="topbar">
  <a id="topbar-title" href="/" title="Back to lobby">HEIST</a>
  <span id="job-display">—</span>
  <span id="heat-display"></span>
  <span id="topbar-spacer"></span>
  <span id="replay-controls" style="display:none">
    <button class="replay-btn" id="replay-play"  onclick="replayToggle()">▶ Play</button>
    <button class="replay-btn" onclick="replayStep()">⏭ Step</button>
    <button class="replay-btn" onclick="replayReset()">⟲ Reset</button>
    <span id="replay-counter" style="font-family:monospace;font-size:11px;color:var(--muted);margin-left:6px">0 / 0</span>
  </span>
  <button id="new-game-btn" onclick="window.location='/'">← New Game</button>
  <span id="status-badge" class="s-running">RUNNING</span>
</div>

<div id="tabnav">
  <button class="tab-btn tab-active" id="tab-btn-draft"  onclick="switchTab('draft')">Hiring</button>
  <button class="tab-btn tab-locked" id="tab-btn-job"    onclick="switchTab('job')">Job</button>
  <button class="tab-btn tab-locked" id="tab-btn-heist"  onclick="switchTab('heist')">The Heist</button>
</div>

<div id="content">
  <div id="main">
    <!-- Tab panels are populated by their respective modules after loadTabFragment() -->
    <div class="tab-panel tab-visible" id="tab-draft"></div>
    <div class="tab-panel" id="tab-job"></div>
    <div class="tab-panel" id="tab-heist"></div>
  </div>

  <div id="rail">
    <div id="commentary-section">
      <div class="commentary-header">
        <span class="commentary-icon">📢</span>
        <span class="commentary-title">Play-by-Play</span>
        <span class="commentary-attrib">codex</span>
        <span class="commentary-status">Not wired</span>
      </div>
      <div id="commentary-stream">
        <div class="commentary-stub">
          <strong>Commentary not configured.</strong><br>
          A Codex commentator will narrate the game from public info here.
        </div>
      </div>
    </div>

    <div id="ai-picker">
      <span class="ai-pick-label">Mind of</span>
      <span id="ai-pills"></span>
    </div>

    <div id="thinking-section">
      <div class="thinking-header">
        <span class="thinking-avatar" id="thinking-avatar" style="background:var(--ai-a)">·</span>
        <span class="thinking-title" id="thinking-title">—</span>
        <span class="thinking-private">Private</span>
      </div>
      <div id="thinking-stream">
        <div class="thinking-empty">Waiting for the game…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// VIEWER SHELL
//
// Owns:
//   - SSE connection + replay controls
//   - Tab navigation (Hiring / Job / The Heist)
//   - Top bar (job name + heat + status badge)
//   - Right rail (commentary, AI picker, AI thinking stream)
//   - Shared state: roster, AI list, currentAI selection
//   - Per-AI thought streams (the "private" rail)
//
// Does NOT own:
//   - Any tab body markup or rendering. Each tab is its own fragment loaded
//     from /tabs/<name> at boot. The shell exposes window.Shell so tabs can
//     reach into shared state + helpers without re-implementing them.
// ═══════════════════════════════════════════════════════════════════════════

// ── boot ────────────────────────────────────────────────────────────────────
const TAB_NAMES = ['hiring', 'job', 'heist'];   // matches /tabs/<name> paths
const TAB_PANEL_IDS = {                          // shell panel each tab mounts into
  hiring: 'tab-draft',
  job:    'tab-job',
  heist:  'tab-heist',
};
const TAB_MODULE_NAMES = {                       // window.<name> after fragment loads
  hiring: 'HiringTab',
  job:    'JobTab',
  heist:  'HeistTab',
};

// Shared state — mutable from inside the shell, read-only from tab modules.
const Shell = {
  roster: [],
  charById: new Map(),
  aiList: [{ idx: 0, label: 'AI', color: 'var(--ai-a)' }],
  currentAI: 0,

  // shell helpers tabs commonly need
  helpers: {
    escapeHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
    renderMd(text) {
      if (!text) return '';
      let s = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
      return s.split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    },
    skillVal(c, short) {
      const apiKey = SKILL_SHORT_TO_API[short];
      const levelStr = c.skills?.[apiKey];
      return SKILL_VALUE[levelStr] || 0;
    },
    primarySkill(c) {
      let bestKey = 'hack', bestVal = -1;
      Object.entries(c.skills || {}).forEach(([apiKey, levelStr]) => {
        const short = SKILL_API_TO_SHORT[apiKey];
        if (!short) return;
        const val = SKILL_VALUE[levelStr] || 0;
        if (val > bestVal) { bestVal = val; bestKey = short; }
      });
      return bestKey;
    },
    portraitUrl(c) {
      const p = Shell.helpers.primarySkill(c);
      const seed = (c.name || '').toLowerCase().replace(/\s+/g, '');
      return `https://api.dicebear.com/9.x/${PORTRAIT_STYLE[p]}/svg?seed=${encodeURIComponent(seed)}&backgroundColor=${PORTRAIT_BG[p]}`;
    },
    charCardHtml(c, opts) {
      const { hideCost = false, noId = false } = opts || {};
      const esc = Shell.helpers.escapeHtml;
      const primary = Shell.helpers.primarySkill(c);
      const initials = (c.name || '?').slice(0,1).toUpperCase();
      const skillsHtml = SKILL_KEYS.map(sk => {
        const val = Shell.helpers.skillVal(c, sk);
        const segs = Array.from({length:3}, (_, j) =>
          `<span class="seg ${j < val ? 'f-' + sk : ''}"></span>`).join('');
        return `<div class="cc-skill"><span class="cc-skill-label">${SKILL_LABEL[sk]}</span><div class="cc-skill-bars">${segs}</div></div>`;
      }).join('');
      const idAttr = noId ? '' : ` id="cc-${c.id}"`;
      const costRow = hideCost ? '' :
        `<div class="cc-cost-row">$${Number(c.floor_cost).toLocaleString()}</div>`;
      return `<div class="char-card" data-primary="${primary}"${idAttr}>
        <div class="cc-portrait">
          <div class="cc-portrait-fallback">${esc(initials)}</div>
          <img src="${Shell.helpers.portraitUrl(c)}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="cc-header"><span class="cc-name" title="${esc(c.name)}">${esc(c.name)}</span></div>
        <div class="cc-info"><div class="cc-skills">${skillsHtml}</div></div>
        ${costRow}
      </div>`;
    },
    buildDiffBar(level) {
      const segs = {HARD:3, MEDIUM:2, LOW:1, NONE:0}[level] || 0;
      const cls  = {HARD:'lvl-hard', MEDIUM:'lvl-medium', LOW:'lvl-low'}[level] || '';
      return '<div class="ct-bar-segs">' + Array.from({length:3}, (_,i) =>
        `<span class="ct-seg ${i<segs?cls:''}"></span>`).join('') + '</div>';
    },
    diffCls(level) {
      return {HARD:'ct-level-hard', MEDIUM:'ct-level-medium', LOW:'ct-level-low'}[level] || 'ct-level-none';
    },
  },

  // for tab → shell calls
  setJobDisplay(name) { document.getElementById('job-display').textContent = name || '—'; },
  setHeat(n)          { _updateHeat(n); },
  setStatus(cls, txt) { _setStatus(cls, txt); },
  unlockTab(name)     { _unlockTab(name); },
  addThought(aiIdx, kind, title, bodyHtml, opts) { _addThought(aiIdx, kind, title, bodyHtml, opts); },
  markHired(aiIdx, charId) { _markHired(aiIdx, charId); },

  // for shell → tab dispatch (read by tabs after onAISelected fires)
  onAISelected(cb) { _aiSubscribers.push(cb); },
};
window.Shell = Shell;

// ── shared constants needed by helpers (and exposed via Shell) ──────────────
const SKILL_API_TO_SHORT = {
  hacker: 'hack', safecracker: 'safe', muscle: 'musc',
  inside_man: 'soc', driver: 'drive',
};
const SKILL_SHORT_TO_API = Object.fromEntries(
  Object.entries(SKILL_API_TO_SHORT).map(([k, v]) => [v, k])
);
const SKILL_KEYS  = ['hack','safe','musc','soc','drive'];
const SKILL_LABEL = { hack:'HACK', safe:'SAFE', musc:'MUSC', soc:'SOC', drive:'DRIVE' };
const SKILL_VALUE = { HIGH:3, MEDIUM:2, LOW:1, NONE:0 };
const PORTRAIT_STYLE = { hack:'pixel-art', safe:'notionists', musc:'bottts', soc:'personas', drive:'adventurer' };
const PORTRAIT_BG    = { hack:'1a2840', safe:'2a2008', musc:'2a0c0c', soc:'1e1430', drive:'0c2018' };

// ── shell-private state ─────────────────────────────────────────────────────
let evtSource = null;
const aiStreams = [[]];                  // per-AI thought arrays (newest first)
const _hiredMarks = {};                  // ai_idx -> Set<char_id>
const _aiSubscribers = [];               // tab callbacks for AI changes
const _tabFlags = { job: false, heist: false };

const REPLAY_ID = (() => {
  const v = new URLSearchParams(window.location.search).get('replay');
  return v ? parseInt(v, 10) : null;
})();
let REPLAY_EVENTS = [];
let REPLAY_INDEX  = 0;
let REPLAY_TIMER  = null;

const THOUGHT_CARD_DELAY_MS = (() => {
  const p = new URLSearchParams(window.location.search);
  const n = parseInt(p.get('cardDelay') || '', 10);
  return Number.isFinite(n) ? n : 5000;
})();
const _thoughtQueue = [];
let   _thoughtTimer = null;

// ── boot sequence ───────────────────────────────────────────────────────────
boot();

async function boot() {
  // 1. Pre-load all tab fragments. Each fragment registers window.<TabModule>.
  try {
    await Promise.all(TAB_NAMES.map(loadTabFragment));
  } catch (e) {
    console.error('Failed to load tab fragments:', e);
  }

  // 2. Resolve which AIs are in this game so the picker can show real labels.
  try {
    const games = await fetch('/api/games').then(r => r.json());
    const target = REPLAY_ID != null
      ? games.find(g => g.id === REPLAY_ID)
      : ([...games].reverse().find(g => g.status === 'running')
         || [...games].reverse().find(g => g.status === 'done')
         || [...games].reverse()[0]);
    if (target && target.ais && target.ais.length) {
      Shell.aiList = target.ais.map((ai, i) => ({
        idx: i,
        label: ai.agent || ('AI ' + (i+1)),
        color: ['var(--ai-a)','var(--ai-b)','var(--ai-c)'][i] || 'var(--ai-a)',
      }));
      while (aiStreams.length < Shell.aiList.length) aiStreams.push([]);
    }
  } catch {}
  _renderAIPicker();

  // 3. Load the roster so tabs can render character data
  try {
    const meta = await fetch('/api/meta').then(r => r.json());
    Shell.roster = meta.roster || [];
    Shell.roster.forEach(c => Shell.charById.set(c.id, c));
  } catch (e) {
    console.error('failed to load meta', e);
  }

  // 4. Mount each tab into its panel now that fragments are loaded + state is ready
  TAB_NAMES.forEach(name => {
    const Mod = window[TAB_MODULE_NAMES[name]];
    const panel = document.getElementById(TAB_PANEL_IDS[name]);
    if (Mod && panel && typeof Mod.mount === 'function') {
      try { Mod.mount(panel, { shell: Shell }); }
      catch (e) { console.error(`${name} tab mount failed:`, e); }
    }
  });

  // 5. Initial AI selection (renders rail + notifies tabs)
  _selectAI(0);

  // 6. Subscribe to events: SSE for live games, replay buffer for finished ones.
  if (REPLAY_ID != null) {
    _setStatus('s-idle', 'REPLAY');
    document.getElementById('replay-controls').style.display = '';
    try {
      const data = await fetch(`/api/games/${REPLAY_ID}/events`).then(r => r.json());
      REPLAY_EVENTS = data.events || [];
      _replayUpdateCounter();
    } catch (e) {
      _addThought(0, 'scene', 'Replay error', Shell.helpers.escapeHtml(String(e)));
    }
  } else {
    evtSource = new EventSource('/stream');
    evtSource.onmessage = handleSSE;
    evtSource.onerror = () => {
      if (evtSource && evtSource.readyState === EventSource.CLOSED) _setStatus('s-idle', 'IDLE');
    };
  }
}

// ── fragment loader ─────────────────────────────────────────────────────────
async function loadTabFragment(name) {
  const html = await fetch('/tabs/' + name).then(r => {
    if (!r.ok) throw new Error(`fetch /tabs/${name}: ${r.status}`);
    return r.text();
  });
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  // Styles + templates can move over as-is
  wrap.querySelectorAll('style, template').forEach(el => document.body.appendChild(el));
  // Scripts inserted via innerHTML don't execute — recreate them
  wrap.querySelectorAll('script').forEach(oldScript => {
    const fresh = document.createElement('script');
    if (oldScript.src) fresh.src = oldScript.src;
    else fresh.textContent = oldScript.textContent;
    document.body.appendChild(fresh);
  });
}

// ── replay controls ─────────────────────────────────────────────────────────
function replayStep() {
  if (REPLAY_INDEX >= REPLAY_EVENTS.length) return;
  const evt = REPLAY_EVENTS[REPLAY_INDEX++];
  handleSSE({ data: JSON.stringify(evt) });
  _replayUpdateCounter();
  if (REPLAY_INDEX >= REPLAY_EVENTS.length && REPLAY_TIMER) replayToggle();
}
function replayToggle() {
  const btn = document.getElementById('replay-play');
  if (REPLAY_TIMER) {
    clearInterval(REPLAY_TIMER); REPLAY_TIMER = null;
    btn.textContent = '▶ Play';
  } else {
    REPLAY_TIMER = setInterval(replayStep, Math.max(THOUGHT_CARD_DELAY_MS, 500));
    btn.textContent = '⏸ Pause';
  }
}
function replayReset() {
  if (REPLAY_TIMER) replayToggle();
  REPLAY_INDEX = 0;
  _thoughtQueue.length = 0;
  if (_thoughtTimer) { clearTimeout(_thoughtTimer); _thoughtTimer = null; }
  for (const k of Object.keys(_hiredMarks)) delete _hiredMarks[k];
  aiStreams.forEach((_, i) => aiStreams[i] = []);
  // Reset all tabs (each tab decides what "reset" means for its own state)
  TAB_NAMES.forEach(name => {
    const Mod = window[TAB_MODULE_NAMES[name]];
    if (Mod && typeof Mod.reset === 'function') Mod.reset();
  });
  _selectAI(Shell.currentAI);
  _replayUpdateCounter();
}
function _replayUpdateCounter() {
  const el = document.getElementById('replay-counter');
  if (el) el.textContent = `${REPLAY_INDEX} / ${REPLAY_EVENTS.length}`;
}

// ── tab switching ───────────────────────────────────────────────────────────
function switchTab(name) {
  if (name === 'job'   && !_tabFlags.job)   return;
  if (name === 'heist' && !_tabFlags.heist) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
  document.getElementById('tab-btn-' + name).classList.add('tab-active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-visible'));
  const panelId = name === 'hiring' ? 'tab-draft' : 'tab-' + name;
  document.getElementById(panelId).classList.add('tab-visible');
}
function _unlockTab(name) {
  if (name === 'job' && !_tabFlags.job) {
    _tabFlags.job = true;
    document.getElementById('tab-btn-job').classList.remove('tab-locked');
  } else if (name === 'heist' && !_tabFlags.heist) {
    _tabFlags.heist = true;
    document.getElementById('tab-btn-heist').classList.remove('tab-locked');
  }
}

// ── SSE handler — fans events out to every tab module ──────────────────────
function handleSSE(evt) {
  let e;
  try { e = JSON.parse(evt.data); } catch { return; }

  // Strategy / bid / hire / job-pick narration cards land in the rail. Shell
  // owns the rail, so we extract those here before forwarding.
  if (e.type === 'turn_end') {
    _railFromTurnEnd(e);
  }

  // Forward to every tab. Each tab decides what (if anything) to do.
  TAB_NAMES.forEach(name => {
    const Mod = window[TAB_MODULE_NAMES[name]];
    if (Mod && typeof Mod.handleEvent === 'function') {
      try { Mod.handleEvent(e); }
      catch (err) { console.error(`${name} tab handleEvent failed:`, err); }
    }
  });

  // Top bar + status are also shell concerns
  const aiIdx = e.ai_idx ?? 0;
  if (e.type === 'job_known' && aiIdx === Shell.currentAI) {
    document.getElementById('job-display').textContent = e.job.name;
  } else if (e.type === 'scene_done' && aiIdx === Shell.currentAI) {
    _updateHeat(e.heat);
  } else if (e.type === 'game_done') {
    if (aiIdx === Shell.currentAI) {
      document.getElementById('job-display').textContent = e.state.job.name;
      _updateHeat(e.state.heat);
    }
    _unlockTab('job'); _unlockTab('heist');
    _maybeFinishStream(e);
  } else if (e.type === 'error') {
    _addThought(aiIdx, 'scene', 'Error', Shell.helpers.escapeHtml(e.message || 'unknown error'));
    _setStatus('s-error', 'ERROR');
  } else if (e.type === 'crew_known') {
    _markCrewHired(aiIdx, e.crew);
  }
}

function _railFromTurnEnd(e) {
  const aiIdx = e.ai_idx ?? 0;
  const esc = Shell.helpers.escapeHtml;
  if (e.label === 'bid' && e.parsed) {
    if (e.parsed.casting_strategy) {
      _addThought(aiIdx, 'strategy', 'Strategy', esc(e.parsed.casting_strategy));
    }
    (e.parsed.bids || []).forEach(b => {
      _flashCard(b.character_id);
      const c = Shell.charById.get(b.character_id);
      if (!c) return;
      const amount = b.bid != null ? ' · $' + Number(b.bid).toLocaleString() : '';
      _addThought(aiIdx, 'bid', 'Bid · ' + c.name + amount, esc(b.rationale || '—'),
        { id: 'bid-' + aiIdx + '-' + b.character_id, charId: b.character_id });
    });
  } else if (e.label === 'casting_summary' && e.parsed && e.parsed.summary) {
    const s = e.parsed.summary;
    _addThought(aiIdx, 'strategy', 'Casting summary',
      esc(s.length > 240 ? s.slice(0,240) + '…' : s));
    _unlockTab('heist');
  } else if (e.label === 'job_pick' && e.parsed) {
    _unlockTab('job');
    const whyThis = e.parsed.why_this || '';
    const whyNot  = e.parsed.why_not  || '';
    const legacy  = e.parsed.reasoning || '';
    let body;
    if (whyThis || whyNot) {
      body = '';
      if (whyThis) body += `<div class="thought-sub-head">Why this job</div>${esc(whyThis)}`;
      if (whyNot)  body += `<div class="thought-sub-head">Why not the others</div>${esc(whyNot)}`;
    } else {
      body = esc(legacy || '—');
    }
    _addThought(aiIdx, 'job', 'Job pick', body);
  } else if (e.label && e.label.match(/^scene_\d+_/)) {
    // scene-related turns: rail just gets a marker; tabs handle the data
  }
}

function _markCrewHired(aiIdx, crew) {
  if (!crew || !crew.members) return;
  crew.members.forEach(member => _markHired(aiIdx, member.id));
}

function _maybeFinishStream(latestGameDone) {
  // Close SSE once every AI has emitted game_done (in shell, we approximate
  // by checking how many game_done events we've seen vs the AI list).
  // Tabs maintain their own per-AI done flags if they care.
  _maybeFinishStream._seenDone = _maybeFinishStream._seenDone || new Set();
  _maybeFinishStream._seenDone.add(latestGameDone.ai_idx ?? 0);
  if (_maybeFinishStream._seenDone.size < Shell.aiList.length) return;
  if (evtSource) { evtSource.close(); evtSource = null; }
  // Status badge: prefer a clean outcome on any AI, otherwise show take
  const states = [];
  // Tabs hold per-AI state — for status calc we just inspect this latest one
  // and call it good enough in the shell. Detail lives in the Heist tab card.
  if (latestGameDone && latestGameDone.state) {
    const s = latestGameDone.state;
    const ok = !s.aborted && s.escape_success !== false;
    _setStatus(ok ? 's-done' : 's-error',
      ok && s.final_take != null
        ? '$' + (s.final_take / 1e6).toFixed(2) + 'M'
        : 'FAILED');
  }
}

// ── right-rail (AI picker + thinking stream) ────────────────────────────────
function _renderAIPicker() {
  const esc = Shell.helpers.escapeHtml;
  document.getElementById('ai-pills').innerHTML = Shell.aiList.map(ai =>
    `<button class="ai-pill ${ai.idx === Shell.currentAI ? 'ap-active' : ''}" data-aiidx="${ai.idx}" onclick="_selectAIFromUI(${ai.idx})">
      <span class="ap-dot"></span>${esc(ai.label)}
    </button>`
  ).join('');
}
// Exposed for inline onclick — keep stable name
window._selectAIFromUI = (idx) => _selectAI(idx);

function _selectAI(idx) {
  Shell.currentAI = idx;
  document.querySelectorAll('.ai-pill').forEach(p =>
    p.classList.toggle('ap-active', parseInt(p.dataset.aiidx) === idx));
  const ai = Shell.aiList[idx] || Shell.aiList[0];
  const av = document.getElementById('thinking-avatar');
  av.textContent = ['A','B','C'][idx] || '·';
  av.style.background = ai.color;
  document.getElementById('thinking-title').textContent = ai.label;
  _renderThinking();
  // Notify each tab so it can re-render with the new AI's data
  _aiSubscribers.forEach(cb => {
    try { cb(idx); } catch (e) { console.error('AI subscriber error:', e); }
  });
}

function _addThought(aiIdx, kind, title, bodyHtml, opts) {
  const t = { aiIdx, kind, title, body: bodyHtml, ...(opts || {}) };
  while (aiStreams.length <= aiIdx) aiStreams.push([]);
  aiStreams[aiIdx].unshift(t);
  if (THOUGHT_CARD_DELAY_MS <= 0) {
    if (aiIdx === Shell.currentAI) _prependThought(t);
    return;
  }
  _thoughtQueue.push(t);
  if (!_thoughtTimer) {
    _thoughtTimer = setTimeout(_drainOneThought, THOUGHT_CARD_DELAY_MS);
  }
}
function _drainOneThought() {
  const t = _thoughtQueue.shift();
  if (!t) { _thoughtTimer = null; return; }
  if (t.aiIdx === Shell.currentAI) _prependThought(t);
  if (_thoughtQueue.length > 0) {
    _thoughtTimer = setTimeout(_drainOneThought, THOUGHT_CARD_DELAY_MS);
  } else {
    _thoughtTimer = null;
  }
}
function _prependThought(t) {
  const stream = document.getElementById('thinking-stream');
  stream.querySelector('.thinking-empty')?.remove();
  if (t.id) {
    const existing = document.getElementById('thought-' + t.id);
    if (existing) existing.remove();
  }
  const line = document.createElement('div');
  line.className = `thought-line tk-${t.kind}`;
  if (t.id) line.id = 'thought-' + t.id;
  const showHired = t.kind === 'bid' && t.charId != null
    && _hiredMarks[t.aiIdx] && _hiredMarks[t.aiIdx].has(t.charId);
  line.innerHTML =
    `<div class="thought-kind">${Shell.helpers.escapeHtml(t.title)}</div>` +
    `<div class="thought-body">${t.body}</div>` +
    (showHired ? '<div class="thought-hired-badge">✓ Hired</div>' : '');
  stream.insertBefore(line, stream.firstChild);
  stream.scrollTop = 0;
}
function _markHired(aiIdx, charId) {
  if (!_hiredMarks[aiIdx]) _hiredMarks[aiIdx] = new Set();
  if (_hiredMarks[aiIdx].has(charId)) return;
  _hiredMarks[aiIdx].add(charId);
  const stream = aiStreams[aiIdx] || [];
  for (const t of stream) {
    if (t.kind === 'bid' && t.charId === charId) { t.hired = true; break; }
  }
  if (aiIdx !== Shell.currentAI) return;
  const card = document.getElementById('thought-bid-' + aiIdx + '-' + charId);
  if (!card) return;
  if (!card.querySelector('.thought-hired-badge')) {
    card.insertAdjacentHTML('beforeend', '<div class="thought-hired-badge">✓ Hired</div>');
  }
  const streamEl = document.getElementById('thinking-stream');
  if (streamEl && streamEl.firstChild !== card) {
    streamEl.insertBefore(card, streamEl.firstChild);
    streamEl.scrollTop = 0;
  }
  const arr = aiStreams[aiIdx];
  if (arr) {
    const idx = arr.findIndex(x => x.kind === 'bid' && x.charId === charId);
    if (idx > 0) { const [item] = arr.splice(idx, 1); arr.unshift(item); }
  }
}
function _renderThinking() {
  const stream = document.getElementById('thinking-stream');
  stream.innerHTML = '';
  const items = aiStreams[Shell.currentAI] || [];
  if (!items.length) {
    stream.innerHTML = '<div class="thinking-empty">No thoughts yet.</div>';
    return;
  }
  const hiredHere = _hiredMarks[Shell.currentAI];
  items.forEach(t => {
    const line = document.createElement('div');
    line.className = `thought-line tk-${t.kind}`;
    line.style.animation = 'none';
    if (t.id) line.id = 'thought-' + t.id;
    const showHired = t.kind === 'bid' && t.charId != null
      && (t.hired || (hiredHere && hiredHere.has(t.charId)));
    line.innerHTML =
      `<div class="thought-kind">${Shell.helpers.escapeHtml(t.title)}</div>` +
      `<div class="thought-body">${t.body}</div>` +
      (showHired ? '<div class="thought-hired-badge">✓ Hired</div>' : '');
    stream.appendChild(line);
  });
}

function _flashCard(charId) {
  const el = document.getElementById('cc-' + charId);
  if (!el) return;
  el.classList.remove('bidding-flash');
  void el.offsetWidth;
  el.classList.add('bidding-flash');
  el.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

// ── status / heat ───────────────────────────────────────────────────────────
function _setStatus(cls, text) {
  const b = document.getElementById('status-badge');
  b.className = cls; b.textContent = text;
}
function _updateHeat(n) {
  const el = document.getElementById('heat-display');
  el.textContent = n ? '● '.repeat(n).trim() + '  heat ' + n : '';
}
</script>
