name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev + web deps
        run: pip install ruff mypy pytest fastapi uvicorn httpx
      - name: Ruff lint
        run: ruff check .
      - name: Mypy typecheck
        run: mypy heist/ agents.py demo.py
      - name: Import smoke test
        run: python -c "import agents, demo, heist, heist.runner, heist.scenes, heist.mechanics, heist.server"
      - name: Pytest
        run: pytest -q
